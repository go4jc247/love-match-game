// Tool 6: Potion — Transforms 2x2 area into the tapped tile's type
function usePotion(row, col) {
  locked = true;
  const type = grid[row][col];
  if (type < 0) { locked = false; toolInventory[6]++; return; }

  // 2x2 starting from tapped cell (pick best corner)
  const r2 = Math.min(row, ROWS - 2);
  const c2 = Math.min(col, COLS - 2);

  const cells = [];
  for (let dr = 0; dr <= 1; dr++) {
    for (let dc = 0; dc <= 1; dc++) {
      if (!hasObstacle(r2 + dr, c2 + dc)) {
        grid[r2 + dr][c2 + dc] = type;
        cells.push({ row: r2 + dr, col: c2 + dc });
      }
    }
  }
  animations.push(new Animation(300, (t) => {
    const pulse = Math.sin(t * Math.PI * 3);
    for (const c of cells) {
      setOverride(c.row, c.col, { scale: 1 + pulse * 0.15 });
    }
  }, () => {
    for (const c of cells) clearOverride(c.row, c.col);
    processMatches();
  }));
}

function useMagicWand(row, col) {

// Tool 9: Slingshot — Clears entire diagonal line through tapped tile
function useSlingshot(row, col) {
  locked = true;
  const targets = [];
  const obstacleHits = [];
  const pendingToolActivations = [];
  const seen = new Set();

  // Both diagonals through (row, col)
  for (let d = -Math.max(ROWS, COLS); d <= Math.max(ROWS, COLS); d++) {
    // Top-left to bottom-right
    let r = row + d, c = col + d;
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      const k = tileKey(r, c);
      if (!seen.has(k)) {
        seen.add(k);
        if (hasObstacle(r, c)) {
          obstacleHits.push({ row: r, col: c });
        } else if (grid[r][c] >= 0) {
          if (special[r] && special[r][c] > 0 && !(r === row && c === col)) {
            pendingToolActivations.push({ row: r, col: c, toolNum: special[r][c] });
          }
          targets.push({ row: r, col: c });
        }
      }
    }
    // Top-right to bottom-left
    r = row + d; c = col - d;
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      const k = tileKey(r, c);
      if (!seen.has(k)) {
        seen.add(k);
        if (hasObstacle(r, c)) {
          obstacleHits.push({ row: r, col: c });
        } else if (grid[r][c] >= 0) {
          if (special[r] && special[r][c] > 0 && !(r === row && c === col)) {
            pendingToolActivations.push({ row: r, col: c, toolNum: special[r][c] });
          }
          targets.push({ row: r, col: c });
        }
      }
    }
  }

  let pts = targets.length * 25;
  score += pts;
  scorePopups.push({
    x: boardX + col * tileSize + tileSize / 2,
    y: boardY + row * tileSize + tileSize / 2,
    text: '+' + pts, alpha: 1, dy: 0,
  });

  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  const cx = boardX + col * tileSize + tileSize / 2;
  const cy = boardY + row * tileSize + tileSize / 2;

  // Sort targets by distance for staggered animation
  const sortedTargets = [...targets].sort((a, b) => {
    const dA = Math.abs(a.row - row) + Math.abs(a.col - col);
    const dB = Math.abs(b.row - row) + Math.abs(b.col - col);
    return dA - dB;
  });

  triggerScreenShake(4);

  // Animate projectile flying along diagonals with staggered tile hits
  animations.push(new Animation(450, (t) => {
    const et = easeOut(t);
    for (let i = 0; i < sortedTargets.length; i++) {
      const tgt = sortedTargets[i];
      const dist = Math.abs(tgt.row - row) + Math.abs(tgt.col - col);
      const maxDist = Math.max(ROWS, COLS);
      const delay = (dist / maxDist) * 0.5;
      const lt = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
      if (lt > 0) {
        setOverride(tgt.row, tgt.col, { scale: 1 - lt * 0.8, alpha: 1 - lt });
        // Spawn dust on first frame of activation
        if (lt < 0.15 && lt > 0) {
          const tx = boardX + tgt.col * tileSize + tileSize / 2;
          const ty = boardY + tgt.row * tileSize + tileSize / 2;
          spawnSparkles(tx, ty, '#c8a080', 3);
        }
      }
    }
    // Draw projectile moving along diagonal
    const projDist = et * Math.max(ROWS, COLS) * tileSize;
    // TL-BR diagonal projectile
    const px1 = cx + projDist * 0.707;
    const py1 = cy + projDist * 0.707;
    // TR-BL diagonal projectile
    const px2 = cx - projDist * 0.707;
    const py2 = cy + projDist * 0.707;
  }, () => {
    for (const t of targets) {
      grid[t.row][t.col] = -1;
      clearOverride(t.row, t.col);
      removingTiles.delete(tileKey(t.row, t.col));
      const tx = boardX + t.col * tileSize + tileSize / 2;
      const ty = boardY + t.row * tileSize + tileSize / 2;
      spawnSparkles(tx, ty, '#c8a080', 3);
    }
    for (const h of obstacleHits) {
      damageObstacle(h.row, h.col, 'tool');
    }
    activatePendingTools(pendingToolActivations, () => {
      applyGravity();
    });
  }));
}

// Tool 10: Cloud — Shuffles entire board
function useCloud() {
  locked = true;
  // Collect all current tile types (skip obstacle cells — their gems are locked)
  const tiles = [];
  const shuffleCells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] >= 0 && !hasObstacle(r, c)) {
        tiles.push(grid[r][c]);
        shuffleCells.push({ r, c });
      }
    }
  }

  // Shrink all non-obstacle tiles
  animations.push(new Animation(300, (t) => {
    const et = easeOut(t);
    for (const { r, c } of shuffleCells) {
      setOverride(r, c, { scale: 1 - et * 0.8, alpha: 1 - et * 0.5 });
    }
  }, () => {
    // Shuffle
    for (let i = tiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    for (let i = 0; i < shuffleCells.length; i++) {
      grid[shuffleCells[i].r][shuffleCells[i].c] = tiles[i];
    }

    // Grow back in
    animations.push(new Animation(300, (t) => {
      const et = easeOutBounce(t);
      for (const { r, c } of shuffleCells) {
        setOverride(r, c, { scale: 0.2 + et * 0.8, alpha: 0.5 + et * 0.5 });
      }
    }, () => {
      for (const { r, c } of shuffleCells) {
        clearOverride(r, c);
      }
      processMatches();
    }));
  }));
}

// ── Tool Combos ──
function getCombo(toolA, toolB) {
  // Normalize order so (A,B) and (B,A) match the same combo
  const pair = [toolA, toolB].sort((a, b) => a - b);
  const key = pair[0] + ',' + pair[1];

  const combos = {
    '3,3': comboRainbowRainbow,   // Rainbow Star + Rainbow Star → clear everything
    '1,1': comboBombBomb,          // Bomb + Bomb → 5x5 mega explosion
    '2,2': comboLightningLightning, // Lightning + Lightning → clear entire board
    '1,2': comboBombLightning,     // Bomb + Lightning → 3-wide cross
    '1,3': comboRainbowBomb,       // Rainbow Star + Bomb → all of type → bombs → detonate
    '2,3': comboRainbowLightning,  // Rainbow Star + Lightning → all of type → lightning → fire
    '1,9': comboBombSlingshot,     // Bomb + Slingshot → diagonal explosion path
    '2,9': comboLightningSlingshot, // Lightning + Slingshot → row + col + diagonals
    '3,9': comboRainbowSlingshot,  // Rainbow + Slingshot → type-clear + diagonal
    '9,9': comboSlingshotSlingshot, // Slingshot + Slingshot → both diagonals X
  };

  return combos[key] || null;
}

// Bomb + Bomb → 5x5 mega explosion at center of board
function comboBombBomb() {
  locked = true;
  const centerR = Math.floor(ROWS / 2);
  const centerC = Math.floor(COLS / 2);
  const targets = [];
  for (let dr = -2; dr <= 2; dr++) {
    for (let dc = -2; dc <= 2; dc++) {
      const r = centerR + dr, c = centerC + dc;
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r][c] >= 0) {
        targets.push({ row: r, col: c });
      }
    }
  }

  const pts = targets.length * 40;
  score += pts;
  scorePopups.push({ x: W / 2, y: H / 2, text: 'MEGA BOMB +' + pts, alpha: 1, dy: 0 });

  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  const cx = boardX + centerC * tileSize + tileSize / 2;
  const cy = boardY + centerR * tileSize + tileSize / 2;

  // Phase 1: Pulsing bomb icon at center
  animations.push(new Animation(200, (t) => {
    const pulse = 1 + Math.sin(t * Math.PI * 6) * 0.4;
    setOverride(centerR, centerC, { scale: pulse });
  }, () => {
    clearOverride(centerR, centerC);
    // Phase 2: Massive explosion
    triggerFlash(0.7);
    triggerScreenShake(12);
    spawnExplosionRing(cx, cy, '#ff4081', tileSize * 4);
    spawnExplosionRing(cx, cy, '#ff6b8a', tileSize * 3);
    spawnShockwave(cx, cy);
    spawnFireParticles(cx, cy, 40);

    animations.push(new Animation(400, (t) => {
      const et = easeOut(t);
      for (const tgt of targets) {
        const dist = Math.abs(tgt.row - centerR) + Math.abs(tgt.col - centerC);
        const delay = dist * 0.08;
        const lt = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
        const s = lt < 0.15 ? 1 + lt * 3 : Math.max(0, 1.45 - (lt - 0.15) * 1.7);
        setOverride(tgt.row, tgt.col, { scale: s, alpha: 1 - lt });
      }
    }, () => {
      for (const t of targets) {
        grid[t.row][t.col] = -1;
        clearOverride(t.row, t.col);
        removingTiles.delete(tileKey(t.row, t.col));
        const tx = boardX + t.col * tileSize + tileSize / 2;
        const ty = boardY + t.row * tileSize + tileSize / 2;
        spawnHeartBurst(tx, ty, 3);
        // Staggered explosion rings per cell
        const dist = Math.abs(t.row - centerR) + Math.abs(t.col - centerC);
        setTimeout(() => {
          spawnExplosionRing(tx, ty, '#ff4081', tileSize);
          spawnFireParticles(tx, ty, 3);
        }, dist * 30);
      }
      applyGravity();
    }));
  }));
}

// Lightning + Lightning → clears ALL rows AND ALL columns (entire board!)

// Bomb + Lightning → clears full row + full column from center
function comboBombLightning() {
  locked = true;
  const row = Math.floor(ROWS / 2);
  const col = Math.floor(COLS / 2);
  const targets = [];
  const seen = new Set();
  // 3 parallel horizontal rows (3-wide cross)
  for (let dr = -1; dr <= 1; dr++) {
    const r = row + dr;
    if (r >= 0 && r < ROWS) {
      for (let c = 0; c < COLS; c++) {
        const k = tileKey(r, c);
        if (!seen.has(k) && grid[r][c] >= 0 && !hasObstacle(r, c)) {
          targets.push({ row: r, col: c }); seen.add(k);
        }
      }
    }
  }
  // 3 parallel vertical columns (3-wide cross)
  for (let dc = -1; dc <= 1; dc++) {
    const c = col + dc;
    if (c >= 0 && c < COLS) {
      for (let r = 0; r < ROWS; r++) {
        const k = tileKey(r, c);
        if (!seen.has(k) && grid[r][c] >= 0 && !hasObstacle(r, c)) {
          targets.push({ row: r, col: c }); seen.add(k);
        }
      }
    }
  }

  const pts = targets.length * 35;
  score += pts;
  scorePopups.push({ x: W / 2, y: H / 2, text: 'BOMB+LIGHTNING +' + pts, alpha: 1, dy: 0 });

  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  const cx = boardX + col * tileSize + tileSize / 2;
  const cy = boardY + row * tileSize + tileSize / 2;

  // 3 horizontal lightning arcs + 3 vertical
  for (let dr = -1; dr <= 1; dr++) {
    const y = boardY + (row + dr) * tileSize + tileSize / 2;
    if (row + dr >= 0 && row + dr < ROWS) {

// ── Input Handling ──
function canvasToGrid(cx, cy) {
  const col = Math.floor((cx - boardX) / tileSize);
  const row = Math.floor((cy - boardY) / tileSize);
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
    // Ignore voided cells
    if (!boardMask[row] || !boardMask[row][col]) return null;
    return { row, col };
  }
  return null;
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  return { x, y };
}

function handlePauseClick(cx, cy) {
  // Pause button area (top-right)
  const btnSize = tileSize * 0.7;
  const btnX = W - btnSize - 10;
  const btnY = 10;
  if (cx >= btnX && cx <= btnX + btnSize && cy >= btnY && cy <= btnY + btnSize) {
    paused = !paused;
    return true;
  }
  return false;
}

function handleRestartClick(cx, cy) {
  if (!gameOver) return false;
  // Match button position from drawGameOver()
  const isFinale = levelComplete && level === 20;
  const panelH = isFinale ? tileSize * 4.2 : tileSize * 3.5;
  const panelY = H / 2 - panelH / 2 - 10;
  // Reconstruct yOff to find button position
  let yOff = panelY + tileSize * 0.15;
  if (isFinale) { yOff += tileSize * 0.35 + tileSize * 0.4 + tileSize * 0.35; }
  else { yOff += tileSize * 0.32 + tileSize * 0.4; }
  yOff += tileSize * 0.55; // stars
  yOff += tileSize * 0.6; // score
  const btnW = 180, btnH = 44;
  const btnX = W / 2 - btnW / 2;
  const btnY = yOff;

  // Primary button (Next Level / Try Again)
  if (cx >= btnX && cx <= btnX + btnW && cy >= btnY && cy <= btnY + btnH) {
    // Save stars for completed level
    if (levelComplete) {
      const cfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
      const t = cfg.target;
      const stars = score >= t * 2 ? 3 : score >= t ? 2 : score >= t * 0.5 ? 1 : 0;
      saveLevelStars(level, stars);
    }
    restartGame();
    return true;
  }

  // "Back to Levels" button
  const btn2Y = btnY + btnH + 10;
  if ((launchedFromApp || levelComplete) && cx >= btnX && cx <= btnX + btnW && cy >= btn2Y && cy <= btn2Y + btnH) {
    // Save stars before leaving
    if (levelComplete) {
      const cfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
      const t = cfg.target;
      const stars = score >= t * 2 ? 3 : score >= t ? 2 : score >= t * 0.5 ? 1 : 0;
      saveLevelStars(level, stars);
      // Save next level as unlocked
      level++;
      saveProgress();
    }
    goBackToMenu();
    return true;
  }

  return false;
}

function restartGame() {
  // Only advance to next level if player completed it
  if (levelComplete) {
    level++;
    saveProgress();
  }
  // Otherwise retry same level — reset difficulty to normal for new level
  if (levelComplete) { currentDifficulty = 'normal'; difficultyScoreMultiplier = 1.0; }
  setupLevel(level);
  initToolInventory();
  score = 0;
  const cfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
  if (getLevelConfig(level).mode === 'timer') {
    timeLeft = cfg.time;
    movesLeft = 0;
  } else {
    movesLeft = cfg.moves;
    timeLeft = 99999;
  }
  gameOver = false;
  paused = false;
  selected = null;
  locked = false;
  animations = [];
  tileOverrides = {};
  removingTiles.clear();
  scorePopups = [];
  cascadeLevel = 0;
  heartParticles = [];
  sparkleParticles = [];
  explosionRings = [];
  fireParticles = [];
  electricArcs = [];
  shockwaveRings = [];
  flyingTool = null;
  clearHint();
  screenShake = { x: 0, y: 0, intensity: 0, decay: 0.88 };
  flashAlpha = 0;
  loveLetterPhase = 0;
  loveLetterTransformed = null;
  loveLetterExploded = null;
  guidedTutorial = null;
  levelComplete = false;
  levelCompleteToolQueue = [];
  levelCompleteDelay = 0;
  // Show tutorial for new level
  const levelCfg = getLevelConfig(level);
  if (levelCfg.intro) {
    showingTutorial = true;
    tutorialText = levelCfg.intro;
    paused = true;
  }
  // Wait for any new images, then init
  function waitAndInit() {
    if (imagesLoaded >= totalImages) {
      initGrid();
    } else {
      setTimeout(waitAndInit, 50);
    }
  }
  waitAndInit();
}

function handleToolbarClick(cx, cy) {
  // Check page arrows
  if (getUnlockedTools().length > TOOLBAR_SLOTS) {
    const arrowSize = toolSlotSize * 0.3;
    const arrowY = toolbarY + toolbarH / 2;
    const maxPage = Math.ceil(getUnlockedTools().length / TOOLBAR_SLOTS) - 1;

    // Left arrow
    if (cx < 14 + arrowSize + 10 && cy > toolbarY && cy < toolbarY + toolbarH && toolbarPage > 0) {
      toolbarPage--;
      activeTool = null;
      return true;
    }
    // Right arrow
    if (cx > W - 14 - arrowSize - 10 && cy > toolbarY && cy < toolbarY + toolbarH && toolbarPage < maxPage) {
      toolbarPage++;
      activeTool = null;
      return true;
    }
  }

  // Check tool slots
  const slots = getToolbarSlots();
  for (let i = 0; i < slots.length; i++) {
    const r = getToolSlotRect(i);
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      const tool = slots[i];
      const count = toolInventory[tool.tool] || 0;
      if (count <= 0) return true; // no stock, ignore

      if (tool.tool === 11) {
        // Love Letter: activate immediately (no board target needed)
        toolInventory[11] = (toolInventory[11] || 0) - 1;
        activeTool = null;
        activateLoveLetter();
      } else if (tool.tool === 5) {
        // Stopwatch: activate immediately — adds time
        toolInventory[5] = (toolInventory[5] || 0) - 1;
        activeTool = null;
        useStopwatch();
      } else if (activeTool !== null && activeTool !== tool.tool) {
        // Two different tools selected — check for combo
        const combo = getCombo(activeTool, tool.tool);
        if (combo) {
          toolInventory[activeTool]--;
          toolInventory[tool.tool]--;
          activeTool = null;
          combo();
        } else {
          activeTool = tool.tool; // no combo, just switch selection
        }
      } else if (activeTool === tool.tool) {
        // Same tool tapped twice — check for same-tool combo
        if ((tool.tool === 1 || tool.tool === 2 || tool.tool === 3) && count >= 2) {
          const combo = getCombo(tool.tool, tool.tool);
          if (combo) {
            toolInventory[tool.tool] -= 2;
            activeTool = null;
            combo();
          } else {
            activeTool = null;
          }
        } else {
          activeTool = null; // deselect
        }
      } else {
        activeTool = tool.tool; // select
      }
      return true;
    }
  }
  return false;
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const pos = getCanvasPos(e);

  // Reset hint on any interaction
  clearHint();

  // Spouse panel intercepts all clicks when open
  if (showSpousePanel) { handleSpousePanelClick(pos.x, pos.y); return; }

  // Check spouse button click (bottom-right of HUD area)
  const sbSize = tileSize * 0.4;
  const sbX = W - sbSize - 12, sbY = hudH - sbSize - tileSize * 0.4;
  if (pos.x >= sbX && pos.x <= sbX + sbSize && pos.y >= sbY && pos.y <= sbY + sbSize) {
    toggleSpousePanel();
    return;
  }

  // Always check toolbar
  if (handleToolbarClick(pos.x, pos.y)) return;

  if (locked || paused || gameOver) {
    if (gameOver) handleRestartClick(pos.x, pos.y);
    else if (showingTutorial) {
      // Check if a difficulty button was tapped
      let diffTapped = false;
      for (const btn of tutorialDiffBtns) {
        if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
          currentDifficulty = btn.diff;
          difficultyScoreMultiplier = btn.diff === 'hard' ? 1.5 : 1.0;
          diffTapped = true;
          break;
        }
      }
      if (!diffTapped) {
        // Dismiss tutorial and start the level with chosen difficulty
        const cfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
        if (cfg.mode === 'timer') {
          timeLeft = cfg.time;
          movesLeft = 0;
        } else {
          movesLeft = cfg.moves;
          timeLeft = 99999; // no time limit for move-based levels
        }
        showingTutorial = false;
        paused = false;
      }
    }
    else handlePauseClick(pos.x, pos.y);
    return;
  }
  if (handlePauseClick(pos.x, pos.y)) return;

  const cell = canvasToGrid(pos.x, pos.y);
  if (!cell) return;
  pointerDown = { x: pos.x, y: pos.y, row: cell.row, col: cell.col };
});

canvas.addEventListener('pointermove', (e) => {
  e.preventDefault();
  if (!pointerDown || locked) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - pointerDown.x;
  const dy = pos.y - pointerDown.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > tileSize * 0.3) {
    // Swipe detected
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      dc = dx > 0 ? 1 : -1;
    } else {
      dr = dy > 0 ? 1 : -1;
    }
    const tr = pointerDown.row + dr;
    const tc = pointerDown.col + dc;
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS &&
        boardMask[tr] && boardMask[tr][tc]) {
      doSwap(pointerDown.row, pointerDown.col, tr, tc);
    }
    pointerDown = null;
    selected = null;
  }
});

canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  if (!pointerDown || locked) { pointerDown = null; return; }

  const pos = getCanvasPos(e);
  const dx = pos.x - pointerDown.x;
  const dy = pos.y - pointerDown.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < tileSize * 0.3) {
    // Tap
    const cell = canvasToGrid(pos.x, pos.y);
    if (!cell) { pointerDown = null; return; }

    // If a tool is active, fly it to target then activate
    if (activeTool !== null) {
      const toolNum = activeTool;
      activeTool = null;
      locked = true;
      animateToolFlyTo(toolNum, cell.row, cell.col, () => {
        useTool(toolNum, cell.row, cell.col);
      });
      pointerDown = null;
      return;
    }

    if (selected) {
      if (selected.row === cell.row && selected.col === cell.col) {
        selected = null; // Deselect
      } else if (isAdjacent(selected.row, selected.col, cell.row, cell.col)) {
        doSwap(selected.row, selected.col, cell.row, cell.col);
      } else {
        selected = cell; // Select new tile
      }
    } else {
      selected = cell;
    }
  }

  pointerDown = null;
});

canvas.addEventListener('pointercancel', () => { pointerDown = null; });

// ── Rendering ──
function drawRoundedRect(x, y, w, h, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function drawTile(row, col, type, overrides) {
  if (type < 0) return;
  const info = TILE_TYPES[type];
  const pad = 2;
  const radius = tileSize * 0.15;

  let x = boardX + col * tileSize + pad;
  let y = boardY + row * tileSize + pad;
  let w = tileSize - pad * 2;
  let h = tileSize - pad * 2;
  let alpha = 1;
  let scale = 1;

  if (overrides) {
    if (overrides.x !== undefined) x = overrides.x + pad;
    if (overrides.y !== undefined) y = overrides.y + pad;
    if (overrides.alpha !== undefined) alpha = overrides.alpha;
    if (overrides.scale !== undefined) scale = overrides.scale;
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  if (scale !== 1) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
  }

  // Icon image (no background - just the gem)
  const cachedImg = imageCache[info.file];
  if (cachedImg) {
    const imgPad = w * 0.05;
    ctx.drawImage(cachedImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
  } else {
    // Fallback: draw first letter
    ctx.fillStyle = '#c2185b';
    ctx.font = 'bold ' + (w * 0.4) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.name[0], x + w / 2, y + h / 2);
  }

  ctx.restore();
}

function drawSpecialTile(row, col, type, overrides) {
  const sp = special[row] && special[row][col];
  if (!sp || sp <= 0) return;
  const toolDef = TOOLS.find(t => t.tool === sp);
  if (!toolDef) return;

  const pad = 2;
  let x = boardX + col * tileSize + pad;
  let y = boardY + row * tileSize + pad;
  let w = tileSize - pad * 2;
  let h = tileSize - pad * 2;
  let alpha = 1;
  let scale = 1;

  if (overrides) {
    if (overrides.x !== undefined) x = overrides.x + pad;
    if (overrides.y !== undefined) y = overrides.y + pad;
    if (overrides.alpha !== undefined) alpha = overrides.alpha;
    if (overrides.scale !== undefined) scale = overrides.scale;
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  if (scale !== 1) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
  }

  // Subtle pulsing white back-glow (no solid background)
  const pulse = 0.3 + 0.15 * Math.sin(performance.now() / 400);
  ctx.shadowColor = 'rgba(255, 255, 255, ' + pulse + ')';
  ctx.shadowBlur = 8 + 4 * Math.sin(performance.now() / 400);
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h / 2, w * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, ' + (pulse * 0.5) + ')';
  ctx.fill();
  ctx.shadowBlur = 0;

  // Tool icon — full size, floating on top of glow
  const toolImg = imageCache[toolDef.file];
  if (toolImg) {
    const imgPad = w * 0.05;
    ctx.drawImage(toolImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
  }

  ctx.restore();
}

function drawObstacle(row, col, obs) {
  const pad = 1;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;

  const def = OBSTACLE_TYPES[obs.type];
  if (!def) return;

  // Dark background behind obstacle so it stands out from normal tiles
  ctx.save();
  const bgRadius = tileSize * 0.12;
  drawRoundedRect(x, y, w, h, bgRadius);
  ctx.fillStyle = 'rgba(40, 30, 50, 0.55)';
  ctx.fill();
  ctx.restore();

  // For ice: draw the gem behind at reduced opacity (gem is visible through ice)
  if (obs.type === 'ice') {
    const gemType = grid[row][col];
    if (gemType >= 0 && TILE_TYPES[gemType]) {
      const gemInfo = TILE_TYPES[gemType];
      const gemImg = imageCache[gemInfo.file];
      if (gemImg) {
        ctx.save();
        ctx.globalAlpha = 0.6;
        const imgPad = w * 0.05;
        ctx.drawImage(gemImg, x + imgPad + 1, y + imgPad + 1, w - imgPad * 2, h - imgPad * 2);
        ctx.restore();
      }
    }
  }

  // Pick sprite based on current HP: hp maps to sprite index (hp is 1-indexed)
  // sprites array: [stage1 (broken), stage2 (mid), stage3 (intact)]
  // hp=maxHp → last sprite (intact), hp=1 → first sprite (almost broken)
  const spriteIndex = Math.min(obs.hp, def.sprites.length) - 1;
  const spriteFile = def.sprites[spriteIndex];
  const img = imageCache[spriteFile];

  ctx.save();

  if (img) {
    // Draw the obstacle sprite over the tile
    ctx.drawImage(img, x, y, w, h);

    // Subtle damage shake effect when HP < max
    if (obs.hp < obs.maxHp) {
      // Small crack overlay lines to hint at damage
      const damage = 1 - obs.hp / obs.maxHp;
      ctx.globalAlpha = damage * 0.4;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.3, y + h * 0.15);
      ctx.lineTo(x + w * 0.5, y + h * 0.45);
      ctx.lineTo(x + w * 0.65, y + h * 0.3);
      ctx.stroke();
      if (damage > 0.5) {
        ctx.beginPath();
        ctx.moveTo(x + w * 0.6, y + h * 0.55);
        ctx.lineTo(x + w * 0.45, y + h * 0.8);
        ctx.stroke();
      }
    }
  } else {
    // Fallback: colored overlay if image not loaded yet
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = def.color1;
    drawRoundedRect(x, y, w, h, tileSize * 0.15);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (w * 0.3) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(obs.hp + '❤️', x + w / 2, y + h / 2);
  }

  // HP indicator dots (bottom of tile)
  if (obs.maxHp > 1) {
    const dotR = Math.max(2, w * 0.04);
    const dotSpacing = dotR * 3.5;
    const dotsWidth = (obs.maxHp - 1) * dotSpacing;
    const dotStartX = x + w / 2 - dotsWidth / 2;
    const dotY = y + h - dotR * 2.5;
    for (let i = 0; i < obs.maxHp; i++) {
      ctx.beginPath();
      ctx.arc(dotStartX + i * dotSpacing, dotY, dotR, 0, Math.PI * 2);
      ctx.fillStyle = i < obs.hp ? '#fff' : 'rgba(0,0,0,0.3)';
      ctx.globalAlpha = 0.9;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawPinkHeart(row, col) {
  const pad = 2;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;
  const heartImg = imageCache[PINK_HEART_FILE];
  if (heartImg) {
    const imgPad = w * 0.05;
    // Subtle pulsing glow
    ctx.save();
    ctx.shadowColor = '#ff4081';
    ctx.shadowBlur = 8;
    ctx.drawImage(heartImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
    ctx.restore();
  } else {
    ctx.fillStyle = '#ff4081';
    ctx.font = 'bold ' + (w * 0.6) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2764', x + w / 2, y + h / 2);
  }
}

function drawSelectedHighlight(row, col, time) {
  const pad = 1;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;
  const radius = tileSize * 0.15;

  const pulse = 0.5 + 0.5 * Math.sin(time * 5);
  ctx.save();
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.6 + pulse * 0.4})`;
  ctx.lineWidth = 3 + pulse;
  drawRoundedRect(x, y, w, h, radius);
  ctx.stroke();
  ctx.restore();
}

function drawBoard() {
  // Board shadow/border
  const bx = boardX - 4;
  const by = boardY - 4;
  const bw = tileSize * COLS + 8;
  const bh = tileSize * ROWS + 8;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 4;
  drawRoundedRect(bx, by, bw, bh, 12);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fill();
  ctx.restore();

  // Draw individual cell backgrounds
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = boardX + c * tileSize;
      const y = boardY + r * tileSize;
      if (boardMask[r] && boardMask[r][c]) {
        // Active cell - subtle checkerboard
        const shade = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.15)';
        ctx.fillStyle = shade;
        ctx.fillRect(x, y, tileSize, tileSize);
      } else {
        // Voided cell - darker, no tile here
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(x, y, tileSize, tileSize);
      }
    }
  }
}

function drawHUD() {
  const cx = W / 2;

  // Level
  ctx.save();
  ctx.fillStyle = '#c2185b';
  ctx.font = 'bold ' + (tileSize * 0.32) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Level ' + level, cx, 8);

  // Score with target (adjusted for difficulty)
  const lvlCfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
  ctx.font = 'bold ' + (tileSize * 0.45) + 'px sans-serif';
  ctx.fillStyle = score >= lvlCfg.target ? '#4caf50' : '#880e4f';
  ctx.fillText(score.toLocaleString() + ' / ' + lvlCfg.target.toLocaleString(), cx, 8 + tileSize * 0.35);

  // Timer or Moves display
  const lvlMode = getLevelConfig(level).mode;
  ctx.font = 'bold ' + (tileSize * 0.3) + 'px sans-serif';
  ctx.textAlign = 'left';
  if (lvlMode === 'moves') {
    // Moves counter
    if (movesLeft <= 5 && !gameOver) {
      const flash = Math.sin(performance.now() / 200) > 0;
      ctx.fillStyle = flash ? '#ff1744' : '#ad1457';
    } else {
      ctx.fillStyle = '#ad1457';
    }
    ctx.fillText('\uD83D\uDD04 ' + movesLeft + ' moves', 12, 15);
  } else {
    // Timer
    const mins = Math.floor(Math.max(0, timeLeft) / 60);
    const secs = Math.floor(Math.max(0, timeLeft) % 60);
    const timerStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
    // Flash red when low time
    if (timeLeft <= 10 && !gameOver) {
      const flash = Math.sin(performance.now() / 200) > 0;
      ctx.fillStyle = flash ? '#ff1744' : '#ad1457';
    } else {
      ctx.fillStyle = '#ad1457';
    }
    ctx.fillText('⏱ ' + timerStr, 12, 15);
  }

  // Difficulty badge (subtle, top-right area near pause button)
  if (currentDifficulty !== 'normal') {
    const badgeColors = { easy: '#4caf50', hard: '#f44336' };
    const badgeLabels = { easy: 'Easy', hard: 'Hard' };
    ctx.font = (tileSize * 0.2) + 'px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = badgeColors[currentDifficulty] || '#888';
    const pauseBtnSize = tileSize * 0.55;
    ctx.fillText(badgeLabels[currentDifficulty], W - pauseBtnSize - 20, 15);
  }

  // Pause button
  const btnSize = tileSize * 0.55;
  const btnX = W - btnSize - 12;
  const btnY = 12;

  drawRoundedRect(btnX, btnY, btnSize, btnSize, 6);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  ctx.strokeStyle = '#c2185b';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Pause icon (two bars)
  ctx.fillStyle = '#c2185b';
  if (paused) {
    // Play triangle
    ctx.beginPath();
    ctx.moveTo(btnX + btnSize * 0.35, btnY + btnSize * 0.2);
    ctx.lineTo(btnX + btnSize * 0.8, btnY + btnSize * 0.5);
    ctx.lineTo(btnX + btnSize * 0.35, btnY + btnSize * 0.8);
    ctx.closePath();
    ctx.fill();
  } else {
    const barW = btnSize * 0.18;
    ctx.fillRect(btnX + btnSize * 0.28, btnY + btnSize * 0.22, barW, btnSize * 0.56);
    ctx.fillRect(btnX + btnSize * 0.54, btnY + btnSize * 0.22, barW, btnSize * 0.56);
  }

  // Star progress bar
  const barY = hudH - tileSize * 0.3;
  const barH = tileSize * 0.16;
  const barW = W - 24;
  const barX = 12;

  // Bar background
  drawRoundedRect(barX, barY, barW, barH, barH / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Bar fill — based on level target (3 stars = 2x target)
  const lvlTarget = applyDifficulty(getLevelConfig(level), currentDifficulty).target;
  const maxScore = lvlTarget * 2; // 3 stars at 2x target
  const starThresholds = [lvlTarget * 0.5, lvlTarget, lvlTarget * 2]; // 1, 2, 3 stars
  const fillW = Math.min(score / maxScore, 1) * barW;
  if (fillW > 0) {
    ctx.save();
    ctx.beginPath();
    drawRoundedRect(barX, barY, barW, barH, barH / 2);
    ctx.clip();
    const barGrad = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
    barGrad.addColorStop(0, '#ff6b8a');
    barGrad.addColorStop(1, score >= lvlTarget ? '#4caf50' : '#ff4081');
    ctx.fillStyle = barGrad;
    ctx.fillRect(barX, barY, fillW, barH);
    ctx.restore();
  }

  // Star markers at 50%, 100%, 200% of target
  const starChar = '\u2605';
  ctx.font = (tileSize * 0.25) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 3; i++) {
    const sx = barX + (starThresholds[i] / maxScore) * barW;
    ctx.fillStyle = score >= starThresholds[i] ? '#ffd700' : 'rgba(255,255,255,0.6)';
    ctx.fillText(starChar, sx, barY + barH / 2);
  }

  ctx.restore();
}

function drawScorePopups(dt) {
  ctx.save();
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.dy -= dt * 60;
    p.alpha -= dt * 1.5;
    if (p.alpha <= 0) {
      scorePopups.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#c2185b';
    ctx.lineWidth = 2;
    ctx.font = 'bold ' + (tileSize * 0.35) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(p.text, p.x, p.y + p.dy);
    ctx.fillText(p.text, p.x, p.y + p.dy);
  }
  ctx.restore();
}

function drawGameOver() {
  // Overlay
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Determine if this is a level 20 victory (special celebration)
  const isFinale = levelComplete && level === 20;

  // Panel
  const panelW = W * 0.8;
  const panelH = isFinale ? tileSize * 4.2 : tileSize * 3.5;
  const panelX = (W - panelW) / 2;
  const panelY = H / 2 - panelH / 2 - 10;

  drawRoundedRect(panelX, panelY, panelW, panelH, 16);
  ctx.fillStyle = '#fff';
  ctx.fill();

  let yOff = panelY + tileSize * 0.15;

  // Title text
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (isFinale) {
    ctx.fillStyle = '#e91e63';
    ctx.font = 'bold ' + (tileSize * 0.42) + 'px sans-serif';
    yOff += tileSize * 0.35;
    ctx.fillText('Congratulations!', W / 2, yOff);
    ctx.fillStyle = '#880e4f';
    ctx.font = (tileSize * 0.24) + 'px sans-serif';
    yOff += tileSize * 0.4;
    ctx.fillText('You completed all 20 levels!', W / 2, yOff);
    yOff += tileSize * 0.35;
  } else if (levelComplete) {
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold ' + (tileSize * 0.36) + 'px sans-serif';
    yOff += tileSize * 0.32;
    ctx.fillText('Level Complete!', W / 2, yOff);
    yOff += tileSize * 0.4;
  } else {
    ctx.fillStyle = '#880e4f';
    ctx.font = 'bold ' + (tileSize * 0.36) + 'px sans-serif';
    yOff += tileSize * 0.32;
    const goMsg = getLevelConfig(level).mode === 'moves' ? 'No Moves Left!' : 'Time\'s Up!';
    ctx.fillText(goMsg, W / 2, yOff);
    yOff += tileSize * 0.4;
  }

  // Stars based on level target (difficulty-adjusted)
  const cfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
  const t = cfg.target;
  const stars = score >= t * 2 ? 3 : score >= t ? 2 : score >= t * 0.5 ? 1 : 0;
  ctx.font = (tileSize * 0.6) + 'px serif';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < stars ? '#ffd700' : '#ddd';
    ctx.fillText('\u2605', panelX + panelW * (0.3 + i * 0.2), yOff);
  }
  yOff += tileSize * 0.55;

  // Score
  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold ' + (tileSize * 0.4) + 'px sans-serif';
  ctx.fillText('Score: ' + score.toLocaleString(), W / 2, yOff);
  yOff += tileSize * 0.6;

  // Primary button (Next Level / Try Again)
  const btnW = 180, btnH = 44;
  const btnX = W / 2 - btnW / 2;
  const btnY = yOff;

  drawRoundedRect(btnX, btnY, btnW, btnH, 22);
  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#ff6b8a');
  btnGrad.addColorStop(1, '#e91e63');
  ctx.fillStyle = btnGrad;
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (tileSize * 0.28) + 'px sans-serif';
  const btnLabel = isFinale ? 'Keep Playing!' : (levelComplete ? 'Next Level' : 'Try Again');
  ctx.fillText(btnLabel, W / 2, btnY + btnH / 2);

  // "Back to Levels" button (always shown when launched from app, or as secondary option)
  if (launchedFromApp || levelComplete) {
    const btn2Y = btnY + btnH + 10;
    drawRoundedRect(btnX, btn2Y, btnW, btnH, 22);
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fill();
    ctx.strokeStyle = '#c2185b';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#c2185b';
    ctx.font = (tileSize * 0.24) + 'px sans-serif';
    ctx.fillText('Back to Levels', W / 2, btn2Y + btnH / 2);
  }

  ctx.restore();
}

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  if (showingTutorial) {
    // Tutorial overlay — level intro card with difficulty picker
    const panelW = W * 0.85;
    const panelH = tileSize * 5.5;
    const panelX = (W - panelW) / 2;
    const panelY = H / 2 - panelH / 2;

    drawRoundedRect(panelX, panelY, panelW, panelH, 16);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Level number
    const lvlCfg = getLevelConfig(level);
    ctx.fillStyle = '#c2185b';
    ctx.font = 'bold ' + (tileSize * 0.5) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Level ' + level, W / 2, panelY + tileSize * 0.6);

    // Mode badge (timer or moves)
    const modeLabel = lvlCfg.mode === 'timer' ? '⏱ Timer Mode' : '🔄 Moves Mode';
    ctx.fillStyle = '#888';
    ctx.font = (tileSize * 0.26) + 'px sans-serif';
    ctx.fillText(modeLabel, W / 2, panelY + tileSize * 1.05);

    // Intro text (word wrap)
    ctx.fillStyle = '#555';
    ctx.font = (tileSize * 0.28) + 'px sans-serif';
    const maxTextW = panelW - 30;
    const words = tutorialText.split(' ');
    let lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxTextW) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    const lineH = tileSize * 0.35;
    const textStartY = panelY + tileSize * 1.5;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], W / 2, textStartY + i * lineH);
    }

    // Difficulty selector buttons
    const diffBtnW = (panelW - 40) / 3;
    const diffBtnH = tileSize * 0.7;
    const diffBtnY = panelY + panelH - tileSize * 1.9;
    const diffBtnStartX = panelX + 10;
    const difficulties = ['easy', 'normal', 'hard'];
    const diffLabels = ['Easy', 'Normal', 'Hard'];
    const diffColors = ['#4caf50', '#e91e63', '#f44336'];
    const diffBgActive = ['#e8f5e9', '#fce4ec', '#ffebee'];
    const diffBgInactive = ['#f5f5f5', '#f5f5f5', '#f5f5f5'];

    // Store button rects for click handling
    tutorialDiffBtns = [];
    for (let i = 0; i < 3; i++) {
      const bx = diffBtnStartX + i * (diffBtnW + 5);
      const isActive = currentDifficulty === difficulties[i];
      tutorialDiffBtns.push({ x: bx, y: diffBtnY, w: diffBtnW, h: diffBtnH, diff: difficulties[i] });

      drawRoundedRect(bx, diffBtnY, diffBtnW, diffBtnH, 8);
      ctx.fillStyle = isActive ? diffBgActive[i] : diffBgInactive[i];
      ctx.fill();
      ctx.strokeStyle = isActive ? diffColors[i] : '#ccc';
      ctx.lineWidth = isActive ? 2.5 : 1;
      ctx.stroke();

      ctx.fillStyle = isActive ? diffColors[i] : '#999';
      ctx.font = (isActive ? 'bold ' : '') + (tileSize * 0.26) + 'px sans-serif';
      ctx.fillText(diffLabels[i], bx + diffBtnW / 2, diffBtnY + diffBtnH / 2);
    }

    // Show what the selected difficulty means
    const dcfg = applyDifficulty(lvlCfg, currentDifficulty);
    ctx.fillStyle = '#888';
    ctx.font = (tileSize * 0.22) + 'px sans-serif';
    const infoStr = lvlCfg.mode === 'timer'
      ? 'Time: ' + dcfg.time + 's — Target: ' + dcfg.target.toLocaleString()
      : 'Moves: ' + dcfg.moves + ' — Target: ' + dcfg.target.toLocaleString();
    ctx.fillText(infoStr, W / 2, diffBtnY + diffBtnH + tileSize * 0.35);

    // Tap to start
    const pulse = 0.5 + 0.3 * Math.sin(performance.now() / 500);
    ctx.fillStyle = `rgba(233, 30, 99, ${pulse})`;
    ctx.font = (tileSize * 0.24) + 'px sans-serif';
    ctx.fillText('Tap to start!', W / 2, panelY + panelH - tileSize * 0.35);
  } else {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (tileSize * 0.6) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Paused', W / 2, H / 2);
  }
  ctx.restore();
}

// ── Main Loop ──
let lastTime = 0;

function frame(now) {
  requestAnimationFrame(frame);

  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.1) : 0.016;
  lastTime = now;

  if (paused) {
    // Still draw but don't update
    render(now / 1000, dt);
    if (!showSpousePanel) drawPauseOverlay();
    drawSpousePanel();
    return;
  }

  // Update guided tutorial post-message timer
  if (guidedTutorial && guidedTutorial.done && guidedTutorial.postTimer > 0) {
    guidedTutorial.postTimer -= dt;
    if (guidedTutorial.postTimer <= 0) {
      guidedTutorial = null; // Tutorial fully complete, remove overlay
    }
  }

  // Countdown timer — only for timer-based levels (stop counting during level complete)
  if (getLevelConfig(level).mode === 'timer' && !gameOver && !locked && !levelComplete && timeLeft > 0) {
    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      gameOver = true;
      sfxGameOver();
    }
  }
  // Move-based game over check (when moves reach 0 and not level complete)
  if (getLevelConfig(level).mode === 'moves' && !gameOver && !levelComplete && movesLeft <= 0 && !locked) {
    gameOver = true;
    sfxGameOver();
  }

  // Hint timer — show hint after inactivity (disabled during guided tutorial)
  if (!gameOver && !locked && !levelComplete && !paused && !(guidedTutorial && !guidedTutorial.done)) {
    hintTimer += dt;
    if (hintTimer >= HINT_DELAY && !hintCells) {
      hintCells = findHintMove();
    }
  }

  // Level complete — activate board tools one by one
  if (levelComplete && !locked && levelCompleteToolQueue.length > 0) {
    levelCompleteDelay -= dt;
    if (levelCompleteDelay <= 0) {
      const next = levelCompleteToolQueue.shift();
      // Activate this tool on the board
      if (special[next.row] && special[next.row][next.col] > 0) {
        const toolNum = special[next.row][next.col];
        special[next.row][next.col] = 0;
        activateSpecialOnBoard(toolNum, next.row, next.col);
      }
      levelCompleteDelay = 0.6; // delay between each activation
    }
  } else if (levelComplete && !locked && levelCompleteToolQueue.length === 0) {
    // All tools activated, show game over after brief delay
    levelCompleteDelay -= dt;
    if (levelCompleteDelay <= 0) {
      gameOver = true;
    }
  }

  // Update Love Letter animation
  if (loveLetterPhase > 0) {
    loveLetterTimer += dt;
    const TRANSFORM_DURATION = 1.2; // total time for all tiles to become hearts
    const HOLD_DURATION = 0.3;      // brief pause with all hearts showing
    const EXPLODE_STAGGER = 0.6;    // stagger explosions

    if (loveLetterPhase === 1) {
      // Phase 1: Transform tiles to pink hearts from center out
      const progress = Math.min(loveLetterTimer / TRANSFORM_DURATION, 1);
      const transformedCount = Math.floor(progress * loveLetterTransformOrder.length);

      // Mark tiles as transformed (store in a set for rendering)
      if (!loveLetterTransformed) loveLetterTransformed = new Set();
      for (let i = 0; i < transformedCount; i++) {
        const cell = loveLetterTransformOrder[i];
        loveLetterTransformed.add(cell.r + ',' + cell.c);
      }

      if (progress >= 1) {
        loveLetterPhase = 2;
        loveLetterTimer = 0;
      }
    } else if (loveLetterPhase === 2) {
      // Phase 2: Hold briefly then explode all tiles into heart particles
      if (loveLetterTimer >= HOLD_DURATION) {
        const explodeProgress = (loveLetterTimer - HOLD_DURATION) / EXPLODE_STAGGER;

        if (!loveLetterExploded) loveLetterExploded = new Set();

        const explodedCount = Math.floor(Math.min(explodeProgress, 1) * loveLetterTransformOrder.length);
        for (let i = 0; i < explodedCount; i++) {
          const cell = loveLetterTransformOrder[i];
          const key = cell.r + ',' + cell.c;
          if (!loveLetterExploded.has(key)) {
            loveLetterExploded.add(key);
            // Spawn heart particles at this cell
            const px = boardX + cell.c * tileSize + tileSize / 2;
            const py = boardY + cell.r * tileSize + tileSize / 2;
            spawnHeartBurst(px, py, 4);
          }
        }

        if (explodeProgress >= 1 && loveLetterTimer >= HOLD_DURATION + EXPLODE_STAGGER + 0.3) {
          // All done — clear the board, add score, refill
          const totalCells = ROWS * COLS;
          score += totalCells * 30;
          scorePopups.push({
            x: W / 2, y: H / 2,
            text: '+' + (totalCells * 30),
            alpha: 1, dy: 0,
          });

          // Reset grid and fill with new tiles
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = -1;
            }
          }
          loveLetterPhase = 0;
          loveLetterTransformed = null;
          loveLetterExploded = null;
          // Clear all obstacles (Love Letter destroys everything!)
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              obstacles[r][c] = null;
              special[r][c] = 0;
            }
          }
          // Refill from top (gravity animation)
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = randomType();
            }
          }
          // Animate tiles falling in from top
          for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
              const fromY = boardY + (r - ROWS) * tileSize;
              const toY = boardY + r * tileSize;
              setOverride(r, c, { y: fromY, targetY: toY });
            }
          }
          animations.push(new Animation(FALL_DUR * 2, (t) => {
            const et = easeOutBounce(t);
            for (let c = 0; c < COLS; c++) {
              for (let r = 0; r < ROWS; r++) {
                const fromY = boardY + (r - ROWS) * tileSize;
                const toY = boardY + r * tileSize;
                setOverride(r, c, { y: fromY + (toY - fromY) * et });
              }
            }
          }, () => {
            for (let r = 0; r < ROWS; r++) {
              for (let c = 0; c < COLS; c++) {
                clearOverride(r, c);
              }
            }
            // Check for any accidental matches
            processMatches();
          }));
        }
      }
    }
  }

  // Update animations
  for (let i = animations.length - 1; i >= 0; i--) {
    animations[i].tick(dt * 1000);
    if (animations[i].done) {
      animations.splice(i, 1);
    }
  }

  render(now / 1000, dt);

  if (gameOver) drawGameOver();
  drawSpousePanel();
}

function getUnlockedTools() {
  return TOOLS.filter(t => {
    const unlockLvl = TOOL_UNLOCK_LEVEL[t.tool] || 1;
    return level >= unlockLvl;
  });
}

function getToolbarSlots() {
  const unlocked = getUnlockedTools();
  const start = toolbarPage * TOOLBAR_SLOTS;
  return unlocked.slice(start, start + TOOLBAR_SLOTS);
}

function getToolSlotRect(index) {
  const slots = getToolbarSlots();
  const totalW = slots.length * toolSlotSize + (slots.length - 1) * 6;
  const startX = (W - totalW) / 2;
  return {
    x: startX + index * (toolSlotSize + 6),
    y: toolbarY + (toolbarH - toolSlotSize) / 2,
    w: toolSlotSize,
    h: toolSlotSize
  };
}

function drawToolbar() {
  // Background bar
  drawRoundedRect(6, toolbarY, W - 12, toolbarH, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  const slots = getToolbarSlots();
  for (let i = 0; i < slots.length; i++) {
    const tool = slots[i];
    const r = getToolSlotRect(i);
    const count = toolInventory[tool.tool] || 0;
    const isActive = activeTool === tool.tool;

    // Slot background
    drawRoundedRect(r.x, r.y, r.w, r.h, 8);
    if (isActive) {
      ctx.fillStyle = 'rgba(255, 152, 0, 0.5)';
      ctx.fill();
      ctx.strokeStyle = '#ff9800';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else if (count > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fill();
    }

    // Tool icon
    const img = imageCache[tool.file];
    if (img) {
      ctx.save();
      if (count === 0) ctx.globalAlpha = 0.35;
      const iconPad = r.w * 0.12;
      ctx.drawImage(img, r.x + iconPad, r.y + iconPad, r.w - iconPad * 2, r.h - iconPad * 2);
      ctx.restore();
    }

    // Count badge
    if (count > 0) {
      const badgeR = toolSlotSize * 0.18;
      const bx = r.x + r.w - badgeR - 1;
      const by = r.y + r.h - badgeR - 1;
      ctx.beginPath();
      ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
      ctx.fillStyle = '#e91e63';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + (badgeR * 1.2) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(count, bx, by);
    }

    // "NEW" badge for freshly unlocked tool (pulsing glow)
    if (tool.tool === newlyUnlockedTool && count > 0) {
      const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 300);
      ctx.save();
      ctx.globalAlpha = pulse;
      const newBadgeW = r.w * 0.55;
      const newBadgeH = r.h * 0.22;
      const nbx = r.x + (r.w - newBadgeW) / 2;
      const nby = r.y - newBadgeH * 0.4;
      drawRoundedRect(nbx, nby, newBadgeW, newBadgeH, newBadgeH / 2);
      ctx.fillStyle = '#ff9800';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + (newBadgeH * 0.7) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('NEW', nbx + newBadgeW / 2, nby + newBadgeH / 2);
      ctx.restore();
    }
  }

  // Page arrows if more than 5 tools
  if (getUnlockedTools().length > TOOLBAR_SLOTS) {
    const arrowSize = toolSlotSize * 0.3;
    const arrowY = toolbarY + toolbarH / 2;

    // Left arrow
    ctx.fillStyle = toolbarPage > 0 ? '#c2185b' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(14, arrowY);
    ctx.lineTo(14 + arrowSize, arrowY - arrowSize * 0.6);
    ctx.lineTo(14 + arrowSize, arrowY + arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();

    // Right arrow
    const maxPage = Math.ceil(getUnlockedTools().length / TOOLBAR_SLOTS) - 1;
    ctx.fillStyle = toolbarPage < maxPage ? '#c2185b' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(W - 14, arrowY);
    ctx.lineTo(W - 14 - arrowSize, arrowY - arrowSize * 0.6);
    ctx.lineTo(W - 14 - arrowSize, arrowY + arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function render(time, dt) {
  // Update screen shake
  if (screenShake.intensity > 0.3) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= screenShake.decay;
  } else {
    screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0;
  }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#ffe0ec');
  bgGrad.addColorStop(0.5, '#ffc2d4');
  bgGrad.addColorStop(1, '#ffb3c6');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply screen shake to board area
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // HUD
  drawHUD();

  // Board
  drawBoard();

  // Tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = tileKey(r, c);
      // Love Letter: hide exploded tiles
      if (loveLetterExploded && loveLetterExploded.has(key)) continue;

      if (removingTiles.has(key)) {
        const ov = getOverride(r, c);
        drawTile(r, c, grid[r][c], ov);
        continue;
      }
      if (grid[r][c] < 0) continue;

      // Skip tiles with obstacles — drawObstacle handles rendering (ice shows gem, others hide it)
      if (hasObstacle(r, c)) continue;

      // Love Letter: draw pink heart instead of normal gem
      if (loveLetterTransformed && loveLetterTransformed.has(key)) {
        drawPinkHeart(r, c);
        continue;
      }

      const ov = getOverride(r, c);

      // Special tile: draw tool as main icon with glowing bg
      if (special[r] && special[r][c] > 0) {
        drawSpecialTile(r, c, grid[r][c], ov);
        continue;
      }

      drawTile(r, c, grid[r][c], ov);
    }
  }

  // Selected highlight
  if (selected && !locked) {
    drawSelectedHighlight(selected.row, selected.col, time);
  }

  // Hint highlight — nudge animation (partial swap bounce) on hinted cells
  if (hintCells && !locked && !selected && hintCells.length === 2) {
    const hNudge = calcSwapNudge(time, hintCells[0], hintCells[1]);
    for (let i = 0; i < 2; i++) {
      const cell = hintCells[i];
      const sign = i === 0 ? 1 : -1;
      const nx = hNudge.dx * sign;
      const ny = hNudge.dy * sign;
      // Only apply override if there's actual movement
      if (Math.abs(nx) > 0.3 || Math.abs(ny) > 0.3) {
        const baseX = boardX + cell.col * tileSize;
        const baseY = boardY + cell.row * tileSize;
        setOverride(cell.row, cell.col, { x: baseX + nx, y: baseY + ny });
      } else {
        clearOverride(cell.row, cell.col);
      }
    }
  }

  // Draw obstacles on top of tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const obs = obstacles[r] && obstacles[r][c];
      if (obs) drawObstacle(r, c, obs);
    }
  }

  // Guided tutorial overlay (darken board, highlight swap cells)
  drawGuidedTutorial(time);

  // Flash overlay on board
  if (flashAlpha > 0.01) {
    ctx.save();
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(boardX - 4, boardY - 4, tileSize * COLS + 8, tileSize * ROWS + 8);
    ctx.restore();
    flashAlpha *= 0.82;
  }

  // Score popups
  drawScorePopups(dt);

  // Sparkle particles
  updateAndDrawSparkles(dt);

  // Explosion rings
  updateAndDrawExplosionRings(dt);

  // Fire particles
  updateAndDrawFireParticles(dt);

  // Electric arcs
  updateAndDrawElectricArcs(dt);

  // Shockwave rings
  updateAndDrawShockwaves(dt);

  // Heart particles (Love Letter effect)
  updateAndDrawHeartParticles(dt);

  // Flying tool animation
  if (flyingTool) {
    const img = imageCache[flyingTool.file];
    if (img) {
      ctx.save();
      ctx.globalAlpha = flyingTool.alpha;
      const s = tileSize * flyingTool.scale;
      ctx.drawImage(img, flyingTool.x - s / 2, flyingTool.y - s / 2, s, s);
      ctx.restore();
    }
  }

  // End screen shake transform
  ctx.restore();

  // Toolbar (drawn outside shake so it stays stable)
  drawToolbar();
}

// Register service worker for PWA — force update check on every load
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then((reg) => {
    // Check for updates immediately on load
    reg.update().catch(() => {});
    // When a new SW is waiting, tell it to activate immediately
    if (reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      if (newSW) {
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'activated') {
            // New service worker active — reload to get fresh content
            window.location.reload();
          }
        });
      }
    });
  }).catch(() => {});
  // Listen for the new SW taking control and reload
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

// ── Gist Sync Engine (inline for single-file game) ──
const GIST_API = 'https://api.github.com/gists';
const SYNC_PREFIX = 'lovematch_gist_';

const gistSync = {
  token: localStorage.getItem(SYNC_PREFIX + 'token'),
  gistId: localStorage.getItem(SYNC_PREFIX + 'gist_id'),
  role: localStorage.getItem(SYNC_PREFIX + 'role'),
  spouseName: localStorage.getItem(SYNC_PREFIX + 'spouse_name') || '',
  pollTimer: null,
  _lastSpouseData: null,
  onSpouseUpdate: null,

  isConfigured() { return !!(this.token && this.gistId && this.role); },

  _headers() {
    const h = { 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
    if (this.token) h['Authorization'] = 'token ' + this.token;
    return h;
  },

  _save() {
    try {
      localStorage.setItem(SYNC_PREFIX + 'token', this.token || '');
      localStorage.setItem(SYNC_PREFIX + 'gist_id', this.gistId || '');
      localStorage.setItem(SYNC_PREFIX + 'role', this.role || '');
    } catch(e) {}
  },

  async createChannel(token, role, name) {
    this.token = token; this.role = role;
    const myData = this._defaultData(role, name);
    const files = { 'channel.json': { content: JSON.stringify({ app: 'love-match', createdBy: role, createdAt: new Date().toISOString() }, null, 2) } };
    files[role + '.json'] = { content: JSON.stringify(myData, null, 2) };
    const res = await fetch(GIST_API, { method: 'POST', headers: this._headers(), body: JSON.stringify({ description: 'Love Match Sync', public: false, files }) });
    if (!res.ok) throw new Error('Failed to create channel');
    const gist = await res.json();
    this.gistId = gist.id;
    this._save();
    return this.gistId;
  },

  async joinChannel(token, code, role, name) {
    this.token = token; this.gistId = code; this.role = role;
    const gist = await this._fetchGist();
    if (!gist.files['channel.json']) throw new Error('Invalid channel code');
    const myData = this._defaultData(role, name);
    await this._updateGist({ [role + '.json']: { content: JSON.stringify(myData, null, 2) } });
    this._save();
  },

  async _fetchGist() {
    const res = await fetch(GIST_API + '/' + this.gistId, { headers: this._headers() });
    if (!res.ok) throw new Error('Gist fetch failed: ' + res.status);
    return res.json();
  },

  async _updateGist(files) {
    const res = await fetch(GIST_API + '/' + this.gistId, { method: 'PATCH', headers: this._headers(), body: JSON.stringify({ files }) });
    if (!res.ok) throw new Error('Gist update failed');
    return res.json();
  },

  async _readMyData() {
    const gist = await this._fetchGist();
    const file = gist.files[this.role + '.json'];
    if (!file) return this._defaultData(this.role, '');
    try {
      let c = file.content;
      if (file.truncated && file.raw_url) { const r = await fetch(file.raw_url); c = await r.text(); }
      return JSON.parse(c);
    } catch { return this._defaultData(this.role, ''); }
  },

  async pushData(data) {
    data.updatedAt = new Date().toISOString();
    data.role = this.role;
    await this._updateGist({ [this.role + '.json']: { content: JSON.stringify(data, null, 2) } });
  },

  async pullSpouseData() {
    if (!this.isConfigured()) return null;
    const spouseRole = this.role === 'husband' ? 'wife' : 'husband';
    const gist = await this._fetchGist();
    const file = gist.files[spouseRole + '.json'];
    if (!file) return null;
    try {
      let c = file.content;
      if (file.truncated && file.raw_url) { const r = await fetch(file.raw_url); c = await r.text(); }
      const data = JSON.parse(c);
      if (data.name) { this.spouseName = data.name; localStorage.setItem(SYNC_PREFIX + 'spouse_name', data.name); }
      return data;
    } catch { return null; }
  },

  async sendLoveNote(message) {
    const d = await this._readMyData();
    d.loveNotes = d.loveNotes || [];
    d.loveNotes.push({ id: Date.now().toString(36), from: this.role, message, sentAt: new Date().toISOString(), read: false });
    await this.pushData(d);
  },

  async sendGift(toolName, message) {
    const d = await this._readMyData();
    d.gifts = d.gifts || [];
    d.gifts.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), from: this.role, tool: toolName, message: message || '', sentAt: new Date().toISOString(), claimed: false });
    await this.pushData(d);
  },

  async sendMessage(text) {
    const d = await this._readMyData();
    d.messages = d.messages || [];
    d.messages.push({ id: Date.now().toString(36), from: this.role, text, sentAt: new Date().toISOString() });
    if (d.messages.length > 100) d.messages = d.messages.slice(-100);
    await this.pushData(d);
  },

  async syncGameProgress() {
    if (!this.isConfigured()) return;
    const d = await this._readMyData();
    const starsMap = JSON.parse(localStorage.getItem('lovematch_stars') || '{}');
    const totalStars = Object.values(starsMap).reduce((a, b) => a + b, 0);
    d.gameProgress = {
      level,
      score,
      highLevel: parseInt(localStorage.getItem('lovematch_highLevel') || '1'),
      totalStars,
      levelStars: starsMap,
    };
    await this.pushData(d);
  },

  async getMessages() {
    const [my, sp] = await Promise.all([this._readMyData(), this.pullSpouseData()]);
    const all = [...(my?.messages || []), ...(sp?.messages || [])];
    all.sort((a, b) => new Date(a.sentAt) - new Date(b.sentAt));
    return all;
  },

  startPolling(onData) {
    this.onSpouseUpdate = onData;
    const poll = async () => {
      try {
        const data = await this.pullSpouseData();
        if (data) {
          const json = JSON.stringify(data);
          if (json !== JSON.stringify(this._lastSpouseData)) {
            this._lastSpouseData = data;
            if (this.onSpouseUpdate) this.onSpouseUpdate(data);
          }
        }
      } catch(e) { /* silent */ }
      this.pollTimer = setTimeout(poll, 30000);
    };
    if (this.isConfigured()) poll();
  },

  stopPolling() { if (this.pollTimer) { clearTimeout(this.pollTimer); this.pollTimer = null; } },

  _defaultData(role, name) {
    return { type: 'lovematch_sync', version: 1, role, name: name || '', profile: { gender: role }, loveNotes: [], gifts: [], helpRequests: [], messages: [], bibleProgress: {}, gameProgress: { level: 1, score: 0 }, claimedGifts: [], readNotes: [], updatedAt: new Date().toISOString() };
  },

  disconnect() {
    this.stopPolling();
    this.token = this.gistId = this.role = null;
    [SYNC_PREFIX+'token', SYNC_PREFIX+'gist_id', SYNC_PREFIX+'role', SYNC_PREFIX+'spouse_name'].forEach(k => localStorage.removeItem(k));
  }
};

// Track previous spouse state for change detection
let _prevSpouseHighLevel = 0;
let _processedGiftIds = new Set();
let _processedNoteIds = new Set();

// Load processed IDs from localStorage
try {
  _processedGiftIds = new Set(JSON.parse(localStorage.getItem('lovematch_processed_gifts') || '[]'));
  _processedNoteIds = new Set(JSON.parse(localStorage.getItem('lovematch_processed_notes') || '[]'));
} catch(e) {}

// Map tool names to tool numbers for inventory
const TOOL_NAME_TO_NUM = {};
TOOLS.forEach(t => { TOOL_NAME_TO_NUM[t.name.toLowerCase()] = t.tool; });

// Spouse data callback
function onSpouseData(data) {
  const spName = gistSync.spouseName || 'Spouse';

  // ── Detect spouse level-up ──
  const spHighLevel = data.gameProgress?.highLevel || data.gameProgress?.level || 0;
  if (_prevSpouseHighLevel > 0 && spHighLevel > _prevSpouseHighLevel) {
    const sweetMsgs = [
      spName + ' just beat Level ' + spHighLevel + '! 🎉',
      'Way to go, ' + spName + '! Level ' + spHighLevel + '! 💪',
      spName + ' crushed Level ' + spHighLevel + '! So proud! 💕',
      'Level ' + spHighLevel + ' done! ' + spName + ' is on fire! 🔥',
    ];
    const msg = sweetMsgs[Math.floor(Math.random() * sweetMsgs.length)];
    scorePopups.push({ x: W/2, y: H/5, text: msg, alpha: 1, dy: 0 });
    spawnHeartBurst(W/2, H/3, 15);
    sfxLevelComplete();
  }
  _prevSpouseHighLevel = spHighLevel;

  // ── Check for new love notes ──
  const notes = (data.loveNotes || []).filter(n => n.from !== gistSync.role && !_processedNoteIds.has(n.id));
  if (notes.length > 0) {
    const latest = notes[notes.length - 1];
    _processedNoteIds.add(latest.id);
    try { localStorage.setItem('lovematch_processed_notes', JSON.stringify([..._processedNoteIds])); } catch(e) {}
    scorePopups.push({ x: W/2, y: H/4, text: '💌 ' + spName + ': ' + (latest.message || '').slice(0, 40), alpha: 1, dy: 0 });
    spawnHeartBurst(W/2, H/4 - 30, 8);
    sfxSpecial();
  }

  // ── Check for new gifts → add tools to inventory ──
  const gifts = (data.gifts || []).filter(g => g.from !== gistSync.role && !_processedGiftIds.has(g.id));
  for (const g of gifts) {
    _processedGiftIds.add(g.id);
    // Try to match the tool name to our TOOLS array
    const toolNum = TOOL_NAME_TO_NUM[(g.tool || '').toLowerCase()];
    if (toolNum) {
      toolInventory[toolNum] = (toolInventory[toolNum] || 0) + 1;
      scorePopups.push({ x: W/2, y: H/3, text: '🎁 ' + spName + ' sent you ' + g.tool + '!', alpha: 1, dy: 0 });
    } else {
      scorePopups.push({ x: W/2, y: H/3, text: '💝 Gift from ' + spName + ': ' + (g.tool || 'love'), alpha: 1, dy: 0 });
    }
    spawnHeartBurst(W/2, H/3 - 20, 12);
    sfxLevelComplete();
  }
  if (gifts.length > 0) {
    try { localStorage.setItem('lovematch_processed_gifts', JSON.stringify([..._processedGiftIds])); } catch(e) {}
  }
}

// Add spouse button to HUD + "spouse online" pulsing indicator
const _origDrawHUD = drawHUD;
drawHUD = function() {
  _origDrawHUD();
  ctx.save();
  const sbSize = tileSize * 0.4;
  const sbX = W - sbSize - 12;
  const sbY = hudH - sbSize - tileSize * 0.4;
  ctx.font = (sbSize * 0.9) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (gistSync.isConfigured()) {
    // Check if spouse was active recently (within 5 min)
    const spData = gistSync._lastSpouseData;
    let spouseOnline = false;
    if (spData && spData.updatedAt) {
      const ago = Date.now() - new Date(spData.updatedAt).getTime();
      spouseOnline = ago < 5 * 60 * 1000;
    }

    if (spouseOnline) {
      // Pulsing glow when spouse is online
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 400);
      ctx.globalAlpha = pulse;
      ctx.font = (sbSize * 1.2) + 'px sans-serif';
      ctx.fillText('💑', sbX + sbSize/2, sbY + sbSize/2);
      ctx.globalAlpha = 1;
      ctx.font = (sbSize * 0.9) + 'px sans-serif';
      ctx.fillText('💑', sbX + sbSize/2, sbY + sbSize/2);
      // Green "online" dot
      ctx.beginPath();
      ctx.arc(sbX + sbSize - 2, sbY + 4, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#4caf50';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    } else {
      ctx.fillText('💑', sbX + sbSize/2, sbY + sbSize/2);
      // Gray dot (offline)
      ctx.beginPath();
      ctx.arc(sbX + sbSize - 2, sbY + 4, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#999';
      ctx.fill();
    }
  } else {
    ctx.fillText('💌', sbX + sbSize/2, sbY + sbSize/2);
  }
  ctx.restore();
};

// Sync progress after level complete
const _origRestartGame = restartGame;
restartGame = function() {
  _origRestartGame();
  if (gistSync.isConfigured()) {
    gistSync.syncGameProgress().catch(() => {});
  }
};

// Start polling if configured
if (gistSync.isConfigured()) {
  gistSync.startPolling(onSpouseData);
}
</script>
