// Pink Heart icon used for the Love Letter "clear everything" transformation
const PINK_HEART_FILE = 'icons/sheet5-icon-3.png';

// Pick gems for current level (7 random from pool, seeded by level)
const GEMS_PER_LEVEL = 7;
function pickGemsForLevel(lvl) {
  // Deterministic shuffle based on level so same level = same gems
  const shuffled = [...ALL_GEMS];
  let seed = lvl * 2654435761;
  for (let i = shuffled.length - 1; i > 0; i--) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    const j = seed % (i + 1);
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, GEMS_PER_LEVEL);
}

// Current level tile types
let TILE_TYPES = [];
let NUM_TYPES = 0;

// Preloaded images (keyed by file path)
const imageCache = {};
let imagesLoaded = 0;
let totalImages = 0;

function preloadImages(gems) {
  const allFiles = [...gems.map(g => g.file), ...TOOLS.map(t => t.file), PINK_HEART_FILE];
  // Deduplicate
  const unique = [...new Set(allFiles)];
  totalImages = unique.length;
  imagesLoaded = 0;
  for (const file of unique) {
    if (imageCache[file]) { imagesLoaded++; continue; }
    const img = new Image();
    img.onload = () => { imageCache[file] = img; imagesLoaded++; };
    img.onerror = () => { imagesLoaded++; };
    img.src = file;
  }
}

function setupLevel(lvl) {
  const gems = pickGemsForLevel(lvl);
  TILE_TYPES = gems;
  NUM_TYPES = TILE_TYPES.length;
  preloadImages(gems);
}

const SCORE_3 = 50, SCORE_4 = 100, SCORE_5 = 200;
const MAX_MOVES = 30;
const STAR_THRESHOLDS = [500, 1500, 3000]; // 1, 2, 3 stars

// Animation durations (ms)
const SWAP_DUR = 200;
const BOUNCE_DUR = 300;
const MATCH_DUR = 250;
const FALL_DUR = 300;
const DROP_DUR = 250;

// ── Canvas Setup ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H, tileSize, boardX, boardY, hudH, toolbarY, toolbarH, toolSlotSize;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const maxW = Math.min(480, window.innerWidth);
  const maxH = window.innerHeight;

  // Calculate tile size to fit board + toolbar
  const availW = maxW - 20;  // 10px margin each side
  tileSize = Math.floor(availW / COLS);

  hudH = tileSize * 1.6;  // HUD height
  toolbarH = tileSize * 1.2; // Toolbar height
  const boardH = tileSize * ROWS;

  W = tileSize * COLS + 20;
  H = hudH + boardH + toolbarH + 10;

  if (H > maxH) {
    const scale = maxH / H;
    tileSize = Math.floor(tileSize * scale);
    hudH = tileSize * 1.6;
    toolbarH = tileSize * 1.2;
    W = tileSize * COLS + 20;
    H = hudH + tileSize * ROWS + toolbarH + 10;
  }

  toolSlotSize = Math.floor(Math.min((W - 20) / 5, toolbarH - 8));
  toolbarY = hudH + tileSize * ROWS + 4;

  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  boardX = (W - tileSize * COLS) / 2;
  boardY = hudH;
}

// ── Game State ──
let grid = [];       // grid[row][col] = type index or -1

// Animation state

for (const t of TOOLS) {

}

// Which tool slots to show in the toolbar (5 at a time, scrollable later)
const TOOLBAR_SLOTS = 5;
let toolbarPage = 0; // which page of tools (0 = tools 1-5, 1 = tools 6-10)
let activeTool = null; // tool number if a tool is selected, null otherwise

// Screen shake

}

// Flash overlay

function triggerFlash(alpha) { flashAlpha = Math.max(flashAlpha, alpha || 0.3); }

// Sparkle particles
let sparkleParticles = [];
function spawnSparkles(x, y, color, count) {

      type: Math.random() < 0.5 ? 'circle' : 'star',
    });
  }
}

// Flying tool (fly-to animation)
let flyingTool = null; // { file, x, y, scale, alpha }

// Obstacles
let obstacles = [];
const OBSTACLE_TYPES = {
  lockedHeart: { maxHp: 2, name: 'Locked Heart', color1: '#ffd700', color2: '#b8860b' },
  roseVine:    { maxHp: 3, name: 'Rose Vine', color1: '#228b22', color2: '#8b4513' },
  yarnTangle:  { maxHp: 1, name: 'Yarn Tangle', color1: '#ff69b4', color2: '#ff1493' },
};

// Input state
let pointerDown = null; // {x, y, row, col}

// ── Grid Logic ──
function randomType() {
  return Math.floor(Math.random() * NUM_TYPES);
}

function initGrid() {
  grid = [];
  special = [];
  obstacles = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    special[r] = [];
    obstacles[r] = [];
    for (let c = 0; c < COLS; c++) {
      let type;
      do {
        type = randomType();
      } while (wouldMatch(r, c, type));
      grid[r][c] = type;
      special[r][c] = 0; // no special tool
      obstacles[r][c] = null;
    }
  }
  // Place obstacles based on level
  initObstacles();
}

function initObstacles() {
  if (level < 2) return; // no obstacles on level 1
  const obstacleCount = Math.min(2 + Math.floor(level / 2), 10);
  const types = Object.keys(OBSTACLE_TYPES);
  let placed = 0;
  let attempts = 0;
  while (placed < obstacleCount && attempts < 200) {
    attempts++;
    const r = 1 + Math.floor(Math.random() * (ROWS - 2)); // avoid top/bottom edges
    const c = 1 + Math.floor(Math.random() * (COLS - 2));
    if (obstacles[r][c]) continue;
    const type = types[Math.floor(Math.random() * types.length)];
    const def = OBSTACLE_TYPES[type];
    obstacles[r][c] = { type, hp: def.maxHp, maxHp: def.maxHp };
    placed++;
  }
}

function wouldMatch(row, col, type) {
  // Check left
  if (col >= 2 && grid[row][col-1] === type && grid[row][col-2] === type) return true;
  // Check up
  if (row >= 2 && grid[row-1] !== undefined && grid[row-1][col] === type &&
      grid[row-2] !== undefined && grid[row-2][col] === type) return true;
  // Check 2x2 square (check all 4 possible 2x2 positions this cell could be part of)
  for (let dr = -1; dr <= 0; dr++) {
    for (let dc = -1; dc <= 0; dc++) {
      const r0 = row + dr, c0 = col + dc;
      if (r0 < 0 || r0 + 1 >= ROWS || c0 < 0 || c0 + 1 >= COLS) continue;
      let count = 0;
      for (let rr = r0; rr <= r0 + 1; rr++) {
        for (let cc = c0; cc <= c0 + 1; cc++) {
          if (rr === row && cc === col) continue; // skip self
          if (grid[rr] && grid[rr][cc] === type) count++;
        }
      }
      if (count === 3) return true; // other 3 cells already match
    }
  }
  return false;
}

function hasObstacle(r, c) {
  return obstacles[r] && obstacles[r][c] !== null && obstacles[r][c] !== undefined;
}

function findMatches() {
  const matched = new Set();

  // Horizontal (skip obstacle cells)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 3; c++) {
      const t = grid[r][c];
      if (t < 0 || hasObstacle(r, c)) continue;
      let len = 1;
      while (c + len < COLS && grid[r][c + len] === t && !hasObstacle(r, c + len)) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matched.add(r * COLS + c + i);
      }
      if (len > 1) c += len - 2;
    }
  }

  // Vertical (skip obstacle cells)
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 3; r++) {
      const t = grid[r][c];
      if (t < 0 || hasObstacle(r, c)) continue;
      let len = 1;
      while (r + len < ROWS && grid[r + len][c] === t && !hasObstacle(r + len, c)) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matched.add((r + i) * COLS + c);
      }
      if (len > 1) r += len - 2;
    }
  }

  // 2x2 squares (skip obstacle cells)
  for (let r = 0; r <= ROWS - 2; r++) {
    for (let c = 0; c <= COLS - 2; c++) {
      const t = grid[r][c];
      if (t < 0 || hasObstacle(r, c)) continue;
      if (grid[r][c+1] === t && !hasObstacle(r, c+1) &&
          grid[r+1][c] === t && !hasObstacle(r+1, c) &&
          grid[r+1][c+1] === t && !hasObstacle(r+1, c+1)) {
        matched.add(r * COLS + c);
        matched.add(r * COLS + c + 1);
        matched.add((r+1) * COLS + c);
        matched.add((r+1) * COLS + c + 1);
      }
    }
  }

  return matched;
}

function scoreForMatch(length) {
  if (length >= 5) return SCORE_5;
  if (length === 4) return SCORE_4;
  return SCORE_3;
}

function getMatchGroups() {
  // Returns array of { cells: [{row,col}], shape: string, spawnTool: number|null, spawnAt: {row,col}|null }
  const results = [];
  const claimed = new Set(); // prevent double-counting cells

  // First pass: find all horizontal and vertical runs
  const hRuns = []; // {row, startCol, len, type}
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      const t = grid[r][c];
      if (t < 0) { c++; continue; }
      let len = 1;
      while (c + len < COLS && grid[r][c + len] === t) len++;
      if (len >= 3) hRuns.push({ row: r, col: c, len, type: t });
      c += len;
    }
  }

  const vRuns = []; // {col, startRow, len, type}
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      const t = grid[r][c];
      if (t < 0) { r++; continue; }
      let len = 1;
      while (r + len < ROWS && grid[r + len][c] === t) len++;
      if (len >= 3) vRuns.push({ row: r, col: c, len, type: t });
      r += len;
    }
  }

  // Detect Cross shapes first (highest priority): a horizontal and vertical run of 3+
  // intersecting at a cell, with at least 2 cells extending in each of the 4 directions
  for (const h of hRuns) {
    for (const v of vRuns) {
      if (h.type !== v.type) continue;
      // Find intersection
      const intR = h.row;
      const intC = v.col;
      if (intC < h.col || intC >= h.col + h.len) continue;
      if (intR < v.row || intR >= v.row + v.len) continue;
      // Check it extends in all 4 directions from intersection
      const left = intC - h.col;
      const right = (h.col + h.len - 1) - intC;
      const up = intR - v.row;
      const down = (v.row + v.len - 1) - intR;
      if (left >= 1 && right >= 1 && up >= 1 && down >= 1) {
        // It's a cross/plus! Combine all cells
        const cells = [];
        const cellSet = new Set();
        for (let i = 0; i < h.len; i++) {
          const k = tileKey(h.row, h.col + i);
          if (!cellSet.has(k)) { cells.push({ row: h.row, col: h.col + i }); cellSet.add(k); }
        }
        for (let i = 0; i < v.len; i++) {
          const k = tileKey(v.row + i, v.col);
          if (!cellSet.has(k)) { cells.push({ row: v.row + i, col: v.col }); cellSet.add(k); }
        }
        // Only add if not already claimed
        const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
        if (!anyClaimed) {
          cells.forEach(c => claimed.add(tileKey(c.row, c.col)));
          results.push({ cells, shape: 'cross', spawnTool: 3, spawnAt: { row: intR, col: intC } });
          h._used = true;
          v._used = true;
        }
      }
    }
  }

  // Detect L/T shapes: a horizontal run and vertical run of 3+ sharing a type that intersect
  // but don't form a cross (only extend in 3 directions from intersection, not 4)
  for (const h of hRuns) {
    if (h._used) continue;
    for (const v of vRuns) {
      if (v._used) continue;
      if (h.type !== v.type) continue;
      const intR = h.row;
      const intC = v.col;
      if (intC < h.col || intC >= h.col + h.len) continue;
      if (intR < v.row || intR >= v.row + v.len) continue;
      // Not a cross (already handled above), so it's an L or T
      const cells = [];
      const cellSet = new Set();
      for (let i = 0; i < h.len; i++) {
        const k = tileKey(h.row, h.col + i);
        if (!cellSet.has(k)) { cells.push({ row: h.row, col: h.col + i }); cellSet.add(k); }
      }
      for (let i = 0; i < v.len; i++) {
        const k = tileKey(v.row + i, v.col);
        if (!cellSet.has(k)) { cells.push({ row: v.row + i, col: v.col }); cellSet.add(k); }
      }
      const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
      if (!anyClaimed) {
        cells.forEach(c => claimed.add(tileKey(c.row, c.col)));
        results.push({ cells, shape: 'LT', spawnTool: 1, spawnAt: { row: intR, col: intC } });
        h._used = true;
        v._used = true;
      }
    }
  }

  // Detect 5-in-a-row, 4-in-a-row, 3-in-a-row (line runs not yet claimed)
  const allRuns = [...hRuns.filter(r => !r._used), ...vRuns.filter(r => !r._used)];
  // Sort longest first so 5-in-a-row gets priority
  allRuns.sort((a, b) => b.len - a.len);

  for (const run of allRuns) {
    const isH = ('row' in run && hRuns.includes(run));
    const cells = [];
    for (let i = 0; i < run.len; i++) {
      const r = isH ? run.row : run.row + i;
      const c = isH ? run.col + i : run.col;
      cells.push({ row: r, col: c });
    }
    const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
    if (anyClaimed) continue;

    cells.forEach(c => claimed.add(tileKey(c.row, c.col)));

    if (run.len >= 5) {
      const mid = cells[Math.floor(cells.length / 2)];
      results.push({ cells, shape: '5row', spawnTool: 3, spawnAt: mid });
    } else if (run.len === 4) {
      const mid = cells[Math.floor(cells.length / 2)];
      results.push({ cells, shape: '4row', spawnTool: 2, spawnAt: mid });
    } else {
      results.push({ cells, shape: '3row', spawnTool: null, spawnAt: null });
    }
  }

  // Detect 2x2 squares (cells not already claimed)
  for (let r = 0; r <= ROWS - 2; r++) {
    for (let c = 0; c <= COLS - 2; c++) {
      const t = grid[r][c];
      if (t < 0) continue;
      if (grid[r][c+1] !== t || grid[r+1][c] !== t || grid[r+1][c+1] !== t) continue;
      const cells = [
        { row: r, col: c }, { row: r, col: c+1 },
        { row: r+1, col: c }, { row: r+1, col: c+1 }
      ];
      const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
      if (anyClaimed) continue;
      cells.forEach(c => claimed.add(tileKey(c.row, c.col)));
      // Spawn potion at bottom-right of square
      results.push({ cells, shape: '2x2', spawnTool: 6, spawnAt: { row: r+1, col: c+1 } });
    }
  }

  return results;
}

// ── Animation System ──
class Animation {
  constructor(duration, updateFn, doneFn) {
    this.duration = duration;
    this.elapsed = 0;
    this.updateFn = updateFn;
    this.doneFn = doneFn;
    this.done = false;
  }
  tick(dt) {
    this.elapsed += dt;
    const t = Math.min(this.elapsed / this.duration, 1);
    this.updateFn(t);
    if (t >= 1) {
      this.done = true;
      if (this.doneFn) this.doneFn();
    }
  }
}

// Easing functions
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - (-2*t+2)*(-2*t+2)/2; }
function easeOutBounce(t) {
  if (t < 1/2.75) return 7.5625*t*t;
  if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t + 0.75; }
  if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t + 0.9375; }
  t -= 2.625/2.75; return 7.5625*t*t + 0.984375;
}

// Tile display overrides (for animations)
let tileOverrides = {}; // key "r,c" -> {x, y, scale, alpha}
let removingTiles = new Set(); // tiles being removed (don't draw normally)

function tileKey(r, c) { return r + ',' + c; }

function setOverride(r, c, props) {
  const k = tileKey(r, c);
  if (!tileOverrides[k]) tileOverrides[k] = {};
  Object.assign(tileOverrides[k], props);
}

function clearOverride(r, c) {
  delete tileOverrides[tileKey(r, c)];
}

function getOverride(r, c) {
  return tileOverrides[tileKey(r, c)] || null;
}

// ── Swap & Match Pipeline ──
function isAdjacent(r1, c1, r2, c2) {
  return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
}

function doSwap(r1, c1, r2, c2) {
  // Can't swap obstacle cells
  if (hasObstacle(r1, c1) || hasObstacle(r2, c2)) {
    selected = null;
    return;
  }
  locked = true;
  selected = null;

  // Animate swap
  const startX1 = boardX + c1 * tileSize;
  const startY1 = boardY + r1 * tileSize;
  const startX2 = boardX + c2 * tileSize;
  const startY2 = boardY + r2 * tileSize;

  animations.push(new Animation(SWAP_DUR, (t) => {
    const et = easeInOut(t);
    setOverride(r1, c1, { x: startX1 + (startX2 - startX1) * et, y: startY1 + (startY2 - startY1) * et });
    setOverride(r2, c2, { x: startX2 + (startX1 - startX2) * et, y: startY2 + (startY1 - startY2) * et });
  }, () => {
    clearOverride(r1, c1);
    clearOverride(r2, c2);

    // Actually swap in grid
    const tmp = grid[r1][c1];
    grid[r1][c1] = grid[r2][c2];
    grid[r2][c2] = tmp;

    // Also swap specials
    const tmpSp = special[r1][c1];
    special[r1][c1] = special[r2][c2];
    special[r2][c2] = tmpSp;

    // Check if either tile is a special — activate it!
    const sp1 = special[r1][c1];
    const sp2 = special[r2][c2];

    if (sp1 > 0 || sp2 > 0) {
      // Consume the move
      if (stopwatchTurns > 0) { stopwatchTurns--; } else { moves--; }

      // Check for special+special combo
      if (sp1 > 0 && sp2 > 0) {
        const combo = getCombo(sp1, sp2);
        special[r1][c1] = 0;
        special[r2][c2] = 0;
        if (combo) {
          combo();
        } else {
          // No combo — activate both separately
          activateSpecialOnBoard(sp1, r1, c1);
          activateSpecialOnBoard(sp2, r2, c2);
        }
      } else if (sp1 > 0) {
        special[r1][c1] = 0;
        activateSpecialOnBoard(sp1, r1, c1);
      } else {
        special[r2][c2] = 0;
        activateSpecialOnBoard(sp2, r2, c2);
      }
      return;
    }

    // Check for matches
    const matches = findMatches();
    if (matches.size === 0) {
      // Invalid swap - swap back (also swap specials back)
      const tmpSp2 = special[r1][c1];
      special[r1][c1] = special[r2][c2];
      special[r2][c2] = tmpSp2;
      animateSwapBack(r1, c1, r2, c2);
    } else {
      if (stopwatchTurns > 0) {
        stopwatchTurns--;
      } else {
        moves--;
      }
      cascadeLevel = 0;
      lastSwap = { r1, c1, r2, c2 };
      processMatches();
    }
  }));
}

function animateSwapBack(r1, c1, r2, c2) {
  // Swap grid back
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;

  const startX1 = boardX + c1 * tileSize;
  const startY1 = boardY + r1 * tileSize;
  const startX2 = boardX + c2 * tileSize;
  const startY2 = boardY + r2 * tileSize;

  animations.push(new Animation(BOUNCE_DUR, (t) => {
    const et = easeOutBounce(t);
    // They're already at swapped positions visually, so animate back
    setOverride(r1, c1, { x: startX2 + (startX1 - startX2) * et, y: startY2 + (startY1 - startY2) * et });
    setOverride(r2, c2, { x: startX1 + (startX2 - startX1) * et, y: startY1 + (startY2 - startY1) * et });
  }, () => {
    clearOverride(r1, c1);
    clearOverride(r2, c2);
    locked = false;
  }));
}

function processMatches() {
  const groups = getMatchGroups();
  if (groups.length === 0) {
    // Check game over
    if (moves <= 0) {
      gameOver = true;
    }
    locked = false;
    return;
  }

  cascadeLevel++;
  const multiplier = cascadeLevel;

  // Collect all matched positions and track tool spawns
  const allMatched = new Set();
  let totalScore = 0;
  const toolSpawns = []; // {toolNum, row, col} — tools to add to inventory

  for (const group of groups) {
    const pts = scoreForMatch(group.cells.length) * multiplier;
    totalScore += pts;

    // Score popup at center of group
    const centerIdx = Math.floor(group.cells.length / 2);
    const centerR = group.cells[centerIdx].row;
    const centerC = group.cells[centerIdx].col;
    scorePopups.push({
      x: boardX + centerC * tileSize + tileSize / 2,
      y: boardY + centerR * tileSize + tileSize / 2,
      text: '+' + pts + (group.shape !== '3row' ? ' ' + group.shape : ''),
      alpha: 1,
      dy: 0,
    });

    for (const pos of group.cells) {
      allMatched.add(tileKey(pos.row, pos.col));
    }

    // Queue tool spawn — place at the swapped tile that's part of this match
    if (group.spawnTool !== null) {
      let spawnR = group.spawnAt ? group.spawnAt.row : group.cells[0].row;
      let spawnC = group.spawnAt ? group.spawnAt.col : group.cells[0].col;

      // If we know which tiles were swapped, prefer that position
      if (lastSwap) {
        const cellSet = new Set(group.cells.map(c => tileKey(c.row, c.col)));
        // Check if either swapped tile is in this match group
        if (cellSet.has(tileKey(lastSwap.r1, lastSwap.c1))) {
          spawnR = lastSwap.r1;
          spawnC = lastSwap.c1;
        } else if (cellSet.has(tileKey(lastSwap.r2, lastSwap.c2))) {
          spawnR = lastSwap.r2;
          spawnC = lastSwap.c2;
        }
      }

      toolSpawns.push({ toolNum: group.spawnTool, row: spawnR, col: spawnC });
    }
  }

  score += totalScore;
  lastSwap = null; // Only use swap position for the initial match, not cascades

  // Impact effects — screen shake, flash, sparkles
  const matchCount = allMatched.size;
  triggerScreenShake(Math.min((2 + matchCount * 0.5) * cascadeLevel, 12));
  triggerFlash(Math.min(0.1 + matchCount * 0.02 + cascadeLevel * 0.05, 0.4));

  // Sparkles at each cleared position
  allMatched.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    const type = grid[r][c];
    const color = type >= 0 && TILE_TYPES[type] ? (TILE_TYPES[type].bg1 || '#ff69b4') : '#ff69b4';
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      color, 4 + cascadeLevel
    );
  });

  // Animate removal
  const matchedArr = [];
  allMatched.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    matchedArr.push({ row: r, col: c });
    removingTiles.add(k);
  });

  animations.push(new Animation(MATCH_DUR, (t) => {
    const et = easeOut(t);
    for (const { row, col } of matchedArr) {
      setOverride(row, col, { scale: 1 - et * 0.8, alpha: 1 - et });
    }
  }, () => {
    // Remove tiles from grid
    for (const { row, col } of matchedArr) {
      grid[row][col] = -1;
      clearOverride(row, col);
      removingTiles.delete(tileKey(row, col));
    }
    // Spawn tools ON THE BOARD from special matches
    for (const spawn of toolSpawns) {
      // Place the special tool tile at the spawn position
      // Keep the gem type so it has a "color" identity, but mark it special
      if (grid[spawn.row][spawn.col] === -1) {
        // Cell was cleared — place a new random gem with the special
        grid[spawn.row][spawn.col] = randomType();
      }
      special[spawn.row][spawn.col] = spawn.toolNum;
      const toolDef = TOOLS.find(t => t.tool === spawn.toolNum);
      if (toolDef) {
        scorePopups.push({
          x: boardX + spawn.col * tileSize + tileSize / 2,
          y: boardY + spawn.row * tileSize + tileSize / 2,
          text: toolDef.name + '!',
          alpha: 1, dy: -15,
        });
      }
    }
    // Damage adjacent obstacles
    damageAdjacentObstacles(matchedArr);
    // Apply gravity
    applyGravity();
  }));
}

function damageObstacle(r, c) {
  if (!obstacles[r] || !obstacles[r][c]) return;
  const obs = obstacles[r][c];
  obs.hp--;
  if (obs.hp <= 0) {
    obstacles[r][c] = null;
    // Break effect
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      OBSTACLE_TYPES[obs.type].color1, 6
    );
    triggerScreenShake(2);
    scorePopups.push({
      x: boardX + c * tileSize + tileSize / 2,
      y: boardY + r * tileSize + tileSize / 2,
      text: 'Free!', alpha: 1, dy: 0,
    });
  }
}

function damageAdjacentObstacles(clearedCells) {
  const damaged = new Set();
  for (const { row, col } of clearedCells) {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr, dc] of dirs) {
      const nr = row + dr, nc = col + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        const k = tileKey(nr, nc);
        if (!damaged.has(k) && obstacles[nr] && obstacles[nr][nc]) {
          damaged.add(k);
          damageObstacle(nr, nc);
        }
      }
    }
  }
}

function applyGravity() {
  // For each column, find gaps and drop tiles (obstacles are immovable)
  const drops = [];
  const newTiles = [];

  for (let c = 0; c < COLS; c++) {
    // Work with segments separated by obstacles
    let writeRow = ROWS - 1;

    // Scan bottom up, obstacles block gravity
    while (writeRow >= 0) {
      // Skip obstacle rows
      if (hasObstacle(writeRow, c)) { writeRow--; continue; }

      // Find the gap: is this row empty?
      if (grid[writeRow][c] >= 0) { writeRow--; continue; }

      // Empty cell — find a tile above to drop into it
      let sourceRow = writeRow - 1;
      while (sourceRow >= 0 && grid[sourceRow][c] < 0 && !hasObstacle(sourceRow, c)) {
        sourceRow--;
      }

      if (sourceRow < 0 || hasObstacle(sourceRow, c)) {
        // No tile above (or blocked by obstacle) — need new tile
        break;
      }

      // Drop tile from sourceRow to writeRow
      grid[writeRow][c] = grid[sourceRow][c];
      special[writeRow][c] = special[sourceRow][c];
      grid[sourceRow][c] = -1;
      special[sourceRow][c] = 0;
      drops.push({ col: c, fromRow: sourceRow, toRow: writeRow, type: grid[writeRow][c] });
      writeRow--;
    }

    // Fill remaining empty spots at top of each segment with new tiles
    for (let r = writeRow; r >= 0; r--) {
      if (hasObstacle(r, c)) continue;
      if (grid[r][c] < 0) {
        const type = randomType();
        grid[r][c] = type;
        special[r][c] = 0;
        newTiles.push({ row: r, col: c, type, dropFrom: -(r + 1) });
      }
    }
  }

  // Animate drops
  if (drops.length === 0 && newTiles.length === 0) {
    processMatches(); // Check cascades
    return;
  }

  // Set up drop overrides
  for (const d of drops) {
    const fromY = boardY + d.fromRow * tileSize;
    const toY = boardY + d.toRow * tileSize;
    setOverride(d.toRow, d.col, { y: fromY, targetY: toY, dropping: true });
  }
  for (const n of newTiles) {
    const fromY = boardY + n.dropFrom * tileSize;
    const toY = boardY + n.row * tileSize;
    setOverride(n.row, n.col, { y: fromY, targetY: toY, dropping: true });
  }

  const allDrops = [...drops.map(d => ({ row: d.toRow, col: d.col, fromY: boardY + d.fromRow * tileSize, toY: boardY + d.toRow * tileSize })),
                     ...newTiles.map(n => ({ row: n.row, col: n.col, fromY: boardY + n.dropFrom * tileSize, toY: boardY + n.row * tileSize }))];

  animations.push(new Animation(FALL_DUR, (t) => {
    const et = easeOutBounce(t);
    for (const d of allDrops) {
      setOverride(d.row, d.col, { y: d.fromY + (d.toY - d.fromY) * et });
    }
  }, () => {
    for (const d of allDrops) {
      clearOverride(d.row, d.col);
    }
    // Check for cascading matches
    processMatches();
  }));
}

// ── Heart Particles (for Love Letter explosion) ──
let heartParticles = [];

function spawnHeartBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 120;
    heartParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,
      size: 6 + Math.random() * 10,
      alpha: 1,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 6,
      gravity: 80 + Math.random() * 40,
      life: 0.8 + Math.random() * 0.6,
      age: 0,
    });
  }
}

function updateAndDrawHeartParticles(dt) {
  if (heartParticles.length === 0) return;
  const heartImg = imageCache[PINK_HEART_FILE];
  ctx.save();
  for (let i = heartParticles.length - 1; i >= 0; i--) {
    const p = heartParticles[i];
    p.age += dt;
    if (p.age >= p.life) { heartParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.rotation += p.rotSpeed * dt;
    p.alpha = 1 - (p.age / p.life);

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    if (heartImg) {
      ctx.drawImage(heartImg, -p.size / 2, -p.size / 2, p.size, p.size);
    } else {
      // Fallback pink heart shape
      ctx.fillStyle = '#ff4081';
      ctx.font = p.size + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2764', 0, 0);
    }
    ctx.restore();
  }
  ctx.restore();
}

function updateAndDrawSparkles(dt) {
  if (sparkleParticles.length === 0) return;
  ctx.save();
  for (let i = sparkleParticles.length - 1; i >= 0; i--) {
    const p = sparkleParticles[i];
    p.age += dt;
    if (p.age >= p.life) { sparkleParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.alpha = 1 - (p.age / p.life);

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      // Draw a small 4-point star
      const s = p.size;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.age * 4);
      ctx.beginPath();
      for (let j = 0; j < 8; j++) {
        const r = j % 2 === 0 ? s : s * 0.4;
        const a = (j / 8) * Math.PI * 2;
        j === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();
}

// ── Love Letter: Clear Everything ──
let loveLetterPhase = 0;  // 0=inactive, 1=transforming, 2=exploding
let loveLetterTimer = 0;
let loveLetterTransformOrder = []; // cells in order they transform
let loveLetterTransformed = null;  // Set of "r,c" keys for transformed cells
let loveLetterExploded = null;     // Set of "r,c" keys for exploded cells

function activateLoveLetter() {
  locked = true;
  loveLetterPhase = 1;
  loveLetterTimer = 0;

  // Build transform order: spiral from center outward
  const cx = COLS / 2, cy = ROWS / 2;
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const dist = Math.sqrt((c - cx) * (c - cx) + (r - cy) * (r - cy));
      cells.push({ r, c, dist });
    }
  }
  cells.sort((a, b) => a.dist - b.dist);
  loveLetterTransformOrder = cells;
}

// ── Activate Special Tile on Board ──
function activateSpecialOnBoard(toolNum, row, col) {
  locked = true;
  cascadeLevel = 0;
  triggerScreenShake(5);
  triggerFlash(0.25);
  switch (toolNum) {
    case 1: useBomb(row, col); break;       // Bomb
    case 2: useLightning(row, col); break;  // Lightning
    case 3: useRainbowStar(row, col); break; // Rainbow Star
    case 6: usePotion(row, col); break;      // Potion
    default:
      // Fallback: just process normal matches
      processMatches();
      break;
  }
}

// ── Tool Fly-To Animation ──
function animateToolFlyTo(toolNum, targetRow, targetCol, callback) {
  const toolDef = TOOLS.find(t => t.tool === toolNum);
  if (!toolDef) { callback(); return; }

  // Source: find the toolbar slot position
  const slots = getToolbarSlots();
  const slotIdx = slots.findIndex(s => s.tool === toolNum);
  let srcX, srcY;
  if (slotIdx >= 0) {
    const rect = getToolSlotRect(slotIdx);
    srcX = rect.x + rect.w / 2;
    srcY = rect.y + rect.h / 2;
  } else {
    srcX = W / 2;
    srcY = toolbarY + toolbarH / 2;
  }

  // Destination: center of target cell
  const dstX = boardX + targetCol * tileSize + tileSize / 2;
  const dstY = boardY + targetRow * tileSize + tileSize / 2;

  // Control point for arc (above midpoint)
  const cpX = (srcX + dstX) / 2;
  const cpY = Math.min(srcY, dstY) - tileSize * 2;

  flyingTool = { file: toolDef.file, x: srcX, y: srcY, scale: 0.8, alpha: 1 };

  animations.push(new Animation(350, (t) => {
    const et = easeOut(t);
    // Quadratic bezier: P = (1-t)²P0 + 2(1-t)tP1 + t²P2
    const u = 1 - et;
    flyingTool.x = u * u * srcX + 2 * u * et * cpX + et * et * dstX;
    flyingTool.y = u * u * srcY + 2 * u * et * cpY + et * et * dstY;
    flyingTool.scale = 0.8 + et * 0.4;
    flyingTool.alpha = 1;
  }, () => {
    flyingTool = null;
    // Landing impact
    triggerScreenShake(3);
    triggerFlash(0.15);
    spawnSparkles(dstX, dstY, '#fff', 6);

    // Briefly show tool on the tile (place it as a special), then activate
    special[targetRow][targetCol] = toolNum;
    animations.push(new Animation(250, (t2) => {
      // Pulse the tile
      const pulse = Math.sin(t2 * Math.PI * 2);
      setOverride(targetRow, targetCol, { scale: 1 + pulse * 0.15 });
    }, () => {
      clearOverride(targetRow, targetCol);
      special[targetRow][targetCol] = 0;
      callback();
    }));
  }));
}

// ── Tool Usage ──
function useTool(toolNum, row, col) {
  const count = toolInventory[toolNum] || 0;
  if (count <= 0) { activeTool = null; return; }

  toolInventory[toolNum]--;
  activeTool = null;
  selected = null;

  switch (toolNum) {
    case 1: useBomb(row, col); break;
    case 2: useLightning(row, col); break;
    case 3: useRainbowStar(row, col); break;
    case 4: useMagnet(row, col); break;
    case 5: useStopwatch(); break;
    case 6: usePotion(row, col); break;
    case 7: useMagicWand(row, col); break;
    case 8: useTreasureChest(row, col); break;
    case 9: useSlingshot(row, col); break;
    case 10: useCloud(); break;
    default: break;
  }
}

// Tool 1: Bomb — Explodes 3x3 area
function useBomb(row, col) {
  locked = true;
  const targets = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = row + dr, c = col + dc;
      if (r >= 0 && r < ROWS && c >= 0 && c < COLS && grid[r][c] >= 0) {
        targets.push({ row: r, col: c });
      }
    }
  }

  let pts = targets.length * 30;
  score += pts;
  scorePopups.push({
    x: boardX + col * tileSize + tileSize / 2,
    y: boardY + row * tileSize + tileSize / 2,
    text: '+' + pts, alpha: 1, dy: 0,
  });

  // Animate: scale up then shrink + fade
  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  animations.push(new Animation(300, (t) => {
    const et = easeOut(t);
    for (const tgt of targets) {
      const scale = t < 0.3 ? 1 + et * 0.3 : 1.3 - (et - 0.3) * 1.3;
      setOverride(tgt.row, tgt.col, { scale: Math.max(0, scale), alpha: 1 - et });
    }
  }, () => {
    for (const t of targets) {
      grid[t.row][t.col] = -1;
      clearOverride(t.row, t.col);
      removingTiles.delete(tileKey(t.row, t.col));
      spawnHeartBurst(boardX + t.col * tileSize + tileSize / 2, boardY + t.row * tileSize + tileSize / 2, 2);
    }

// Tool 4: Magnet — Pulls all of tapped type to bottom rows

  locked = true;
  const type = grid[row][col];
  if (type < 0) { locked = false; toolInventory[4]++; return; }

  // Collect positions of this type and remove them
  const positions = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === type) {
        positions.push({ r, c });
        grid[r][c] = -1;
      }
    }
  }

  // Place them at the bottom of their columns
  for (const pos of positions) {
    // Find lowest empty spot in this column
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][pos.c] < 0) {
        grid[r][pos.c] = type;
        break;
      }
    }
  }

  // Just do a quick gravity + settle
  applyGravity();
}

// Tool 10: Cloud — Shuffles entire board
function useCloud() {
  locked = true;
  // Collect all current tile types
  const tiles = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] >= 0) tiles.push(grid[r][c]);
    }
  }

  // Shrink all tiles
  animations.push(new Animation(300, (t) => {
    const et = easeOut(t);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        setOverride(r, c, { scale: 1 - et * 0.8, alpha: 1 - et * 0.5 });
      }
    }
  }, () => {
    // Shuffle
    for (let i = tiles.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }
    let idx = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] >= 0) grid[r][c] = tiles[idx++];
      }
    }

    // Grow back in
    animations.push(new Animation(300, (t) => {
      const et = easeOutBounce(t);
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          setOverride(r, c, { scale: 0.2 + et * 0.8, alpha: 0.5 + et * 0.5 });
        }
      }
    }, () => {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          clearOverride(r, c);
        }
      }
      processMatches();
    }));
  }));
}

// ── Tool Combos ──
function getCombo(toolA, toolB) {
  // Normalize order so (A,B) and (B,A) match the same combo
  const pair = [toolA, toolB].sort((a, b) => a - b);
  const key = pair[0] + ',' + pair[1];

  const combos = {
    '3,3': comboRainbowRainbow,   // Rainbow Star + Rainbow Star → clear everything
    '1,1': comboBombBomb,          // Bomb + Bomb → 5x5 mega explosion
    '2,2': comboLightningLightning, // Lightning + Lightning → full row + full column
    '1,2': comboBombLightning,     // Bomb + Lightning → full row + full column
    '1,3': comboRainbowBomb,       // Rainbow Star + Bomb → all of type → bombs → detonate
    '2,3': comboRainbowLightning,  // Rainbow Star + Lightning → all of type → lightning → fire
  };

  return combos[key] || null;
}

// ── Input Handling ──
function canvasToGrid(cx, cy) {
  const col = Math.floor((cx - boardX) / tileSize);
  const row = Math.floor((cy - boardY) / tileSize);
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) return { row, col };
  return null;
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  return { x, y };
}

function handlePauseClick(cx, cy) {
  // Pause button area (top-right)
  const btnSize = tileSize * 0.7;
  const btnX = W - btnSize - 10;
  const btnY = 10;
  if (cx >= btnX && cx <= btnX + btnSize && cy >= btnY && cy <= btnY + btnSize) {
    paused = !paused;
    return true;
  }
  return false;
}

function handleRestartClick(cx, cy) {
  if (!gameOver) return false;
  // Check if click is on restart button
  const btnW = 160, btnH = 50;
  const btnX = W / 2 - btnW / 2;
  const btnY = H / 2 + 30;
  if (cx >= btnX && cx <= btnX + btnW && cy >= btnY && cy <= btnY + btnH) {
    restartGame();
    return true;
  }
  return false;
}

function restartGame() {
  level++;
  setupLevel(level);
  score = 0;
  moves = MAX_MOVES;
  gameOver = false;
  paused = false;
  selected = null;
  locked = false;
  animations = [];
  tileOverrides = {};
  removingTiles.clear();
  scorePopups = [];
  cascadeLevel = 0;
  heartParticles = [];
  sparkleParticles = [];
  flyingTool = null;
  screenShake = { x: 0, y: 0, intensity: 0, decay: 0.88 };
  flashAlpha = 0;
  loveLetterPhase = 0;
  loveLetterTransformed = null;
  loveLetterExploded = null;
  // Wait for any new images, then init
  function waitAndInit() {
    if (imagesLoaded >= totalImages) {
      initGrid();
    } else {
      setTimeout(waitAndInit, 50);
    }
  }
  waitAndInit();
}

function handleToolbarClick(cx, cy) {
  // Check page arrows
  if (TOOLS.length > TOOLBAR_SLOTS) {
    const arrowSize = toolSlotSize * 0.3;
    const arrowY = toolbarY + toolbarH / 2;
    const maxPage = Math.ceil(TOOLS.length / TOOLBAR_SLOTS) - 1;

    // Left arrow
    if (cx < 14 + arrowSize + 10 && cy > toolbarY && cy < toolbarY + toolbarH && toolbarPage > 0) {
      toolbarPage--;
      activeTool = null;
      return true;
    }
    // Right arrow
    if (cx > W - 14 - arrowSize - 10 && cy > toolbarY && cy < toolbarY + toolbarH && toolbarPage < maxPage) {
      toolbarPage++;
      activeTool = null;
      return true;
    }
  }

  // Check tool slots
  const slots = getToolbarSlots();
  for (let i = 0; i < slots.length; i++) {
    const r = getToolSlotRect(i);
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      const tool = slots[i];
      const count = toolInventory[tool.tool] || 0;
      if (count <= 0) return true; // no stock, ignore

      if (tool.tool === 11) {
        // Love Letter: activate immediately (no board target needed)
        toolInventory[11] = (toolInventory[11] || 0) - 1;
        activeTool = null;
        activateLoveLetter();
      } else if (activeTool !== null && activeTool !== tool.tool) {
        // Two different tools selected — check for combo
        const combo = getCombo(activeTool, tool.tool);
        if (combo) {
          toolInventory[activeTool]--;
          toolInventory[tool.tool]--;
          activeTool = null;
          combo();
        } else {
          activeTool = tool.tool; // no combo, just switch selection
        }
      } else if (activeTool === tool.tool) {
        // Same tool tapped twice — check for same-tool combo
        if ((tool.tool === 1 || tool.tool === 2 || tool.tool === 3) && count >= 2) {
          const combo = getCombo(tool.tool, tool.tool);
          if (combo) {
            toolInventory[tool.tool] -= 2;
            activeTool = null;
            combo();
          } else {
            activeTool = null;
          }
        } else {
          activeTool = null; // deselect
        }
      } else {
        activeTool = tool.tool; // select
      }
      return true;
    }
  }
  return false;
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const pos = getCanvasPos(e);

  // Always check toolbar
  if (handleToolbarClick(pos.x, pos.y)) return;

  if (locked || paused || gameOver) {
    if (gameOver) handleRestartClick(pos.x, pos.y);
    if (!gameOver) handlePauseClick(pos.x, pos.y);
    return;
  }
  if (handlePauseClick(pos.x, pos.y)) return;

  const cell = canvasToGrid(pos.x, pos.y);
  if (!cell) return;
  pointerDown = { x: pos.x, y: pos.y, row: cell.row, col: cell.col };
});

canvas.addEventListener('pointermove', (e) => {
  e.preventDefault();
  if (!pointerDown || locked) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - pointerDown.x;
  const dy = pos.y - pointerDown.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > tileSize * 0.3) {
    // Swipe detected
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      dc = dx > 0 ? 1 : -1;
    } else {
      dr = dy > 0 ? 1 : -1;
    }
    const tr = pointerDown.row + dr;
    const tc = pointerDown.col + dc;
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      doSwap(pointerDown.row, pointerDown.col, tr, tc);
    }
    pointerDown = null;
    selected = null;
  }
});

canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  if (!pointerDown || locked) { pointerDown = null; return; }

  const pos = getCanvasPos(e);
  const dx = pos.x - pointerDown.x;
  const dy = pos.y - pointerDown.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < tileSize * 0.3) {
    // Tap
    const cell = canvasToGrid(pos.x, pos.y);
    if (!cell) { pointerDown = null; return; }

    // If a tool is active, fly it to target then activate
    if (activeTool !== null) {
      const toolNum = activeTool;
      activeTool = null;
      locked = true;
      animateToolFlyTo(toolNum, cell.row, cell.col, () => {
        useTool(toolNum, cell.row, cell.col);
      });
      pointerDown = null;
      return;
    }

    if (selected) {
      if (selected.row === cell.row && selected.col === cell.col) {
        selected = null; // Deselect
      } else if (isAdjacent(selected.row, selected.col, cell.row, cell.col)) {
        doSwap(selected.row, selected.col, cell.row, cell.col);
      } else {
        selected = cell; // Select new tile
      }
    } else {
      selected = cell;
    }
  }

  pointerDown = null;
});

canvas.addEventListener('pointercancel', () => { pointerDown = null; });

// ── Rendering ──
function drawRoundedRect(x, y, w, h, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function drawTile(row, col, type, overrides) {
  if (type < 0) return;
  const info = TILE_TYPES[type];
  const pad = 2;
  const radius = tileSize * 0.15;

  let x = boardX + col * tileSize + pad;
  let y = boardY + row * tileSize + pad;
  let w = tileSize - pad * 2;
  let h = tileSize - pad * 2;
  let alpha = 1;
  let scale = 1;

  if (overrides) {
    if (overrides.x !== undefined) x = overrides.x + pad;
    if (overrides.y !== undefined) y = overrides.y + pad;
    if (overrides.alpha !== undefined) alpha = overrides.alpha;
    if (overrides.scale !== undefined) scale = overrides.scale;
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  if (scale !== 1) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
  }

  // Icon image (no background - just the gem)
  const cachedImg = imageCache[info.file];
  if (cachedImg) {
    const imgPad = w * 0.05;
    ctx.drawImage(cachedImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
  } else {
    // Fallback: draw first letter
    ctx.fillStyle = '#c2185b';
    ctx.font = 'bold ' + (w * 0.4) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.name[0], x + w / 2, y + h / 2);
  }

  ctx.restore();
}

function drawSpecialTile(row, col, type, overrides) {
  const sp = special[row] && special[row][col];
  if (!sp || sp <= 0) return;
  const toolDef = TOOLS.find(t => t.tool === sp);
  if (!toolDef) return;

  const pad = 2;
  let x = boardX + col * tileSize + pad;
  let y = boardY + row * tileSize + pad;
  let w = tileSize - pad * 2;
  let h = tileSize - pad * 2;
  let alpha = 1;
  let scale = 1;

  if (overrides) {
    if (overrides.x !== undefined) x = overrides.x + pad;
    if (overrides.y !== undefined) y = overrides.y + pad;
    if (overrides.alpha !== undefined) alpha = overrides.alpha;
    if (overrides.scale !== undefined) scale = overrides.scale;
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  if (scale !== 1) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
  }

  const radius = w * 0.2;

  // Glowing colored background
  const glowColor = sp === 1 ? '#ff6600' : sp === 2 ? '#ffee00' : sp === 3 ? '#ff00ff' : '#00bfff';
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = 10;
  drawRoundedRect(x, y, w, h, radius);
  const bgGrad = ctx.createRadialGradient(x + w/2, y + h/2, 0, x + w/2, y + h/2, w * 0.7);
  bgGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
  bgGrad.addColorStop(1, glowColor + '88');
  ctx.fillStyle = bgGrad;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Tool icon — full size
  const toolImg = imageCache[toolDef.file];
  if (toolImg) {
    const imgPad = w * 0.08;
    ctx.drawImage(toolImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
  }

  // Small gem icon in corner to show the "color" of the tile
  if (type >= 0 && type < TILE_TYPES.length) {
    const gemImg = imageCache[TILE_TYPES[type].file];
    if (gemImg) {
      const gemSize = w * 0.32;
      ctx.globalAlpha = alpha * 0.8;
      ctx.drawImage(gemImg, x + w - gemSize - 2, y + h - gemSize - 2, gemSize, gemSize);
    }
  }

  ctx.restore();
}

function drawObstacle(row, col, obs) {
  const x = boardX + col * tileSize + 2;
  const y = boardY + row * tileSize + 2;
  const w = tileSize - 4;
  const h = tileSize - 4;
  const radius = tileSize * 0.15;
  const damage = 1 - obs.hp / obs.maxHp; // 0 = full hp, 1 = almost dead

  ctx.save();

  if (obs.type === 'lockedHeart') {
    // Golden lock overlay — gets cracked as HP drops
    ctx.globalAlpha = 0.6 - damage * 0.2;
    drawRoundedRect(x, y, w, h, radius);
    ctx.fillStyle = `rgba(255, 215, 0, ${0.4 - damage * 0.2})`;
    ctx.fill();
    // Chain pattern
    ctx.strokeStyle = `rgba(184, 134, 11, ${0.7 - damage * 0.3})`;
    ctx.lineWidth = 2.5 - damage;
    // Horizontal chain
    ctx.beginPath();
    ctx.moveTo(x + 4, y + h / 2);
    ctx.lineTo(x + w - 4, y + h / 2);
    ctx.stroke();
    // Vertical chain
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y + 4);
    ctx.lineTo(x + w / 2, y + h - 4);
    ctx.stroke();
    // Lock icon
    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold ' + (w * 0.35) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(damage > 0.4 ? '\uD83D\uDD13' : '\uD83D\uDD12', x + w / 2, y + h / 2);
    // Cracks
    if (damage > 0) {
      ctx.strokeStyle = 'rgba(100,50,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.3, y + h * 0.2);
      ctx.lineTo(x + w * 0.5, y + h * 0.5);
      ctx.lineTo(x + w * 0.7, y + h * 0.3);
      ctx.stroke();
    }
  } else if (obs.type === 'roseVine') {
    // Green vines wrapping the tile — thin out with damage
    const alpha = 0.6 - damage * 0.25;
    ctx.globalAlpha = alpha;
    const vineColor = damage > 0.5 ? '#8b4513' : '#228b22';
    ctx.strokeStyle = vineColor;
    ctx.lineWidth = 3 - damage * 2;
    // Vine tendrils
    const vines = Math.max(1, Math.floor((1 - damage) * 4));
    for (let v = 0; v < vines; v++) {
      ctx.beginPath();
      const startX = x + (v % 2 === 0 ? 0 : w);
      const startY = y + (v / vines) * h;
      ctx.moveTo(startX, startY);
      ctx.quadraticCurveTo(x + w / 2, y + h * (0.3 + v * 0.15), x + (v % 2 === 0 ? w : 0), y + h * 0.8);
      ctx.stroke();
    }
    // Thorns
    ctx.fillStyle = vineColor;
    ctx.globalAlpha = alpha * 0.8;
    for (let i = 0; i < 3 - Math.floor(damage * 2); i++) {
      const tx = x + w * (0.2 + i * 0.3);
      const ty = y + h * (0.3 + (i % 2) * 0.4);
      ctx.beginPath();
      ctx.arc(tx, ty, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (obs.type === 'yarnTangle') {
    // Pink yarn strands — single hit
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#ff69b4';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 4);
    ctx.bezierCurveTo(x + w * 0.7, y + h * 0.2, x + w * 0.3, y + h * 0.8, x + w - 4, y + h - 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w - 4, y + 4);
    ctx.bezierCurveTo(x + w * 0.3, y + h * 0.3, x + w * 0.7, y + h * 0.7, x + 4, y + h - 4);
    ctx.stroke();
  }

  ctx.restore();
}

function drawPinkHeart(row, col) {
  const pad = 2;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;
  const heartImg = imageCache[PINK_HEART_FILE];
  if (heartImg) {
    const imgPad = w * 0.05;
    // Subtle pulsing glow
    ctx.save();
    ctx.shadowColor = '#ff4081';
    ctx.shadowBlur = 8;
    ctx.drawImage(heartImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
    ctx.restore();
  } else {
    ctx.fillStyle = '#ff4081';
    ctx.font = 'bold ' + (w * 0.6) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2764', x + w / 2, y + h / 2);
  }
}

function drawSelectedHighlight(row, col, time) {
  const pad = 1;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;
  const radius = tileSize * 0.15;

  const pulse = 0.5 + 0.5 * Math.sin(time * 5);
  ctx.save();
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.6 + pulse * 0.4})`;
  ctx.lineWidth = 3 + pulse;
  drawRoundedRect(x, y, w, h, radius);
  ctx.stroke();
  ctx.restore();
}

function drawBoard() {
  // Board shadow/border
  const bx = boardX - 4;
  const by = boardY - 4;
  const bw = tileSize * COLS + 8;
  const bh = tileSize * ROWS + 8;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 4;
  drawRoundedRect(bx, by, bw, bh, 12);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fill();
  ctx.restore();

  // Board bg
  drawRoundedRect(boardX - 2, boardY - 2, tileSize * COLS + 4, tileSize * ROWS + 4, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();
}

function drawHUD() {
  const cx = W / 2;

  // Level
  ctx.save();
  ctx.fillStyle = '#c2185b';
  ctx.font = 'bold ' + (tileSize * 0.32) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Level ' + level, cx, 8);

  // Score
  ctx.font = 'bold ' + (tileSize * 0.45) + 'px sans-serif';
  ctx.fillStyle = '#880e4f';
  ctx.fillText(score.toLocaleString(), cx, 8 + tileSize * 0.35);

  // Moves
  ctx.font = (tileSize * 0.26) + 'px sans-serif';
  ctx.fillStyle = '#ad1457';
  ctx.textAlign = 'left';
  ctx.fillText('Moves: ' + moves, 12, 15);

  // Pause button
  const btnSize = tileSize * 0.55;
  const btnX = W - btnSize - 12;
  const btnY = 12;

  drawRoundedRect(btnX, btnY, btnSize, btnSize, 6);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  ctx.strokeStyle = '#c2185b';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Pause icon (two bars)
  ctx.fillStyle = '#c2185b';
  if (paused) {
    // Play triangle
    ctx.beginPath();
    ctx.moveTo(btnX + btnSize * 0.35, btnY + btnSize * 0.2);
    ctx.lineTo(btnX + btnSize * 0.8, btnY + btnSize * 0.5);
    ctx.lineTo(btnX + btnSize * 0.35, btnY + btnSize * 0.8);
    ctx.closePath();
    ctx.fill();
  } else {
    const barW = btnSize * 0.18;
    ctx.fillRect(btnX + btnSize * 0.28, btnY + btnSize * 0.22, barW, btnSize * 0.56);
    ctx.fillRect(btnX + btnSize * 0.54, btnY + btnSize * 0.22, barW, btnSize * 0.56);
  }

  // Star progress bar
  const barY = hudH - tileSize * 0.3;
  const barH = tileSize * 0.16;
  const barW = W - 24;
  const barX = 12;

  // Bar background
  drawRoundedRect(barX, barY, barW, barH, barH / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Bar fill
  const maxScore = STAR_THRESHOLDS[2];
  const fillW = Math.min(score / maxScore, 1) * barW;
  if (fillW > 0) {
    ctx.save();
    ctx.beginPath();
    drawRoundedRect(barX, barY, barW, barH, barH / 2);
    ctx.clip();
    const barGrad = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
    barGrad.addColorStop(0, '#ff6b8a');
    barGrad.addColorStop(1, '#ff4081');
    ctx.fillStyle = barGrad;
    ctx.fillRect(barX, barY, fillW, barH);
    ctx.restore();
  }

  // Star markers
  const starChar = '\u2605';
  ctx.font = (tileSize * 0.25) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 3; i++) {
    const sx = barX + (STAR_THRESHOLDS[i] / maxScore) * barW;
    ctx.fillStyle = score >= STAR_THRESHOLDS[i] ? '#ffd700' : 'rgba(255,255,255,0.6)';
    ctx.fillText(starChar, sx, barY + barH / 2);
  }

  ctx.restore();
}

function drawScorePopups(dt) {
  ctx.save();
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.dy -= dt * 60;
    p.alpha -= dt * 1.5;
    if (p.alpha <= 0) {
      scorePopups.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#c2185b';
    ctx.lineWidth = 2;
    ctx.font = 'bold ' + (tileSize * 0.35) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(p.text, p.x, p.y + p.dy);
    ctx.fillText(p.text, p.x, p.y + p.dy);
  }
  ctx.restore();
}

function drawGameOver() {
  // Overlay
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  const panelW = W * 0.8;
  const panelH = tileSize * 3;
  const panelX = (W - panelW) / 2;
  const panelY = H / 2 - panelH / 2 - 10;

  drawRoundedRect(panelX, panelY, panelW, panelH, 16);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Stars
  const stars = score >= STAR_THRESHOLDS[2] ? 3 : score >= STAR_THRESHOLDS[1] ? 2 : score >= STAR_THRESHOLDS[0] ? 1 : 0;
  ctx.font = (tileSize * 0.6) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < stars ? '#ffd700' : '#ddd';
    ctx.fillText('\u2605', panelX + panelW * (0.3 + i * 0.2), panelY + tileSize * 0.6);
  }

  // Score
  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold ' + (tileSize * 0.4) + 'px sans-serif';
  ctx.fillText('Score: ' + score.toLocaleString(), W / 2, panelY + tileSize * 1.3);

  // Restart button
  const btnW = 160, btnH = 46;
  const btnX = W / 2 - btnW / 2;
  const btnY = panelY + tileSize * 1.8;

  drawRoundedRect(btnX, btnY, btnW, btnH, 23);
  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#ff6b8a');
  btnGrad.addColorStop(1, '#e91e63');
  ctx.fillStyle = btnGrad;
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (tileSize * 0.3) + 'px sans-serif';
  ctx.fillText('Play Again', W / 2, btnY + btnH / 2);

  ctx.restore();
}

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (tileSize * 0.6) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Paused', W / 2, H / 2);
  ctx.restore();
}

// ── Main Loop ──
let lastTime = 0;

function frame(now) {
  requestAnimationFrame(frame);

  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.1) : 0.016;
  lastTime = now;

  if (paused) {
    // Still draw but don't update
    render(now / 1000, dt);
    drawPauseOverlay();
    return;
  }

  // Update Love Letter animation
  if (loveLetterPhase > 0) {
    loveLetterTimer += dt;
    const TRANSFORM_DURATION = 1.2; // total time for all tiles to become hearts
    const HOLD_DURATION = 0.3;      // brief pause with all hearts showing
    const EXPLODE_STAGGER = 0.6;    // stagger explosions

    if (loveLetterPhase === 1) {
      // Phase 1: Transform tiles to pink hearts from center out
      const progress = Math.min(loveLetterTimer / TRANSFORM_DURATION, 1);
      const transformedCount = Math.floor(progress * loveLetterTransformOrder.length);

      // Mark tiles as transformed (store in a set for rendering)
      if (!loveLetterTransformed) loveLetterTransformed = new Set();
      for (let i = 0; i < transformedCount; i++) {
        const cell = loveLetterTransformOrder[i];
        loveLetterTransformed.add(cell.r + ',' + cell.c);
      }

      if (progress >= 1) {
        loveLetterPhase = 2;
        loveLetterTimer = 0;
      }
    } else if (loveLetterPhase === 2) {
      // Phase 2: Hold briefly then explode all tiles into heart particles
      if (loveLetterTimer >= HOLD_DURATION) {
        const explodeProgress = (loveLetterTimer - HOLD_DURATION) / EXPLODE_STAGGER;

        if (!loveLetterExploded) loveLetterExploded = new Set();

        const explodedCount = Math.floor(Math.min(explodeProgress, 1) * loveLetterTransformOrder.length);
        for (let i = 0; i < explodedCount; i++) {
          const cell = loveLetterTransformOrder[i];
          const key = cell.r + ',' + cell.c;
          if (!loveLetterExploded.has(key)) {
            loveLetterExploded.add(key);
            // Spawn heart particles at this cell
            const px = boardX + cell.c * tileSize + tileSize / 2;
            const py = boardY + cell.r * tileSize + tileSize / 2;
            spawnHeartBurst(px, py, 4);
          }
        }

        if (explodeProgress >= 1 && loveLetterTimer >= HOLD_DURATION + EXPLODE_STAGGER + 0.3) {
          // All done — clear the board, add score, refill
          const totalCells = ROWS * COLS;
          score += totalCells * 30;
          scorePopups.push({
            x: W / 2, y: H / 2,
            text: '+' + (totalCells * 30),
            alpha: 1, dy: 0,
          });

          // Reset grid and fill with new tiles
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = -1;
            }
          }
          loveLetterPhase = 0;
          loveLetterTransformed = null;
          loveLetterExploded = null;
          // Clear all obstacles (Love Letter destroys everything!)
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              obstacles[r][c] = null;
              special[r][c] = 0;
            }
          }
          // Refill from top (gravity animation)
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = randomType();
            }
          }
          // Animate tiles falling in from top
          for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
              const fromY = boardY + (r - ROWS) * tileSize;
              const toY = boardY + r * tileSize;
              setOverride(r, c, { y: fromY, targetY: toY });
            }
          }
          animations.push(new Animation(FALL_DUR * 2, (t) => {
            const et = easeOutBounce(t);
            for (let c = 0; c < COLS; c++) {
              for (let r = 0; r < ROWS; r++) {
                const fromY = boardY + (r - ROWS) * tileSize;
                const toY = boardY + r * tileSize;
                setOverride(r, c, { y: fromY + (toY - fromY) * et });
              }
            }
          }, () => {
            for (let r = 0; r < ROWS; r++) {
              for (let c = 0; c < COLS; c++) {
                clearOverride(r, c);
              }
            }
            // Check for any accidental matches
            processMatches();
          }));
        }
      }
    }
  }

  // Update animations
  for (let i = animations.length - 1; i >= 0; i--) {
    animations[i].tick(dt * 1000);
    if (animations[i].done) {
      animations.splice(i, 1);
    }
  }

  render(now / 1000, dt);

  if (gameOver) drawGameOver();
}

function getToolbarSlots() {
  const start = toolbarPage * TOOLBAR_SLOTS;
  return TOOLS.slice(start, start + TOOLBAR_SLOTS);
}

function getToolSlotRect(index) {
  const slots = getToolbarSlots();
  const totalW = slots.length * toolSlotSize + (slots.length - 1) * 6;
  const startX = (W - totalW) / 2;
  return {
    x: startX + index * (toolSlotSize + 6),
    y: toolbarY + (toolbarH - toolSlotSize) / 2,
    w: toolSlotSize,
    h: toolSlotSize
  };
}

function drawToolbar() {
  // Background bar
  drawRoundedRect(6, toolbarY, W - 12, toolbarH, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  const slots = getToolbarSlots();
  for (let i = 0; i < slots.length; i++) {
    const tool = slots[i];
    const r = getToolSlotRect(i);
    const count = toolInventory[tool.tool] || 0;
    const isActive = activeTool === tool.tool;

    // Slot background
    drawRoundedRect(r.x, r.y, r.w, r.h, 8);
    if (isActive) {
      ctx.fillStyle = 'rgba(255, 152, 0, 0.5)';
      ctx.fill();
      ctx.strokeStyle = '#ff9800';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else if (count > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fill();
    }

    // Tool icon
    const img = imageCache[tool.file];
    if (img) {
      ctx.save();
      if (count === 0) ctx.globalAlpha = 0.35;
      const iconPad = r.w * 0.12;
      ctx.drawImage(img, r.x + iconPad, r.y + iconPad, r.w - iconPad * 2, r.h - iconPad * 2);
      ctx.restore();
    }

    // Count badge
    if (count > 0) {
      const badgeR = toolSlotSize * 0.18;
      const bx = r.x + r.w - badgeR - 1;
      const by = r.y + r.h - badgeR - 1;
      ctx.beginPath();
      ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
      ctx.fillStyle = '#e91e63';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + (badgeR * 1.2) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(count, bx, by);
    }
  }

  // Page arrows if more than 5 tools
  if (TOOLS.length > TOOLBAR_SLOTS) {
    const arrowSize = toolSlotSize * 0.3;
    const arrowY = toolbarY + toolbarH / 2;

    // Left arrow
    ctx.fillStyle = toolbarPage > 0 ? '#c2185b' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(14, arrowY);
    ctx.lineTo(14 + arrowSize, arrowY - arrowSize * 0.6);
    ctx.lineTo(14 + arrowSize, arrowY + arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();

    // Right arrow
    const maxPage = Math.ceil(TOOLS.length / TOOLBAR_SLOTS) - 1;
    ctx.fillStyle = toolbarPage < maxPage ? '#c2185b' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(W - 14, arrowY);
    ctx.lineTo(W - 14 - arrowSize, arrowY - arrowSize * 0.6);
    ctx.lineTo(W - 14 - arrowSize, arrowY + arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function render(time, dt) {
  // Update screen shake
  if (screenShake.intensity > 0.3) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= screenShake.decay;
  } else {
    screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0;
  }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#ffe0ec');
  bgGrad.addColorStop(0.5, '#ffc2d4');
  bgGrad.addColorStop(1, '#ffb3c6');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply screen shake to board area
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // HUD
  drawHUD();

  // Board
  drawBoard();

  // Tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = tileKey(r, c);
      // Love Letter: hide exploded tiles
      if (loveLetterExploded && loveLetterExploded.has(key)) continue;

      if (removingTiles.has(key)) {
        const ov = getOverride(r, c);
        drawTile(r, c, grid[r][c], ov);
        continue;
      }
      if (grid[r][c] < 0) continue;

      // Love Letter: draw pink heart instead of normal gem
      if (loveLetterTransformed && loveLetterTransformed.has(key)) {
        drawPinkHeart(r, c);
        continue;
      }

      const ov = getOverride(r, c);

      // Special tile: draw tool as main icon with glowing bg
      if (special[r] && special[r][c] > 0) {
        drawSpecialTile(r, c, grid[r][c], ov);
        continue;
      }

      drawTile(r, c, grid[r][c], ov);
    }
  }

  // Selected highlight
  if (selected && !locked) {
    drawSelectedHighlight(selected.row, selected.col, time);
  }

  // Draw obstacles on top of tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const obs = obstacles[r] && obstacles[r][c];
      if (obs) drawObstacle(r, c, obs);
    }
  }

  // Flash overlay on board
  if (flashAlpha > 0.01) {
    ctx.save();
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(boardX - 4, boardY - 4, tileSize * COLS + 8, tileSize * ROWS + 8);
    ctx.restore();
    flashAlpha *= 0.82;
  }

  // Score popups
  drawScorePopups(dt);

  // Sparkle particles
  updateAndDrawSparkles(dt);

  // Heart particles (Love Letter effect)
  updateAndDrawHeartParticles(dt);

  // Flying tool animation
  if (flyingTool) {
    const img = imageCache[flyingTool.file];
    if (img) {
      ctx.save();
      ctx.globalAlpha = flyingTool.alpha;
      const s = tileSize * flyingTool.scale;
      ctx.drawImage(img, flyingTool.x - s / 2, flyingTool.y - s / 2, s, s);
      ctx.restore();
    }
  }

  // End screen shake transform
  ctx.restore();

  // Toolbar (drawn outside shake so it stays stable)
  drawToolbar();
}

// ── Init ──
function init() {
  setupLevel(level);
  resize();
  // Wait for images to load before starting
  function waitForImages() {
    if (imagesLoaded >= totalImages) {
      initGrid();
      requestAnimationFrame(frame);
    } else {
      setTimeout(waitForImages, 50);
    }
  }
  waitForImages();
}

window.addEventListener('resize', resize);
init();
</script>
