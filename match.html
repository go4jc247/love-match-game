<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: linear-gradient(135deg, #ffe0ec 0%, #ffc2d4 50%, #ffb3c6 100%);
  display: flex; justify-content: center; align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}
canvas {
  display: block;
  max-width: 480px;
  width: 100%;
  touch-action: none;
}

/* ── Splash Screen ── */
#splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(150deg, #fce4ec 0%, #f8bbd0 25%, #f48fb1 50%, #ec407a 80%, #d81b60 100%);
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide {
  opacity: 0;
  transform: scale(1.1);
  pointer-events: none;
}

/* Floating hearts background */
.splash-heart {
  position: absolute;
  font-size: 24px;
  opacity: 0.25;
  animation: splashFloat linear infinite;
  pointer-events: none;
}
@keyframes splashFloat {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.3; }
  50%  { opacity: 0.15; }
  100% { transform: translateY(-110vh) rotate(360deg) scale(0.4); opacity: 0; }
}

/* Sparkle dots */
.splash-sparkle {
  position: absolute;
  width: 4px; height: 4px;
  background: #fff;
  border-radius: 50%;
  animation: sparkleFloat 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes sparkleFloat {
  0%, 100% { opacity: 0; transform: scale(0); }
  50%      { opacity: 0.8; transform: scale(1); }
}

/* Icon */
.splash-icon {
  width: 160px; height: 160px;
  border-radius: 36px;
  box-shadow: 0 12px 50px rgba(136,14,79,0.35), 0 0 80px rgba(255,105,180,0.3);
  animation: splashBounce 2s ease-in-out infinite;
  position: relative; z-index: 2;
}
@keyframes splashBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-12px) scale(1.04); }
}

/* Title */
.splash-title {
  font-size: 38px;
  font-weight: 800;
  color: #fff;
  margin-top: 20px;
  text-shadow: 0 3px 12px rgba(136,14,79,0.4), 0 0 40px rgba(255,255,255,0.2);
  letter-spacing: 1px;
  position: relative; z-index: 2;
}
.splash-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.85);
  margin-top: 6px;
  font-weight: 500;
  text-shadow: 0 1px 6px rgba(136,14,79,0.3);
  position: relative; z-index: 2;
}

/* Tap to play */
.splash-tap {
  margin-top: 40px;
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  animation: tapPulse 1.8s ease-in-out infinite;
  position: relative; z-index: 2;
  text-shadow: 0 2px 8px rgba(136,14,79,0.3);
}
@keyframes tapPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1; transform: scale(1.06); }
}

/* Level badge */
.splash-level {
  margin-top: 12px;
  padding: 6px 20px;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  position: relative; z-index: 2;
}
</style>
</head>

// ── Sound Effects (procedural via Web Audio API) ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  return audioCtx;
}
function playTone(freq, duration, type, vol) {
  const ctx = getAudio();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.15, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration);
}
function sfxMatch(cascade) {
  // Rising pitch with cascade level
  const base = 400 + cascade * 80;
  playTone(base, 0.12, 'sine', 0.12);
  setTimeout(() => playTone(base * 1.25, 0.1, 'sine', 0.1), 60);
}
function sfxSwap() { playTone(300, 0.08, 'triangle', 0.08); }
function sfxBadSwap() { playTone(200, 0.15, 'sawtooth', 0.06); }
function sfxSpecial() {
  playTone(600, 0.15, 'sine', 0.12);
  setTimeout(() => playTone(800, 0.12, 'sine', 0.1), 80);
  setTimeout(() => playTone(1000, 0.1, 'sine', 0.08), 160);
}
function sfxLevelComplete() {
  [0, 100, 200, 300, 400].forEach((delay, i) => {
    setTimeout(() => playTone(500 + i * 100, 0.2, 'sine', 0.12), delay);
  });
}
function sfxGameOver() { playTone(300, 0.3, 'sawtooth', 0.08); playTone(200, 0.4, 'sawtooth', 0.06); }

function getLevelConfig(lvl) {
  const idx = Math.min(lvl - 1, LEVEL_PROGRESSION.length - 1);
  let cfg = { ...LEVEL_PROGRESSION[idx] };
  // Scale target for levels beyond the table
  if (lvl > LEVEL_PROGRESSION.length) {
    cfg.target = cfg.target + (lvl - LEVEL_PROGRESSION.length) * 1500;
  }

  // Determine level mode: use config override if present, else odd=timer even=moves
  if (!cfg.mode) {
    cfg.mode = (lvl % 2 === 1) ? 'timer' : 'moves';
  }

  // Save any per-level time/moves overrides from the config
  const cfgTime = LEVEL_PROGRESSION[idx].time;
  const cfgMoves = LEVEL_PROGRESSION[idx].moves;

  // Set tier-based defaults for time and moves
  let tierTime, tierMoves;
  if (lvl <= 5) { tierTime = 90; tierMoves = 30; }
  else if (lvl <= 10) { tierTime = 120; tierMoves = 35; }
  else if (lvl <= 15) { tierTime = 150; tierMoves = 40; }
  else if (lvl <= 20) { tierTime = 180; tierMoves = 45; }
  else if (lvl <= 30) { tierTime = 210; tierMoves = 50; }
  else if (lvl <= 40) { tierTime = 240; tierMoves = 55; }
  else { tierTime = 270; tierMoves = 60; }

  // Per-level config overrides take priority over tier defaults
  // For levels 21+, the config already has specific time/moves values
  cfg.time = (cfgTime !== undefined && lvl > 20) ? cfgTime : tierTime;
  cfg.moves = (cfgMoves !== undefined && lvl > 20) ? cfgMoves : tierMoves;

  return cfg;
}

// Apply difficulty multipliers to a level config
function applyDifficulty(cfg, difficulty) {
  const c = { ...cfg };
  if (difficulty === 'easy') {
    c.time = Math.round(c.time * 1.4);
    c.moves = Math.round(c.moves * 1.4);
    c.target = Math.round(c.target * 0.7);
  } else if (difficulty === 'hard') {
    c.time = Math.round(c.time * 0.7);
    c.moves = Math.round(c.moves * 0.7);
    c.target = Math.round(c.target * 1.3);
  }
  return c;
}

// Board mask: true = active cell, false = voided (no tile)
let boardMask = [];

// Generate board mask using clean geometric shapes relative to current ROWS/COLS
function generateBoardMask(pct) {
  boardMask = [];

  if (pct >= 1.0) {
    // Full board — most common case
    for (let r = 0; r < ROWS; r++) {
      boardMask[r] = [];
      for (let c = 0; c < COLS; c++) boardMask[r][c] = true;
    }
    return;
  }

  const cr = (ROWS - 1) / 2;
  const cc = (COLS - 1) / 2;

  // Pick a shape type based on level for variety
  const shapeType = level % 3; // 0=diamond, 1=corners-cut, 2=cross

  // Calculate radius to achieve target percentage
  const totalCells = ROWS * COLS;
  const targetActive = Math.round(totalCells * pct);

  for (let r = 0; r < ROWS; r++) {
    boardMask[r] = [];
    for (let c = 0; c < COLS; c++) boardMask[r][c] = false;
  }

  if (shapeType === 0) {
    // Diamond shape — vary radius to hit target pct
    // Binary search for the right manhattan distance
    let bestRadius = 1;
    for (let rad = 1; rad <= ROWS + COLS; rad += 0.5) {
      let count = 0;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (Math.abs(r - cr) + Math.abs(c - cc) <= rad) count++;
      if (count <= targetActive) bestRadius = rad;
      else break;
    }
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        boardMask[r][c] = Math.abs(r - cr) + Math.abs(c - cc) <= bestRadius;
  } else if (shapeType === 1) {
    // Rounded rectangle — full board with corners cut
    // Vary corner cut size to hit target pct
    let bestCut = 0;
    for (let cut = 0.5; cut <= Math.max(ROWS, COLS); cut += 0.5) {
      let count = 0;
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (Math.abs(r - cr) + Math.abs(c - cc) <= (cr + cc) - cut + 0.5) count++;
      if (count >= targetActive) { bestCut = cut; break; }
    }
    const maxDist = (cr + cc) - bestCut + 0.5;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        boardMask[r][c] = Math.abs(r - cr) + Math.abs(c - cc) <= maxDist;
  } else {
    // Cross/plus shape
    const armW = Math.max(2, Math.round(COLS * 0.4));
    const armH = Math.max(2, Math.round(ROWS * 0.4));
    const hPad = Math.floor((COLS - armW) / 2);
    const vPad = Math.floor((ROWS - armH) / 2);
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        boardMask[r][c] = (c >= hPad && c < COLS - hPad) || (r >= vPad && r < ROWS - vPad);
    // If cross gives too many cells, trim corners
    let count = 0;
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (boardMask[r][c]) count++;
    // Trim if needed by removing furthest cells
    if (count > targetActive * 1.15) {
      const cells = [];
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (boardMask[r][c]) cells.push({ r, c, dist: Math.abs(r - cr) + Math.abs(c - cc) });
      cells.sort((a, b) => b.dist - a.dist);
      let toRemove = count - targetActive;
      for (let i = 0; i < toRemove && i < cells.length; i++)
        boardMask[cells[i].r][cells[i].c] = false;
    }
  }
}

// Master gem order — shuffled once deterministically, then gems are drawn in order
// This ensures each level builds on the previous (keeps old gems, adds new ones)
const MASTER_GEM_ORDER = (() => {
  const shuffled = [...ALL_GEMS];
  let seed = 42 * 2654435761; // fixed seed so order never changes
  for (let i = shuffled.length - 1; i > 0; i--) {
    seed = (seed * 1103515245 + 12345) & 0x7fffffff;
    const j = seed % (i + 1);
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
})();

function pickGemsForLevel(lvl) {
  const cfg = getLevelConfig(lvl);
  const numGems = cfg.gems;
  // Always take the first N gems from the master order
  // This way level 3 (4 gems) has the same 3 gems as level 1 plus 1 new one
  return MASTER_GEM_ORDER.slice(0, numGems);
}

// Preloaded images (keyed by file path)
const imageCache = {};

function preloadImages(gems) {
  const allFiles = [...gems.map(g => g.file), ...TOOLS.map(t => t.file), PINK_HEART_FILE, ...OBSTACLE_SPRITE_FILES];
  // Deduplicate
  const unique = [...new Set(allFiles)];
  totalImages = unique.length;
  imagesLoaded = 0;
  for (const file of unique) {
    if (imageCache[file]) { imagesLoaded++; continue; }
    const img = new Image();
    img.onload = () => { imageCache[file] = img; imagesLoaded++; };
    img.onerror = () => { imagesLoaded++; };
    img.src = file;
  }
}

function setupLevel(lvl) {
  const cfg = getLevelConfig(lvl);
  COLS = cfg.cols;
  ROWS = cfg.rows;
  const gems = pickGemsForLevel(lvl);
  TILE_TYPES = gems;
  NUM_TYPES = TILE_TYPES.length;
  preloadImages(gems);
  generateBoardMask(cfg.boardPct);
  resize(); // recalculate layout for new grid size
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const maxW = Math.min(480, window.innerWidth);
  const maxH = window.innerHeight;

  // Calculate tile size to fit board + toolbar
  const availW = maxW - 20;  // 10px margin each side
  tileSize = Math.floor(availW / COLS);

  hudH = tileSize * 1.6;  // HUD height
  toolbarH = tileSize * 1.2; // Toolbar height
  const boardH = tileSize * ROWS;

  W = tileSize * COLS + 20;
  H = hudH + boardH + toolbarH + 10;

  if (H > maxH) {
    const scale = maxH / H;
    tileSize = Math.floor(tileSize * scale);
    hudH = tileSize * 1.6;
    toolbarH = tileSize * 1.2;
    W = tileSize * COLS + 20;
    H = hudH + tileSize * ROWS + toolbarH + 10;
  }

  toolSlotSize = Math.floor(Math.min((W - 20) / 5, toolbarH - 8));
  toolbarY = hudH + tileSize * ROWS + 4;

  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  boardX = (W - tileSize * COLS) / 2;
  boardY = hudH;
}

// Compute all cells that will be matched + the swap cells (for tutorial highlighting)
function computeTutorialHighlight(r1, c1, r2, c2) {
  // Temporarily swap, find matches, swap back
  [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];
  const matches = findMatches();
  [grid[r1][c1], grid[r2][c2]] = [grid[r2][c2], grid[r1][c1]];

  // Build highlight set: swap cells + all matched cells
  const seen = new Set();
  const highlight = [];
  function addCell(row, col) {
    const k = row * 1000 + col;
    if (!seen.has(k)) { seen.add(k); highlight.push({ row, col }); }
  }
  // Swap cells first (they get special "swap" marker for the arrow)
  addCell(r1, c1);
  addCell(r2, c2);
  // All matched cells
  for (const key of matches) {
    addCell(Math.floor(key / COLS), key % COLS);
  }
  // Also highlight adjacent obstacles that will be damaged
  for (const key of matches) {
    const mr = Math.floor(key / COLS), mc = key % COLS;
    for (const [adjR, adjC] of [[mr-1,mc],[mr+1,mc],[mr,mc-1],[mr,mc+1]]) {
      if (adjR >= 0 && adjR < ROWS && adjC >= 0 && adjC < COLS && hasObstacle(adjR, adjC)) {
        addCell(adjR, adjC);
      }
    }
  }
  return highlight;
}

// Start guided tutorial for current level (called after grid init)
function startGuidedTutorial() {
  const tutDef = TUTORIAL_LEVELS[level];
  if (!tutDef) { guidedTutorial = null; return; }

  if (tutDef.useHintNearObstacle) {
    // For obstacle levels: find a move adjacent to an obstacle
    const hint = findHintNearObstacle() || findHintMove();
    if (hint) {
      const r1 = hint[0].row, c1 = hint[0].col, r2 = hint[1].row, c2 = hint[1].col;
      guidedTutorial = {
        swap: { r1, c1, r2, c2 },
        swapCells: [{ row: r1, col: c1 }, { row: r2, col: c2 }],
        highlight: computeTutorialHighlight(r1, c1, r2, c2),
        message: tutDef.message,
        postMessage: tutDef.postMessage,
        done: false, postTimer: 0,
      };
    } else {
      guidedTutorial = null;
    }
  } else if (tutDef.swap) {
    const s = tutDef.swap;
    guidedTutorial = {
      swap: { ...s },
      swapCells: [{ row: s.r1, col: s.c1 }, { row: s.r2, col: s.c2 }],
      highlight: computeTutorialHighlight(s.r1, s.c1, s.r2, s.c2),
      message: tutDef.message,
      postMessage: tutDef.postMessage,
      done: false, postTimer: 0,
    };
  }
}

// Find a hint move that creates a match adjacent to an obstacle
function findHintNearObstacle() {
  const dirs = [[0,1],[1,0]];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] < 0 || !boardMask[r] || !boardMask[r][c]) continue;
      if (hasObstacle(r, c)) continue;
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr >= ROWS || nc >= COLS) continue;
        if (grid[nr][nc] < 0 || !boardMask[nr] || !boardMask[nr][nc]) continue;
        if (hasObstacle(nr, nc)) continue;
        [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]];
        const matches = findMatches();
        [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]];
        if (matches.size > 0) {
          for (const key of matches) {
            const mr = Math.floor(key / COLS), mc = key % COLS;
            for (const [adjR, adjC] of [[mr-1,mc],[mr+1,mc],[mr,mc-1],[mr,mc+1]]) {
              if (adjR >= 0 && adjR < ROWS && adjC >= 0 && adjC < COLS && hasObstacle(adjR, adjC)) {
                return [{row: r, col: c}, {row: nr, col: nc}];
              }
            }
          }
        }
      }
    }
  }
  return null;
}

// Check if a swap matches the guided tutorial swap (either direction)
function isTutorialSwap(r1, c1, r2, c2) {
  if (!guidedTutorial || guidedTutorial.done) return true;
  const s = guidedTutorial.swap;
  return (r1 === s.r1 && c1 === s.c1 && r2 === s.r2 && c2 === s.c2) ||
         (r1 === s.r2 && c1 === s.c2 && r2 === s.r1 && c2 === s.c1);
}

// Shared "nudge" animation: two cells do a partial swap (~15%) then bounce back.
// Returns the pixel offset {dx, dy} to apply to cell 0 (cell 1 gets the negative).
// The nudge fires every ~2.5s: quick slide out (0.15s), elastic bounce back (0.35s), then idle.
function calcSwapNudge(time, cell0, cell1) {
  const cycle = 2.0; // seconds per nudge cycle
  const phase = (time % cycle) / cycle; // 0→1 within cycle
  const nudgeFrac = 0.22; // how far to slide (fraction of tileSize)

  // Direction vector from cell0 to cell1
  const dirX = (cell1.col - cell0.col);
  const dirY = (cell1.row - cell0.row);

  let t = 0; // displacement factor: 0 = home, 1 = full nudge distance
  if (phase < 0.10) {
    // Slide out: 0→1 ease-out
    const p = phase / 0.10;
    t = 1 - (1 - p) * (1 - p); // ease out (decelerate)
  } else if (phase < 0.35) {
    // Elastic bounce back: 1→0 with overshoot
    const p = (phase - 0.10) / 0.25;
    t = (1 - p) * Math.cos(p * Math.PI * 2) * Math.exp(-p * 2.5);
  }
  // else t = 0 (idle until next cycle)

  return {
    dx: dirX * t * tileSize * nudgeFrac,
    dy: dirY * t * tileSize * nudgeFrac,
  };
}

// Draw the guided tutorial overlay
function drawGuidedTutorial(time) {
  if (!guidedTutorial) return;
  const gt = guidedTutorial;

  if (gt.done) {
    // Show post-message briefly
    if (gt.postTimer > 0) {
      const alpha = Math.min(1, gt.postTimer);
      ctx.save();
      ctx.fillStyle = `rgba(0,0,0,${0.5 * alpha})`;
      ctx.fillRect(0, 0, W, H);
      const boxW = W * 0.9;
      const boxH = tileSize * 1.8;
      const boxX = (W - boxW) / 2;
      const boxY = boardY + tileSize * ROWS / 2 - boxH / 2;
      drawRoundedRect(boxX, boxY, boxW, boxH, 12);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
      ctx.fillStyle = `rgba(76,175,80,${alpha})`;
      ctx.font = 'bold ' + (tileSize * 0.28) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Word-wrap post message
      const pmWords = gt.postMessage.split(' ');
      const pmMaxW = boxW - 20;
      let pmLines = [], pmCur = '';
      for (const w of pmWords) {
        const test = pmCur ? pmCur + ' ' + w : w;
        if (ctx.measureText(test).width > pmMaxW) { pmLines.push(pmCur); pmCur = w; }
        else { pmCur = test; }
      }
      if (pmCur) pmLines.push(pmCur);
      const pmLineH = tileSize * 0.38;
      const pmStartY = boxY + boxH / 2 - (pmLines.length - 1) * pmLineH / 2;
      for (let i = 0; i < pmLines.length; i++) {
        ctx.fillText(pmLines[i], W / 2, pmStartY + i * pmLineH);
      }
      ctx.restore();
    }
    return;
  }

  // Dark overlay over entire board
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(boardX - 4, boardY - 4, tileSize * COLS + 8, tileSize * ROWS + 8);

  // Determine swap cells
  const swapSet = new Set();
  if (gt.swapCells) {
    for (const sc of gt.swapCells) swapSet.add(sc.row * 1000 + sc.col);
  }

  // Calculate nudge offset for swap cells
  let nudge = { dx: 0, dy: 0 };
  if (gt.swapCells && gt.swapCells.length === 2) {
    nudge = calcSwapNudge(time, gt.swapCells[0], gt.swapCells[1]);
  }

  const rad = tileSize * 0.15;

  // For each highlighted cell: clear overlay, draw white rounded rect, redraw tile
  for (const cell of gt.highlight) {
    const cx = boardX + cell.col * tileSize;
    const cy = boardY + cell.row * tileSize;

    // Clear the dark overlay using the rounded rect shape (not a full square)
    drawRoundedRect(cx, cy, tileSize, tileSize, rad);
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0,0,0,1)';
    ctx.fill();
    ctx.restore();

    // Draw white rounded rectangle background
    drawRoundedRect(cx, cy, tileSize, tileSize, rad);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Redraw the tile on top
    const isSwapCell = swapSet.has(cell.row * 1000 + cell.col);
    const isObstacleCell = hasObstacle(cell.row, cell.col);
    let cellNudgeX = 0, cellNudgeY = 0;
    if (isSwapCell && gt.swapCells) {
      if (cell.row === gt.swapCells[0].row && cell.col === gt.swapCells[0].col) {
        cellNudgeX = nudge.dx; cellNudgeY = nudge.dy;
      } else {
        cellNudgeX = -nudge.dx; cellNudgeY = -nudge.dy;
      }
    }
    const tileOv = isSwapCell ? { x: cx + cellNudgeX, y: cy + cellNudgeY } : null;
    if (isObstacleCell) {
      drawObstacle(cell.row, cell.col, obstacles[cell.row][cell.col]);
    } else if (special[cell.row] && special[cell.row][cell.col] > 0) {
      drawSpecialTile(cell.row, cell.col, grid[cell.row][cell.col], tileOv);
    } else {
      drawTile(cell.row, cell.col, grid[cell.row][cell.col], tileOv);
    }
  }

  // Tutorial message overlaid at top of board
  const msgBoxW = W * 0.9;
  const msgBoxH = tileSize * 0.9;
  const msgBoxX = (W - msgBoxW) / 2;
  const msgBoxY = boardY + tileSize * 0.3;
  drawRoundedRect(msgBoxX, msgBoxY, msgBoxW, msgBoxH, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fill();
  ctx.strokeStyle = '#e91e63';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold ' + (tileSize * 0.28) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(gt.message, W / 2, msgBoxY + msgBoxH / 2);

  ctx.restore();
}

// Electric arcs
let electricArcs = [];
function spawnElectricArc(x1, y1, x2, y2, color, duration) {
  const numSegments = 6 + Math.floor(Math.random() * 3);
  const segments = [];
  for (let i = 0; i <= numSegments; i++) {
    const t = i / numSegments;
    const px = x1 + (x2 - x1) * t;
    const py = y1 + (y2 - y1) * t;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    const nx = -dy / (len || 1), ny = dx / (len || 1);
    const offset = (i === 0 || i === numSegments) ? 0 : (Math.random() - 0.5) * 20;
    segments.push({ x: px + nx * offset, y: py + ny * offset });
  }
  electricArcs.push({
    x1, y1, x2, y2, color: color || '#00e5ff',
    alpha: 1, segments, life: duration || 0.4, age: 0,
    numSegments
  });
}

// Input state
let pointerDown = null; // {x, y, row, col}

// ── Grid Logic ──
function randomType() {
  return Math.floor(Math.random() * NUM_TYPES);
}

function initGrid() {
  grid = [];
  special = [];
  obstacles = [];

  // Check if this level has a deterministic tutorial grid
  const tutDef = TUTORIAL_LEVELS[level];
  if (tutDef && tutDef.grid) {
    // Use the pre-built tutorial grid
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      special[r] = [];
      obstacles[r] = [];
      for (let c = 0; c < COLS; c++) {
        if (!boardMask[r] || !boardMask[r][c]) {
          grid[r][c] = -1;
          special[r][c] = 0;
          obstacles[r][c] = null;
          continue;
        }
        grid[r][c] = (tutDef.grid[r] && tutDef.grid[r][c] !== undefined) ? tutDef.grid[r][c] : randomType();
        special[r][c] = 0;
        obstacles[r][c] = null;
      }
    }
    // Tutorial levels with grids: no obstacles, start guided tutorial
    startGuidedTutorial();
    return;
  }

  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    special[r] = [];
    obstacles[r] = [];
    for (let c = 0; c < COLS; c++) {
      if (!boardMask[r] || !boardMask[r][c]) {
        grid[r][c] = -1;   // voided cell
        special[r][c] = 0;
        obstacles[r][c] = null;
        continue;
      }
      let type;
      do {
        type = randomType();
      } while (wouldMatch(r, c, type));
      grid[r][c] = type;
      special[r][c] = 0; // no special tool
      obstacles[r][c] = null;
    }
  }
  // Place obstacles based on level
  initObstacles();
  // Start obstacle tutorial if applicable (level 6)
  if (TUTORIAL_LEVELS[level] && TUTORIAL_LEVELS[level].useHintNearObstacle) {
    startGuidedTutorial();
  }
}

function initObstacles() {
  const cfg = getLevelConfig(level);

  // Use hardcoded layout if available
  if (OBSTACLE_LAYOUTS[level]) {
    for (const o of OBSTACLE_LAYOUTS[level]) {
      if (o.r >= ROWS || o.c >= COLS) continue;
      if (!boardMask[o.r] || !boardMask[o.r][o.c]) continue;
      const def = OBSTACLE_TYPES[o.type];
      if (!def) continue;
      obstacles[o.r][o.c] = { type: o.type, hp: def.maxHp, maxHp: def.maxHp };
    }
    return;
  }

  // Fallback: random placement for levels without a hardcoded layout
  if (level < 6 && !cfg.obstacleCount) return;

  const obstacleCount = cfg.obstacleCount || Math.min(2 + Math.floor((level - 5) / 2), 12);
  const types = Object.keys(OBSTACLE_TYPES);
  let availableTypes;
  if (cfg.obstacleTypes) {
    availableTypes = cfg.obstacleTypes;
  } else if (level <= 8) {
    availableTypes = ['crate'];
  } else if (level <= 12) {
    availableTypes = ['crate', 'ice'];
  } else if (level <= 16) {
    availableTypes = ['crate', 'ice', 'giftbox'];
  } else {
    availableTypes = types;
  }
  let placed = 0;
  let attempts = 0;
  while (placed < obstacleCount && attempts < 200) {
    attempts++;
    const r = 1 + Math.floor(Math.random() * (Math.max(1, ROWS - 2)));
    const c = 1 + Math.floor(Math.random() * (Math.max(1, COLS - 2)));
    if (r >= ROWS || c >= COLS) continue;
    if (!boardMask[r] || !boardMask[r][c]) continue;
    if (obstacles[r][c]) continue;
    const type = availableTypes[Math.floor(Math.random() * availableTypes.length)];
    const def = OBSTACLE_TYPES[type];
    obstacles[r][c] = { type, hp: def.maxHp, maxHp: def.maxHp };
    placed++;
  }
}

function wouldMatch(row, col, type) {
  // Check left
  if (col >= 2 && grid[row][col-1] === type && grid[row][col-2] === type) return true;
  // Check up
  if (row >= 2 && grid[row-1] !== undefined && grid[row-1][col] === type &&
      grid[row-2] !== undefined && grid[row-2][col] === type) return true;
  // Check 2x2 square (check all 4 possible 2x2 positions this cell could be part of)
  for (let dr = -1; dr <= 0; dr++) {
    for (let dc = -1; dc <= 0; dc++) {
      const r0 = row + dr, c0 = col + dc;
      if (r0 < 0 || r0 + 1 >= ROWS || c0 < 0 || c0 + 1 >= COLS) continue;
      let count = 0;
      for (let rr = r0; rr <= r0 + 1; rr++) {
        for (let cc = c0; cc <= c0 + 1; cc++) {
          if (rr === row && cc === col) continue; // skip self
          if (grid[rr] && grid[rr][cc] === type) count++;
        }
      }
      if (count === 3) return true; // other 3 cells already match
    }
  }
  return false;
}

function hasObstacle(r, c) {
  return obstacles[r] && obstacles[r][c] !== null && obstacles[r][c] !== undefined;
}

// Can this cell participate in match detection?
// Ice obstacles: gem is visible and matchable (but not swappable)
// Other obstacles: gem is hidden, not matchable
function isMatchable(r, c) {
  if (grid[r][c] < 0) return false;
  if (!hasObstacle(r, c)) return true;
  return obstacles[r][c].type === 'ice'; // ice gem is visible and matchable
}

// Shuffle all non-special, non-obstacle active tiles until a valid move exists
function shuffleBoard() {
  locked = true;
  scorePopups.push({
    x: W / 2, y: boardY + tileSize * ROWS / 2,
    text: 'No moves! Shuffling...', alpha: 1, dy: 0,
  });

  // Collect all swappable cell positions and their types
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!boardMask[r] || !boardMask[r][c]) continue;
      if (grid[r][c] < 0) continue;
      if (special[r] && special[r][c] > 0) continue;
      if (hasObstacle(r, c)) continue;
      cells.push({ r, c });
    }
  }

  // Shuffle types among those cells (up to 50 attempts to find a valid board)
  for (let attempt = 0; attempt < 50; attempt++) {
    // Fisher-Yates shuffle of the types
    const types = cells.map(cell => grid[cell.r][cell.c]);
    for (let i = types.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [types[i], types[j]] = [types[j], types[i]];
    }
    // Apply shuffled types
    for (let i = 0; i < cells.length; i++) {
      grid[cells[i].r][cells[i].c] = types[i];
    }
    // Check if valid moves exist now
    if (findHintMove()) break;
  }

  // Brief animation then unlock
  animations.push(new Animation(400, () => {}, () => {
    locked = false;
    clearHint();
  }));
}

// Find a valid swap that creates a match (for hint system)
function findHintMove() {
  const dirs = [[0,1],[1,0]]; // right and down
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] < 0 || !boardMask[r] || !boardMask[r][c]) continue;
      if (hasObstacle(r, c)) continue;
      for (const [dr, dc] of dirs) {
        const nr = r + dr, nc = c + dc;
        if (nr >= ROWS || nc >= COLS) continue;
        if (grid[nr][nc] < 0 || !boardMask[nr] || !boardMask[nr][nc]) continue;
        if (hasObstacle(nr, nc)) continue;
        // Try swap
        [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]];
        const matches = findMatches();
        [grid[r][c], grid[nr][nc]] = [grid[nr][nc], grid[r][c]]; // swap back
        if (matches.size > 0) {
          return [{row: r, col: c}, {row: nr, col: nc}];
        }
      }
    }
  }
  return null;
}

function findMatches() {
  const matched = new Set();

  // Horizontal (skip non-matchable cells; ice is matchable)
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c <= COLS - 3; c++) {
      const t = grid[r][c];
      if (!isMatchable(r, c)) continue;
      let len = 1;
      while (c + len < COLS && grid[r][c + len] === t && isMatchable(r, c + len)) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matched.add(r * COLS + c + i);
      }
      if (len > 1) c += len - 2;
    }
  }

  // Vertical (skip non-matchable cells; ice is matchable)
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r <= ROWS - 3; r++) {
      const t = grid[r][c];
      if (!isMatchable(r, c)) continue;
      let len = 1;
      while (r + len < ROWS && grid[r + len][c] === t && isMatchable(r + len, c)) len++;
      if (len >= 3) {
        for (let i = 0; i < len; i++) matched.add((r + i) * COLS + c);
      }
      if (len > 1) r += len - 2;
    }
  }

  // 2x2 squares (skip non-matchable cells; ice is matchable)
  for (let r = 0; r <= ROWS - 2; r++) {
    for (let c = 0; c <= COLS - 2; c++) {
      const t = grid[r][c];
      if (!isMatchable(r, c)) continue;
      if (grid[r][c+1] === t && isMatchable(r, c+1) &&
          grid[r+1][c] === t && isMatchable(r+1, c) &&
          grid[r+1][c+1] === t && isMatchable(r+1, c+1)) {
        matched.add(r * COLS + c);
        matched.add(r * COLS + c + 1);
        matched.add((r+1) * COLS + c);
        matched.add((r+1) * COLS + c + 1);
      }
    }
  }

  return matched;
}

function scoreForMatch(length) {
  if (length >= 5) return SCORE_5;
  if (length === 4) return SCORE_4;
  return SCORE_3;
}

function getMatchGroups() {
  // Returns array of { cells: [{row,col}], shape: string, spawnTool: number|null, spawnAt: {row,col}|null }
  const results = [];
  const claimed = new Set(); // prevent double-counting cells

  // First pass: find all horizontal and vertical runs (respecting obstacle matchability)
  const hRuns = []; // {row, startCol, len, type}
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      if (!isMatchable(r, c)) { c++; continue; }
      const t = grid[r][c];
      let len = 1;
      while (c + len < COLS && grid[r][c + len] === t && isMatchable(r, c + len)) len++;
      if (len >= 3) hRuns.push({ row: r, col: c, len, type: t });
      c += len;
    }
  }

  const vRuns = []; // {col, startRow, len, type}
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      if (!isMatchable(r, c)) { r++; continue; }
      const t = grid[r][c];
      let len = 1;
      while (r + len < ROWS && grid[r + len][c] === t && isMatchable(r + len, c)) len++;
      if (len >= 3) vRuns.push({ row: r, col: c, len, type: t });
      r += len;
    }
  }

  // Detect Cross shapes first (highest priority): a horizontal and vertical run of 3+
  // intersecting at a cell, with at least 2 cells extending in each of the 4 directions
  for (const h of hRuns) {
    for (const v of vRuns) {
      if (h.type !== v.type) continue;
      // Find intersection
      const intR = h.row;
      const intC = v.col;
      if (intC < h.col || intC >= h.col + h.len) continue;
      if (intR < v.row || intR >= v.row + v.len) continue;
      // Check it extends in all 4 directions from intersection
      const left = intC - h.col;
      const right = (h.col + h.len - 1) - intC;
      const up = intR - v.row;
      const down = (v.row + v.len - 1) - intR;
      if (left >= 1 && right >= 1 && up >= 1 && down >= 1) {
        // It's a cross/plus! Combine all cells
        const cells = [];
        const cellSet = new Set();
        for (let i = 0; i < h.len; i++) {
          const k = tileKey(h.row, h.col + i);
          if (!cellSet.has(k)) { cells.push({ row: h.row, col: h.col + i }); cellSet.add(k); }
        }
        for (let i = 0; i < v.len; i++) {
          const k = tileKey(v.row + i, v.col);
          if (!cellSet.has(k)) { cells.push({ row: v.row + i, col: v.col }); cellSet.add(k); }
        }
        // Only add if not already claimed
        const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
        if (!anyClaimed) {
          cells.forEach(c => claimed.add(tileKey(c.row, c.col)));
          results.push({ cells, shape: 'cross', spawnTool: 3, spawnAt: { row: intR, col: intC } });
          h._used = true;
          v._used = true;
        }
      }
    }
  }

  // Detect L/T shapes: a horizontal run and vertical run of 3+ sharing a type that intersect
  // but don't form a cross (only extend in 3 directions from intersection, not 4)
  for (const h of hRuns) {
    if (h._used) continue;
    for (const v of vRuns) {
      if (v._used) continue;
      if (h.type !== v.type) continue;
      const intR = h.row;
      const intC = v.col;
      if (intC < h.col || intC >= h.col + h.len) continue;
      if (intR < v.row || intR >= v.row + v.len) continue;
      // Not a cross (already handled above), so it's an L or T
      const cells = [];
      const cellSet = new Set();
      for (let i = 0; i < h.len; i++) {
        const k = tileKey(h.row, h.col + i);
        if (!cellSet.has(k)) { cells.push({ row: h.row, col: h.col + i }); cellSet.add(k); }
      }
      for (let i = 0; i < v.len; i++) {
        const k = tileKey(v.row + i, v.col);
        if (!cellSet.has(k)) { cells.push({ row: v.row + i, col: v.col }); cellSet.add(k); }
      }
      const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
      if (!anyClaimed) {
        cells.forEach(c => claimed.add(tileKey(c.row, c.col)));
        results.push({ cells, shape: 'LT', spawnTool: 1, spawnAt: { row: intR, col: intC } });
        h._used = true;
        v._used = true;
      }
    }
  }

  // Detect 5-in-a-row, 4-in-a-row, 3-in-a-row (line runs not yet claimed)
  const allRuns = [...hRuns.filter(r => !r._used), ...vRuns.filter(r => !r._used)];
  // Sort longest first so 5-in-a-row gets priority
  allRuns.sort((a, b) => b.len - a.len);

  for (const run of allRuns) {
    const isH = ('row' in run && hRuns.includes(run));
    const cells = [];
    for (let i = 0; i < run.len; i++) {
      const r = isH ? run.row : run.row + i;
      const c = isH ? run.col + i : run.col;
      cells.push({ row: r, col: c });
    }
    const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
    if (anyClaimed) continue;

    cells.forEach(c => claimed.add(tileKey(c.row, c.col)));

    if (run.len >= 5) {
      const mid = cells[Math.floor(cells.length / 2)];
      results.push({ cells, shape: '5row', spawnTool: 3, spawnAt: mid });
    } else if (run.len === 4) {
      const mid = cells[Math.floor(cells.length / 2)];
      results.push({ cells, shape: '4row', spawnTool: 2, spawnAt: mid });
    } else {
      results.push({ cells, shape: '3row', spawnTool: null, spawnAt: null });
    }
  }

  // Detect 2x2 squares (cells not already claimed)
  for (let r = 0; r <= ROWS - 2; r++) {
    for (let c = 0; c <= COLS - 2; c++) {
      if (!isMatchable(r, c)) continue;
      const t = grid[r][c];
      if (!isMatchable(r, c+1) || !isMatchable(r+1, c) || !isMatchable(r+1, c+1)) continue;
      if (grid[r][c+1] !== t || grid[r+1][c] !== t || grid[r+1][c+1] !== t) continue;
      const cells = [
        { row: r, col: c }, { row: r, col: c+1 },
        { row: r+1, col: c }, { row: r+1, col: c+1 }
      ];
      const anyClaimed = cells.some(c => claimed.has(tileKey(c.row, c.col)));
      if (anyClaimed) continue;
      cells.forEach(c => claimed.add(tileKey(c.row, c.col)));
      // Spawn potion at bottom-right of square
      results.push({ cells, shape: '2x2', spawnTool: 6, spawnAt: { row: r+1, col: c+1 } });
    }
  }

  return results;
}

// ── Animation System ──
class Animation {
  constructor(duration, updateFn, doneFn) {
    this.duration = duration;
    this.elapsed = 0;
    this.updateFn = updateFn;
    this.doneFn = doneFn;
    this.done = false;
  }
  tick(dt) {
    this.elapsed += dt;
    const t = Math.min(this.elapsed / this.duration, 1);
    this.updateFn(t);
    if (t >= 1) {
      this.done = true;
      if (this.doneFn) this.doneFn();
    }
  }
}

// Easing functions
function easeOut(t) { return 1 - (1 - t) * (1 - t); }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - (-2*t+2)*(-2*t+2)/2; }
function easeOutBounce(t) {
  if (t < 1/2.75) return 7.5625*t*t;
  if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t + 0.75; }
  if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t + 0.9375; }
  t -= 2.625/2.75; return 7.5625*t*t + 0.984375;
}

// Tile display overrides (for animations)
let tileOverrides = {}; // key "r,c" -> {x, y, scale, alpha}
let removingTiles = new Set(); // tiles being removed (don't draw normally)

function tileKey(r, c) { return r + ',' + c; }

function setOverride(r, c, props) {
  const k = tileKey(r, c);
  if (!tileOverrides[k]) tileOverrides[k] = {};
  Object.assign(tileOverrides[k], props);
}

function clearOverride(r, c) {
  delete tileOverrides[tileKey(r, c)];
}

function getOverride(r, c) {
  return tileOverrides[tileKey(r, c)] || null;
}

// ── Swap & Match Pipeline ──
function isAdjacent(r1, c1, r2, c2) {
  return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
}

function doSwap(r1, c1, r2, c2) {
  // Can't swap obstacle cells
  if (hasObstacle(r1, c1) || hasObstacle(r2, c2)) {
    selected = null;
    return;
  }
  // During guided tutorial, only allow the tutorial swap
  if (guidedTutorial && !guidedTutorial.done && !isTutorialSwap(r1, c1, r2, c2)) {
    selected = null;
    return;
  }
  // Mark tutorial swap as done when executed
  if (guidedTutorial && !guidedTutorial.done && isTutorialSwap(r1, c1, r2, c2)) {
    guidedTutorial.done = true;
    guidedTutorial.postTimer = 2.5; // show post-message for 2.5 seconds
  }
  locked = true;
  selected = null;
  sfxSwap();

  // Animate swap
  const startX1 = boardX + c1 * tileSize;
  const startY1 = boardY + r1 * tileSize;
  const startX2 = boardX + c2 * tileSize;
  const startY2 = boardY + r2 * tileSize;

  animations.push(new Animation(SWAP_DUR, (t) => {
    const et = easeInOut(t);
    setOverride(r1, c1, { x: startX1 + (startX2 - startX1) * et, y: startY1 + (startY2 - startY1) * et });
    setOverride(r2, c2, { x: startX2 + (startX1 - startX2) * et, y: startY2 + (startY1 - startY2) * et });
  }, () => {
    clearOverride(r1, c1);
    clearOverride(r2, c2);

    // Actually swap in grid
    const tmp = grid[r1][c1];
    grid[r1][c1] = grid[r2][c2];
    grid[r2][c2] = tmp;

    // Also swap specials
    const tmpSp = special[r1][c1];
    special[r1][c1] = special[r2][c2];
    special[r2][c2] = tmpSp;

    // Check if either tile is a special — activate it!
    const sp1 = special[r1][c1];
    const sp2 = special[r2][c2];

    if (sp1 > 0 || sp2 > 0) {
      // Consume the move for move-based levels
      if (getLevelConfig(level).mode === 'moves' && movesLeft > 0) { movesLeft--; }

      // Check for special+special combo
      if (sp1 > 0 && sp2 > 0) {
        const combo = getCombo(sp1, sp2);
        special[r1][c1] = 0;
        special[r2][c2] = 0;
        if (combo) {
          combo();
        } else {
          // No combo — activate both separately
          activateSpecialOnBoard(sp1, r1, c1);
          activateSpecialOnBoard(sp2, r2, c2);
        }
      } else if (sp1 > 0) {
        special[r1][c1] = 0;
        activateSpecialOnBoard(sp1, r1, c1);
      } else {
        special[r2][c2] = 0;
        activateSpecialOnBoard(sp2, r2, c2);
      }
      return;
    }

    // Check for matches
    const matches = findMatches();
    if (matches.size === 0) {
      // Invalid swap - swap back (also swap specials back)
      sfxBadSwap();
      const tmpSp2 = special[r1][c1];
      special[r1][c1] = special[r2][c2];
      special[r2][c2] = tmpSp2;
      animateSwapBack(r1, c1, r2, c2);
    } else {
      // Decrement moves for move-based levels on successful swap
      if (getLevelConfig(level).mode === 'moves' && movesLeft > 0) { movesLeft--; }
      cascadeLevel = 0;
      lastSwap = { r1, c1, r2, c2 };
      processMatches();
    }
  }));
}

function animateSwapBack(r1, c1, r2, c2) {
  // Swap grid back
  const tmp = grid[r1][c1];
  grid[r1][c1] = grid[r2][c2];
  grid[r2][c2] = tmp;

  const startX1 = boardX + c1 * tileSize;
  const startY1 = boardY + r1 * tileSize;
  const startX2 = boardX + c2 * tileSize;
  const startY2 = boardY + r2 * tileSize;

  animations.push(new Animation(BOUNCE_DUR, (t) => {
    const et = easeOutBounce(t);
    // They're already at swapped positions visually, so animate back
    setOverride(r1, c1, { x: startX2 + (startX1 - startX2) * et, y: startY2 + (startY1 - startY2) * et });
    setOverride(r2, c2, { x: startX1 + (startX2 - startX1) * et, y: startY1 + (startY2 - startY1) * et });
  }, () => {
    clearOverride(r1, c1);
    clearOverride(r2, c2);
    locked = false;
  }));
}

function processMatches() {
  const groups = getMatchGroups();
  if (groups.length === 0) {
    // Check game over (timer or moves exhausted)
    if (getLevelConfig(level).mode === 'timer' && timeLeft <= 0) {
      gameOver = true;
    } else if (getLevelConfig(level).mode === 'moves' && movesLeft <= 0) {
      gameOver = true;
    }
    // Check if any valid moves exist — if not, shuffle the board
    if (!gameOver && !levelComplete && !findHintMove()) {
      shuffleBoard();
      return;
    }
    locked = false;
    return;
  }

  cascadeLevel++;
  const multiplier = cascadeLevel;

  // Collect all matched positions and track tool spawns
  const allMatched = new Set();
  let totalScore = 0;
  const toolSpawns = []; // {toolNum, row, col} — tools to add to inventory

  for (const group of groups) {
    const pts = scoreForMatch(group.cells.length) * multiplier;
    totalScore += pts;

    // Score popup at center of group
    const centerIdx = Math.floor(group.cells.length / 2);
    const centerR = group.cells[centerIdx].row;
    const centerC = group.cells[centerIdx].col;
    scorePopups.push({
      x: boardX + centerC * tileSize + tileSize / 2,
      y: boardY + centerR * tileSize + tileSize / 2,
      text: '+' + pts + (group.shape !== '3row' ? ' ' + group.shape : ''),
      alpha: 1,
      dy: 0,
    });

    for (const pos of group.cells) {
      allMatched.add(tileKey(pos.row, pos.col));
    }

    // Queue tool spawn — place at the swapped tile that's part of this match
    if (group.spawnTool !== null) {
      let spawnR = group.spawnAt ? group.spawnAt.row : group.cells[0].row;
      let spawnC = group.spawnAt ? group.spawnAt.col : group.cells[0].col;

      // If we know which tiles were swapped, prefer that position
      if (lastSwap) {
        const cellSet = new Set(group.cells.map(c => tileKey(c.row, c.col)));
        // Check if either swapped tile is in this match group
        if (cellSet.has(tileKey(lastSwap.r1, lastSwap.c1))) {
          spawnR = lastSwap.r1;
          spawnC = lastSwap.c1;
        } else if (cellSet.has(tileKey(lastSwap.r2, lastSwap.c2))) {
          spawnR = lastSwap.r2;
          spawnC = lastSwap.c2;
        }
      }

      toolSpawns.push({ toolNum: group.spawnTool, row: spawnR, col: spawnC });
    }
  }

  score += Math.round(totalScore * difficultyScoreMultiplier);
  sfxMatch(cascadeLevel);
  checkLevelComplete();
  lastSwap = null; // Only use swap position for the initial match, not cascades

  // Cascade multiplier popup
  if (cascadeLevel > 1) {
    scorePopups.push({
      x: W / 2, y: boardY + tileSize * ROWS / 2,
      text: 'x' + cascadeLevel + ' Chain!', alpha: 1, dy: 0,
    });
  }

  // Impact effects — screen shake, flash, sparkles
  const matchCount = allMatched.size;
  triggerScreenShake(Math.min((2 + matchCount * 0.5) * cascadeLevel, 12));
  triggerFlash(Math.min(0.1 + matchCount * 0.02 + cascadeLevel * 0.05, 0.4));

  // Sparkles at each cleared position
  allMatched.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    const type = grid[r][c];
    const color = type >= 0 && TILE_TYPES[type] ? (TILE_TYPES[type].bg1 || '#ff69b4') : '#ff69b4';
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      color, 4 + cascadeLevel
    );
  });

  // Split matched cells: ice obstacles get damaged (gem stays), normal cells get cleared
  const iceHits = [];    // cells with ice obstacle — damage ice, keep gem
  const normalClears = []; // cells without obstacle — remove as normal
  allMatched.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    if (hasObstacle(r, c) && obstacles[r][c].type === 'ice') {
      iceHits.push({ row: r, col: c });
    } else {
      normalClears.push({ row: r, col: c });
    }
  });

  // The matchedArr is ALL matched cells (used for adjacent obstacle damage)
  const matchedArr = [...iceHits, ...normalClears];

  // Only animate removal for normal clears (ice cells stay)
  for (const { row, col } of normalClears) {
    removingTiles.add(tileKey(row, col));
  }

  animations.push(new Animation(MATCH_DUR, (t) => {
    const et = easeOut(t);
    for (const { row, col } of normalClears) {
      setOverride(row, col, { scale: 1 - et * 0.8, alpha: 1 - et });
    }
  }, () => {
    // Remove normal tiles from grid
    for (const { row, col } of normalClears) {
      grid[row][col] = -1;
      clearOverride(row, col);
      removingTiles.delete(tileKey(row, col));
    }
    // Damage ice obstacles (gem stays, ice takes hit)
    for (const { row, col } of iceHits) {
      damageIceObstacle(row, col);
    }
    // Spawn tools ON THE BOARD from special matches
    for (const spawn of toolSpawns) {
      // Don't place tools on obstacle cells
      if (hasObstacle(spawn.row, spawn.col)) continue;
      // Place the special tool tile at the spawn position
      // Keep the gem type so it has a "color" identity, but mark it special
      if (grid[spawn.row][spawn.col] === -1) {
        // Cell was cleared — place a new random gem with the special
        grid[spawn.row][spawn.col] = randomType();
      }
      special[spawn.row][spawn.col] = spawn.toolNum;
      const toolDef = TOOLS.find(t => t.tool === spawn.toolNum);
      if (toolDef) {
        scorePopups.push({
          x: boardX + spawn.col * tileSize + tileSize / 2,
          y: boardY + spawn.row * tileSize + tileSize / 2,
          text: toolDef.name + '!',
          alpha: 1, dy: -15,
        });
      }
    }
    // Damage adjacent obstacles (only 'adjacent' mode obstacles take damage from this)
    damageAdjacentObstacles(normalClears);
    // Apply gravity
    applyGravity();
  }));
}

function damageObstacle(r, c, damageType) {
  if (!obstacles[r] || !obstacles[r][c]) return;
  const obs = obstacles[r][c];
  const def = OBSTACLE_TYPES[obs.type];

  // Check if this obstacle accepts this damage type
  if (damageType === 'match') {
    // 'adjacent' accepts match damage, 'toolOnly' and 'matchInside' do NOT
    // (matchInside ice is handled separately via ice match logic in processMatches)
    if (def.damageMode !== 'adjacent') return;
  }
  // 'tool' damage is always accepted by all obstacle types

  obs.hp--;
  if (obs.hp <= 0) {
    obstacles[r][c] = null;
    // Break effect — sparkles + shake
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      def.color1, 8
    );
    triggerScreenShake(3);
    scorePopups.push({
      x: boardX + c * tileSize + tileSize / 2,
      y: boardY + r * tileSize + tileSize / 2,
      text: 'Free!', alpha: 1, dy: 0,
    });
    // Gem reveal animation — grow in from scale 0
    setOverride(r, c, { scale: 0, alpha: 0.5 });
    animations.push(new Animation(300, (t) => {
      const et = easeOutBounce(t);
      setOverride(r, c, { scale: et, alpha: 0.5 + et * 0.5 });
    }, () => {
      clearOverride(r, c);
    }));
  } else {
    // Damage feedback — brief shake on the obstacle
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      def.color1, 3
    );
  }
}

// Ice-specific damage: called from processMatches when ice gem is part of a match
// This bypasses normal damageMode check since ice match logic is special
function damageIceObstacle(r, c) {
  if (!obstacles[r] || !obstacles[r][c]) return;
  const obs = obstacles[r][c];
  if (obs.type !== 'ice') return;
  const def = OBSTACLE_TYPES[obs.type];

  obs.hp--;
  if (obs.hp <= 0) {
    obstacles[r][c] = null;
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      def.color1, 8
    );
    triggerScreenShake(3);
    scorePopups.push({
      x: boardX + c * tileSize + tileSize / 2,
      y: boardY + r * tileSize + tileSize / 2,
      text: 'Free!', alpha: 1, dy: 0,
    });
    // Gem is already there and visible — just a brief flash
    setOverride(r, c, { scale: 1.2 });
    animations.push(new Animation(200, (t) => {
      const et = easeOut(t);
      setOverride(r, c, { scale: 1.2 - et * 0.2 });
    }, () => {
      clearOverride(r, c);
    }));
  } else {
    spawnSparkles(
      boardX + c * tileSize + tileSize / 2,
      boardY + r * tileSize + tileSize / 2,
      def.color1, 3
    );
  }
}

function damageAdjacentObstacles(clearedCells) {
  const damaged = new Set();
  for (const { row, col } of clearedCells) {
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [dr, dc] of dirs) {
      const nr = row + dr, nc = col + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        const k = tileKey(nr, nc);
        if (!damaged.has(k) && obstacles[nr] && obstacles[nr][nc]) {
          damaged.add(k);
          damageObstacle(nr, nc, 'match');
        }
      }
    }
  }
}

function checkLevelComplete() {
  if (levelComplete || gameOver) return;
  const cfg = applyDifficulty(getLevelConfig(level), currentDifficulty);
  if (score >= cfg.target) {
    levelComplete = true;
    sfxLevelComplete();
    // Sync progress to spouse immediately
    if (gistSync.isConfigured()) {
      const stars = score >= cfg.target * 2 ? 3 : score >= cfg.target ? 2 : 1;
      saveLevelStars(level, stars);
      gistSync.syncGameProgress().catch(() => {});
      // Send sweet milestone messages at certain levels
      const milestones = { 5: "We made it through 5 levels together! 💕", 10: "10 levels! Playing with you makes everything sweeter 🥰", 15: "Level 15! You inspire me to keep going ❤️", 20: "20 levels conquered together! I love doing life with you 💑" };
      if (milestones[level]) {
        gistSync.sendLoveNote(milestones[level]).catch(() => {});
      }
    }
    // Collect all special tools on the board to activate one by one
    levelCompleteToolQueue = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (special[r] && special[r][c] > 0) {
          levelCompleteToolQueue.push({ row: r, col: c, toolNum: special[r][c] });
        }
      }
    }
    levelCompleteDelay = 0.5; // initial delay before starting tool cascade
    scorePopups.push({
      x: W / 2, y: H / 3,
      text: 'Level Complete!', alpha: 1, dy: 0,
    });
  }
}

function applyGravity() {
  // For each column, find gaps and drop tiles (obstacles are immovable)
  const drops = [];
  const newTiles = [];

  for (let c = 0; c < COLS; c++) {
    // Work with segments separated by obstacles
    let writeRow = ROWS - 1;

    // Scan bottom up, obstacles and voided cells block gravity
    while (writeRow >= 0) {
      // Skip voided cells
      if (boardMask[writeRow] && !boardMask[writeRow][c]) { writeRow--; continue; }
      // Skip obstacle rows
      if (hasObstacle(writeRow, c)) { writeRow--; continue; }

      // Find the gap: is this row empty?
      if (grid[writeRow][c] >= 0) { writeRow--; continue; }

      // Empty cell — find a tile above to drop into it
      let sourceRow = writeRow - 1;
      while (sourceRow >= 0 && grid[sourceRow][c] < 0 && !hasObstacle(sourceRow, c) &&
             (boardMask[sourceRow] && boardMask[sourceRow][c])) {
        sourceRow--;
      }

      if (sourceRow < 0 || hasObstacle(sourceRow, c) ||
          (boardMask[sourceRow] && !boardMask[sourceRow][c])) {
        // No tile above (or blocked by obstacle/void) — need new tile
        break;
      }

      // Drop tile from sourceRow to writeRow
      grid[writeRow][c] = grid[sourceRow][c];
      special[writeRow][c] = special[sourceRow][c];
      grid[sourceRow][c] = -1;
      special[sourceRow][c] = 0;
      drops.push({ col: c, fromRow: sourceRow, toRow: writeRow, type: grid[writeRow][c] });
      writeRow--;
    }

    // Fill remaining empty spots at top of each segment with new tiles
    for (let r = writeRow; r >= 0; r--) {
      if (!boardMask[r] || !boardMask[r][c]) continue; // skip voided
      if (hasObstacle(r, c)) continue;
      if (grid[r][c] < 0) {
        const type = randomType();
        grid[r][c] = type;
        special[r][c] = 0;
        newTiles.push({ row: r, col: c, type, dropFrom: -(r + 1) });
      }
    }
  }

  // Animate drops
  if (drops.length === 0 && newTiles.length === 0) {
    processMatches(); // Check cascades
    return;
  }

  // Set up drop overrides
  for (const d of drops) {
    const fromY = boardY + d.fromRow * tileSize;
    const toY = boardY + d.toRow * tileSize;
    setOverride(d.toRow, d.col, { y: fromY, targetY: toY, dropping: true });
  }
  for (const n of newTiles) {
    const fromY = boardY + n.dropFrom * tileSize;
    const toY = boardY + n.row * tileSize;
    setOverride(n.row, n.col, { y: fromY, targetY: toY, dropping: true });
  }

  const allDrops = [...drops.map(d => ({ row: d.toRow, col: d.col, fromY: boardY + d.fromRow * tileSize, toY: boardY + d.toRow * tileSize })),
                     ...newTiles.map(n => ({ row: n.row, col: n.col, fromY: boardY + n.dropFrom * tileSize, toY: boardY + n.row * tileSize }))];

  animations.push(new Animation(FALL_DUR, (t) => {
    const et = easeOutBounce(t);
    for (const d of allDrops) {
      setOverride(d.row, d.col, { y: d.fromY + (d.toY - d.fromY) * et });
    }
  }, () => {
    for (const d of allDrops) {
      clearOverride(d.row, d.col);
    }
    // Check for cascading matches
    processMatches();
  }));
}

// ── Heart Particles (for Love Letter explosion) ──
let heartParticles = [];

function spawnHeartBurst(x, y, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 120;
    heartParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 30,
      size: 6 + Math.random() * 10,
      alpha: 1,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 6,
      gravity: 80 + Math.random() * 40,
      life: 0.8 + Math.random() * 0.6,
      age: 0,
    });
  }
}

function updateAndDrawHeartParticles(dt) {
  if (heartParticles.length === 0) return;
  const heartImg = imageCache[PINK_HEART_FILE];
  ctx.save();
  for (let i = heartParticles.length - 1; i >= 0; i--) {
    const p = heartParticles[i];
    p.age += dt;
    if (p.age >= p.life) { heartParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.rotation += p.rotSpeed * dt;
    p.alpha = 1 - (p.age / p.life);

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    if (heartImg) {
      ctx.drawImage(heartImg, -p.size / 2, -p.size / 2, p.size, p.size);
    } else {
      // Fallback pink heart shape
      ctx.fillStyle = '#ff4081';
      ctx.font = p.size + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2764', 0, 0);
    }
    ctx.restore();
  }
  ctx.restore();
}

function updateAndDrawSparkles(dt) {
  if (sparkleParticles.length === 0) return;
  ctx.save();
  for (let i = sparkleParticles.length - 1; i >= 0; i--) {
    const p = sparkleParticles[i];
    p.age += dt;
    if (p.age >= p.life) { sparkleParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.alpha = 1 - (p.age / p.life);

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      // Draw a small 4-point star
      const s = p.size;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.age * 4);
      ctx.beginPath();
      for (let j = 0; j < 8; j++) {
        const r = j % 2 === 0 ? s : s * 0.4;
        const a = (j / 8) * Math.PI * 2;
        j === 0 ? ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r) : ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.restore();
}

// ── Update and Draw New Particle Effects ──
function updateAndDrawExplosionRings(dt) {
  if (explosionRings.length === 0) return;
  ctx.save();
  for (let i = explosionRings.length - 1; i >= 0; i--) {
    const r = explosionRings[i];
    r.age += dt;
    if (r.age >= r.life) { explosionRings.splice(i, 1); continue; }
    const t = r.age / r.life;
    r.radius = r.maxRadius * easeOut(t);
    r.alpha = 1 - t;
    ctx.save();
    ctx.globalAlpha = r.alpha;
    ctx.strokeStyle = r.color;
    ctx.lineWidth = r.lineWidth * (1 - t * 0.6);
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function updateAndDrawFireParticles(dt) {
  if (fireParticles.length === 0) return;
  ctx.save();
  for (let i = fireParticles.length - 1; i >= 0; i--) {
    const p = fireParticles[i];
    p.age += dt;
    if (p.age >= p.life) { fireParticles.splice(i, 1); continue; }
    p.x += p.vx * dt + Math.sin(p.wobble + p.age * p.wobbleSpeed) * 1.5;
    p.y += p.vy * dt;
    p.vy -= 80 * dt; // drift upward
    p.alpha = 1 - (p.age / p.life);
    p.size *= 0.98;
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.restore();
}

function updateAndDrawElectricArcs(dt) {
  if (electricArcs.length === 0) return;
  ctx.save();
  for (let i = electricArcs.length - 1; i >= 0; i--) {
    const arc = electricArcs[i];
    arc.age += dt;
    if (arc.age >= arc.life) { electricArcs.splice(i, 1); continue; }
    arc.alpha = 1 - (arc.age / arc.life);
    // Re-randomize segments for flicker
    for (let j = 1; j < arc.segments.length - 1; j++) {
      const t = j / arc.numSegments;
      const px = arc.x1 + (arc.x2 - arc.x1) * t;
      const py = arc.y1 + (arc.y2 - arc.y1) * t;
      const dx = arc.x2 - arc.x1, dy = arc.y2 - arc.y1;
      const len = Math.sqrt(dx * dx + dy * dy);
      const nx = -dy / (len || 1), ny = dx / (len || 1);
      const offset = (Math.random() - 0.5) * 20;
      arc.segments[j] = { x: px + nx * offset, y: py + ny * offset };
    }
    ctx.save();
    ctx.globalAlpha = arc.alpha;
    ctx.strokeStyle = arc.color;
    ctx.lineWidth = 2 + Math.random() * 2;
    ctx.shadowColor = arc.color;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.moveTo(arc.segments[0].x, arc.segments[0].y);
    for (let j = 1; j < arc.segments.length; j++) {
      ctx.lineTo(arc.segments[j].x, arc.segments[j].y);
    }
    ctx.stroke();
    // Draw a thinner bright core
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

function updateAndDrawShockwaves(dt) {
  if (shockwaveRings.length === 0) return;
  ctx.save();
  for (let i = shockwaveRings.length - 1; i >= 0; i--) {
    const s = shockwaveRings[i];
    s.age += dt;
    if (s.age >= s.life) { shockwaveRings.splice(i, 1); continue; }
    const t = s.age / s.life;
    s.radius = s.maxRadius * easeOut(t);
    s.alpha = 0.8 * (1 - t);
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = s.lineWidth * (1 - t * 0.5);
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}

// ── Love Letter: Clear Everything ──
let loveLetterPhase = 0;  // 0=inactive, 1=transforming, 2=exploding
let loveLetterTimer = 0;
let loveLetterTransformOrder = []; // cells in order they transform
let loveLetterTransformed = null;  // Set of "r,c" keys for transformed cells
let loveLetterExploded = null;     // Set of "r,c" keys for exploded cells

function activateLoveLetter() {
  locked = true;
  loveLetterPhase = 1;
  loveLetterTimer = 0;

  // Build transform order: spiral from center outward
  const cx = COLS / 2, cy = ROWS / 2;
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const dist = Math.sqrt((c - cx) * (c - cx) + (r - cy) * (r - cy));
      cells.push({ r, c, dist });
    }
  }
  cells.sort((a, b) => a.dist - b.dist);
  loveLetterTransformOrder = cells;
}

// ── Activate Special Tile on Board ──
function activateSpecialOnBoard(toolNum, row, col) {
  locked = true;
  cascadeLevel = 0;
  sfxSpecial();
  triggerScreenShake(5);
  triggerFlash(0.25);
  switch (toolNum) {
    case 1: useBomb(row, col); break;       // Bomb
    case 2: useLightning(row, col); break;  // Lightning
    case 3: useRainbowStar(row, col); break; // Rainbow Star
    case 6: usePotion(row, col); break;      // Potion
    default:
      // Fallback: just process normal matches
      processMatches();
      break;
  }
}

// ── Tool Fly-To Animation ──
function animateToolFlyTo(toolNum, targetRow, targetCol, callback) {
  const toolDef = TOOLS.find(t => t.tool === toolNum);
  if (!toolDef) { callback(); return; }

  // Source: find the toolbar slot position
  const slots = getToolbarSlots();
  const slotIdx = slots.findIndex(s => s.tool === toolNum);
  let srcX, srcY;
  if (slotIdx >= 0) {
    const rect = getToolSlotRect(slotIdx);
    srcX = rect.x + rect.w / 2;
    srcY = rect.y + rect.h / 2;
  } else {
    srcX = W / 2;
    srcY = toolbarY + toolbarH / 2;
  }

  // Destination: center of target cell
  const dstX = boardX + targetCol * tileSize + tileSize / 2;
  const dstY = boardY + targetRow * tileSize + tileSize / 2;

  // Control point for arc (above midpoint)
  const cpX = (srcX + dstX) / 2;
  const cpY = Math.min(srcY, dstY) - tileSize * 2;

  flyingTool = { file: toolDef.file, x: srcX, y: srcY, scale: 0.8, alpha: 1 };

  animations.push(new Animation(350, (t) => {
    const et = easeOut(t);
    // Quadratic bezier: P = (1-t)²P0 + 2(1-t)tP1 + t²P2
    const u = 1 - et;
    flyingTool.x = u * u * srcX + 2 * u * et * cpX + et * et * dstX;
    flyingTool.y = u * u * srcY + 2 * u * et * cpY + et * et * dstY;
    flyingTool.scale = 0.8 + et * 0.4;
    flyingTool.alpha = 1;
  }, () => {
    flyingTool = null;
    // Landing impact
    triggerScreenShake(3);
    triggerFlash(0.15);
    spawnSparkles(dstX, dstY, '#fff', 6);

    // Briefly show tool on the tile (place it as a special), then activate
    special[targetRow][targetCol] = toolNum;
    animations.push(new Animation(250, (t2) => {
      // Pulse the tile
      const pulse = Math.sin(t2 * Math.PI * 2);
      setOverride(targetRow, targetCol, { scale: 1 + pulse * 0.15 });
    }, () => {
      clearOverride(targetRow, targetCol);
      special[targetRow][targetCol] = 0;
      callback();
    }));
  }));
}

// ── Tool Usage ──
function useTool(toolNum, row, col) {
  const count = toolInventory[toolNum] || 0;
  if (count <= 0) { activeTool = null; return; }

  toolInventory[toolNum]--;
  activeTool = null;
  selected = null;

  switch (toolNum) {
    case 1: useBomb(row, col); break;
    case 2: useLightning(row, col); break;
    case 3: useRainbowStar(row, col); break;
    case 4: useMagnet(row, col); break;
    case 5: useStopwatch(); break;
    case 6: usePotion(row, col); break;
    case 7: useMagicWand(row, col); break;
    case 8: useTreasureChest(row, col); break;
    case 9: useSlingshot(row, col); break;
    case 10: useCloud(); break;
    default: break;
  }
}

// Chain-activate special tools one at a time with delays
function activatePendingTools(queue, callback) {
  if (!queue || queue.length === 0) {
    callback();
    return;
  }
  const next = queue.shift();
  // Only activate if the special is still there (wasn't already cleared)
  if (special[next.row] && special[next.row][next.col] > 0) {
    const toolNum = special[next.row][next.col];
    special[next.row][next.col] = 0;
    // Bright glow pulse on the tile before it fires
    const tx = boardX + next.col * tileSize + tileSize / 2;
    const ty = boardY + next.row * tileSize + tileSize / 2;
    animations.push(new Animation(400, (t) => {
      // White glow pulse: scale up then back
      const pulse = Math.sin(t * Math.PI);
      setOverride(next.row, next.col, { scale: 1 + pulse * 0.4 });
      // Spawn sparkles at peak
      if (t > 0.45 && t < 0.55) {
        spawnSparkles(tx, ty, '#ffffff', 4);
      }
    }, () => {
      clearOverride(next.row, next.col);
      triggerFlash(0.15);
      activateSpecialOnBoard(toolNum, next.row, next.col);
      // After that tool resolves, continue with remaining queue
      // 0.4s delay between activations
      animations.push(new Animation(100, () => {}, () => {
        activatePendingTools(queue, callback);
      }));
    }));
  } else {
    activatePendingTools(queue, callback);
  }
}

// Tool 1: Bomb — Explodes 3x3 area
function useBomb(row, col) {
  locked = true;
  const targets = [];
  const obstacleHits = [];
  const pendingToolActivations = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const r = row + dr, c = col + dc;
      if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
      if (hasObstacle(r, c)) {
        obstacleHits.push({ row: r, col: c });
      } else if (grid[r][c] >= 0) {
        if (special[r] && special[r][c] > 0 && !(r === row && c === col)) {
          pendingToolActivations.push({ row: r, col: c, toolNum: special[r][c] });
        }
        targets.push({ row: r, col: c });
      }
    }
  }

  let pts = targets.length * 30;
  score += pts;
  scorePopups.push({
    x: boardX + col * tileSize + tileSize / 2,
    y: boardY + row * tileSize + tileSize / 2,
    text: '+' + pts, alpha: 1, dy: 0,
  });

  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  const cx = boardX + col * tileSize + tileSize / 2;
  const cy = boardY + row * tileSize + tileSize / 2;

  // Phase 1 (0-150ms): Bomb grows at center, screen dims
  animations.push(new Animation(150, (t) => {
    // Pulse center tile bigger
    setOverride(row, col, { scale: 1 + easeOut(t) * 0.5 });
  }, () => {
    clearOverride(row, col);
    // Phase 2 (150-300ms): Flash, explosion ring, fire burst
    triggerFlash(0.5);
    triggerScreenShake(8);
    spawnExplosionRing(cx, cy, '#ff4081', tileSize * 2);
    spawnFireParticles(cx, cy, 20);
    spawnShockwave(cx, cy);

    animations.push(new Animation(250, (t) => {
      const et = easeOut(t);
      for (const tgt of targets) {
        // Stagger by distance from center
        const dist = Math.abs(tgt.row - row) + Math.abs(tgt.col - col);
        const delay = dist * 0.15;
        const lt = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
        const s = lt < 0.2 ? 1 + lt * 2 : Math.max(0, 1.4 - (lt - 0.2) * 1.75);
        setOverride(tgt.row, tgt.col, { scale: s, alpha: 1 - lt });
      }
    }, () => {
      for (const t of targets) {
        grid[t.row][t.col] = -1;
        clearOverride(t.row, t.col);
        removingTiles.delete(tileKey(t.row, t.col));
        const tx = boardX + t.col * tileSize + tileSize / 2;
        const ty = boardY + t.row * tileSize + tileSize / 2;
        spawnHeartBurst(tx, ty, 2);
        // Each target gets a small explosion ring staggered by distance
        const dist = Math.abs(t.row - row) + Math.abs(t.col - col);
        setTimeout(() => spawnExplosionRing(tx, ty, '#ff6b8a', tileSize * 0.8), dist * 40);
      }
      // Damage obstacles hit by bomb (tool damage)
      for (const h of obstacleHits) {
        damageObstacle(h.row, h.col, 'tool');
      }
      // Chain-activate specials hit by the bomb
      activatePendingTools(pendingToolActivations, () => {
        applyGravity();
      });
    }));
  }));
}

// Tool 2: Lightning — Clears entire row AND column of tapped tile
function useLightning(row, col) {
  locked = true;
  const targets = [];
  const obstacleHits = [];
  const pendingToolActivations = [];
  const seen = new Set();
  for (let c = 0; c < COLS; c++) {
    const k = tileKey(row, c);
    if (seen.has(k)) continue;
    seen.add(k);
    if (hasObstacle(row, c)) {
      obstacleHits.push({ row, col: c });
    } else if (grid[row][c] >= 0) {
      if (special[row] && special[row][c] > 0 && c !== col) {
        pendingToolActivations.push({ row, col: c, toolNum: special[row][c] });
      }
      targets.push({ row, col: c });
    }
  }
  for (let r = 0; r < ROWS; r++) {
    const k = tileKey(r, col);
    if (seen.has(k)) continue;
    seen.add(k);
    if (hasObstacle(r, col)) {
      obstacleHits.push({ row: r, col });
    } else if (grid[r][col] >= 0) {
      if (special[r] && special[r][col] > 0) {
        pendingToolActivations.push({ row: r, col, toolNum: special[r][col] });
      }
      targets.push({ row: r, col });
    }
  }

  let pts = targets.length * 25;
  score += pts;
  scorePopups.push({
    x: boardX + col * tileSize + tileSize / 2,
    y: boardY + row * tileSize + tileSize / 2,
    text: '+' + pts, alpha: 1, dy: 0,
  });

  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  const cx = boardX + col * tileSize + tileSize / 2;
  const cy = boardY + row * tileSize + tileSize / 2;

  // Spawn electric arcs along row and column
  const rowLeft = boardX + tileSize / 2;
  const rowRight = boardX + (COLS - 1) * tileSize + tileSize / 2;
  const colTop = boardY + tileSize / 2;
  const colBottom = boardY + (ROWS - 1) * tileSize + tileSize / 2;
  spawnElectricArc(cx, cy, rowLeft, cy, '#00e5ff', 0.5);
  spawnElectricArc(cx, cy, rowRight, cy, '#00e5ff', 0.5);
  spawnElectricArc(cx, cy, cx, colTop, '#00e5ff', 0.5);
  spawnElectricArc(cx, cy, cx, colBottom, '#00e5ff', 0.5);
  triggerFlash(0.3);
  triggerScreenShake(6);

  animations.push(new Animation(350, (t) => {
    const et = easeOut(t);
    for (const tgt of targets) {
      // Flash white then fade
      const flash = t < 0.2 ? 1 : 0;
      setOverride(tgt.row, tgt.col, { scale: 1 - et * 0.8, alpha: 1 - et });
    }
  }, () => {
    for (const t of targets) {
      grid[t.row][t.col] = -1;
      clearOverride(t.row, t.col);
      removingTiles.delete(tileKey(t.row, t.col));
      // Cyan/white sparkles at each destroyed cell
      const tx = boardX + t.col * tileSize + tileSize / 2;
      const ty = boardY + t.row * tileSize + tileSize / 2;
      spawnSparkles(tx, ty, Math.random() < 0.5 ? '#00e5ff' : '#ffffff', 4);
    }
    for (const h of obstacleHits) {
      damageObstacle(h.row, h.col, 'tool');
    }
    activatePendingTools(pendingToolActivations, () => {
      applyGravity();
    });
  }));
}

// Tool 3: Rainbow Star — Removes all tiles of the tapped type
function useRainbowStar(row, col) {
  locked = true;
  const type = grid[row][col];
  if (type < 0) { locked = false; toolInventory[3]++; return; }

  const targets = [];
  const obstacleHits = [];
  const pendingToolActivations = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === type) {
        if (hasObstacle(r, c)) {
          obstacleHits.push({ row: r, col: c });
        } else {
          if (special[r] && special[r][c] > 0 && !(r === row && c === col)) {
            pendingToolActivations.push({ row: r, col: c, toolNum: special[r][c] });
          }
          targets.push({ row: r, col: c });
        }
      }
    }
  }

  let pts = targets.length * 35;
  score += pts;
  scorePopups.push({
    x: boardX + col * tileSize + tileSize / 2,
    y: boardY + row * tileSize + tileSize / 2,
    text: '+' + pts, alpha: 1, dy: 0,
  });

  for (const t of targets) removingTiles.add(tileKey(t.row, t.col));

  const cx = boardX + col * tileSize + tileSize / 2;
  const cy = boardY + row * tileSize + tileSize / 2;
  const gemColor = TILE_TYPES[type] ? TILE_TYPES[type].bg1 : '#ff4081';

  // Phase 1 (0-250ms): Star spins and grows with rainbow glow at center
  animations.push(new Animation(250, (t) => {
    const pulse = 1 + Math.sin(t * Math.PI * 4) * 0.3;
    setOverride(row, col, { scale: pulse });
  }, () => {
    clearOverride(row, col);

    // Phase 2: Colored rays shoot from center to each matching gem (lines drawn via sparkle trails)
    for (const tgt of targets) {
      if (tgt.row === row && tgt.col === col) continue;
      const tx = boardX + tgt.col * tileSize + tileSize / 2;
      const ty = boardY + tgt.row * tileSize + tileSize / 2;
      // Spawn sparkle trail from center to target
      const steps = 4;
      for (let i = 0; i < steps; i++) {
        const sx = cx + (tx - cx) * (i / steps);
        const sy = cy + (ty - cy) * (i / steps);
        spawnSparkles(sx, sy, gemColor, 2);
      }
    }

    // Phase 3: Each gem bursts into confetti
    animations.push(new Animation(400, (t) => {
      const et = easeOut(t);
      for (const tgt of targets) {
        setOverride(tgt.row, tgt.col, { scale: 1 - et, alpha: 1 - et });
      }
    }, () => {
      for (const t of targets) {
        grid[t.row][t.col] = -1;
        clearOverride(t.row, t.col);
        removingTiles.delete(tileKey(t.row, t.col));
        const tx = boardX + t.col * tileSize + tileSize / 2;
        const ty = boardY + t.row * tileSize + tileSize / 2;
        spawnSparkles(tx, ty, gemColor, 8);
        spawnHeartBurst(tx, ty, 2);
      }
      for (const h of obstacleHits) {
        damageObstacle(h.row, h.col, 'tool');
      }
      activatePendingTools(pendingToolActivations, () => {
        applyGravity();
      });
    }));
  }));
}

// Tool 4: Magnet — Pulls all of tapped type to bottom rows
function useMagnet(row, col) {
  locked = true;
  const type = grid[row][col];
  if (type < 0) { locked = false; toolInventory[4]++; return; }

  // Find the 2 nearest tiles of the same type (by Manhattan distance)
  const candidates = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (r === row && c === col) continue;
      if (grid[r][c] === type && !hasObstacle(r, c)) {
        const dist = Math.abs(r - row) + Math.abs(c - col);
        candidates.push({ r, c, dist });
      }
    }
  }
  candidates.sort((a, b) => a.dist - b.dist);

  if (candidates.length < 2) {
    // Not enough matching tiles — refund
    locked = false;
    toolInventory[4] = (toolInventory[4] || 0) + 1;
    return;
  }

  const pull1 = candidates[0];
  const pull2 = candidates[1];

  // Find 2 empty adjacent cells next to the tapped tile to pull them into
  const adjCells = [];
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dr, dc] of dirs) {
    const nr = row + dr, nc = col + dc;
    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !(nr === pull1.r && nc === pull1.c) && !(nr === pull2.r && nc === pull2.c)) {
      adjCells.push({ r: nr, c: nc });
    }
  }

  // Pick 2 adjacent spots (we'll overwrite whatever's there)
  const dest1 = adjCells[0] || { r: pull1.r, c: pull1.c };
  const dest2 = adjCells[1] || { r: pull2.r, c: pull2.c };

  // Animate: pull tiles toward the tapped tile
  const src1x = boardX + pull1.c * tileSize;
  const src1y = boardY + pull1.r * tileSize;
  const dst1x = boardX + dest1.c * tileSize;
  const dst1y = boardY + dest1.r * tileSize;
  const src2x = boardX + pull2.c * tileSize;
  const src2y = boardY + pull2.r * tileSize;
  const dst2x = boardX + dest2.c * tileSize;
  const dst2y = boardY + dest2.r * tileSize;

  // Store displaced tiles so we can put them back where the pulled tiles came from
  const displaced1Type = grid[dest1.r][dest1.c];
  const displaced1Sp = special[dest1.r][dest1.c];
  const displaced2Type = grid[dest2.r][dest2.c];
  const displaced2Sp = special[dest2.r][dest2.c];

  animations.push(new Animation(350, (t) => {
    const et = easeOut(t);
    // Pull tile 1 toward dest1
    setOverride(pull1.r, pull1.c, {
      x: src1x + (dst1x - src1x) * et,
      y: src1y + (dst1y - src1y) * et
    });
    // Pull tile 2 toward dest2
    setOverride(pull2.r, pull2.c, {
      x: src2x + (dst2x - src2x) * et,
      y: src2y + (dst2y - src2y) * et
    });
  }, () => {
    clearOverride(pull1.r, pull1.c);
    clearOverride(pull2.r, pull2.c);

    // Move displaced tiles to where pulled tiles came from
    grid[pull1.r][pull1.c] = displaced1Type;
    special[pull1.r][pull1.c] = displaced1Sp;
    grid[pull2.r][pull2.c] = displaced2Type;
    special[pull2.r][pull2.c] = displaced2Sp;

    // Place pulled tiles at destinations
    grid[dest1.r][dest1.c] = type;
    special[dest1.r][dest1.c] = 0;
    grid[dest2.r][dest2.c] = type;
    special[dest2.r][dest2.c] = 0;

    // Now we have 3 matching tiles: tapped + 2 pulled neighbors
    // Score and remove all 3
    const targets = [
      { row, col },
      { row: dest1.r, col: dest1.c },
      { row: dest2.r, col: dest2.c }
    ];

    const pts = 150;
    score += pts;
    scorePopups.push({
      x: boardX + col * tileSize + tileSize / 2,
      y: boardY + row * tileSize + tileSize / 2,
      text: 'Magnet +' + pts, alpha: 1, dy: 0,
    });

    triggerScreenShake(4);
    triggerFlash(0.2);

    for (const t of targets) {
      removingTiles.add(tileKey(t.row, t.col));
      spawnSparkles(boardX + t.col * tileSize + tileSize / 2, boardY + t.row * tileSize + tileSize / 2, '#ff69b4', 5);
    }

    animations.push(new Animation(MATCH_DUR, (t) => {
      const et = easeOut(t);
      for (const tgt of targets) {
        setOverride(tgt.row, tgt.col, { scale: 1 - et * 0.8, alpha: 1 - et });
      }
    }, () => {
      for (const t of targets) {
        grid[t.row][t.col] = -1;
        clearOverride(t.row, t.col);
        removingTiles.delete(tileKey(t.row, t.col));
      }
      damageAdjacentObstacles(targets);
      applyGravity();
    }));
  }));
}
