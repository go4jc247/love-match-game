// ── Input Handling ──
function canvasToGrid(cx, cy) {
  const col = Math.floor((cx - boardX) / tileSize);
  const row = Math.floor((cy - boardY) / tileSize);
  if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
    // Ignore voided cells
    if (!boardMask[row] || !boardMask[row][col]) return null;
    return { row, col };
  }
  return null;
}

function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX || e.touches[0].clientX) - rect.left;
  const y = (e.clientY || e.touches[0].clientY) - rect.top;
  return { x, y };
}

function handlePauseClick(cx, cy) {
  // Pause button area (top-right)
  const btnSize = tileSize * 0.7;
  const btnX = W - btnSize - 10;
  const btnY = 10;
  if (cx >= btnX && cx <= btnX + btnSize && cy >= btnY && cy <= btnY + btnSize) {
    paused = !paused;
    return true;
  }
  return false;
}

function handleRestartClick(cx, cy) {
  if (!gameOver) return false;
  // Match button position from drawGameOver()
  const isFinale = levelComplete && level === 20;
  const panelH = isFinale ? tileSize * 4.2 : tileSize * 3.5;
  const panelY = H / 2 - panelH / 2 - 10;
  // Reconstruct yOff to find button position
  let yOff = panelY + tileSize * 0.15;
  if (isFinale) { yOff += tileSize * 0.35 + tileSize * 0.4 + tileSize * 0.35; }
  else { yOff += tileSize * 0.32 + tileSize * 0.4; }
  yOff += tileSize * 0.55; // stars
  yOff += tileSize * 0.6; // score
  const btnW = 180, btnH = 46;
  const btnX = W / 2 - btnW / 2;
  const btnY = yOff;
  if (cx >= btnX && cx <= btnX + btnW && cy >= btnY && cy <= btnY + btnH) {
    restartGame();
    return true;
  }
  return false;
}

function restartGame() {
  // Only advance to next level if player completed it
  if (levelComplete) {
    level++;
    saveProgress();
  }
  // Otherwise retry same level
  setupLevel(level);
  initToolInventory();
  score = 0;
  const cfg = getLevelConfig(level);
  timeLeft = cfg.time;
  gameOver = false;
  paused = false;
  selected = null;
  locked = false;
  animations = [];
  tileOverrides = {};
  removingTiles.clear();
  scorePopups = [];
  cascadeLevel = 0;
  heartParticles = [];
  sparkleParticles = [];
  flyingTool = null;
  hintTimer = 0;
  hintCells = null;
  screenShake = { x: 0, y: 0, intensity: 0, decay: 0.88 };
  flashAlpha = 0;
  loveLetterPhase = 0;
  loveLetterTransformed = null;
  loveLetterExploded = null;
  levelComplete = false;
  levelCompleteToolQueue = [];
  levelCompleteDelay = 0;
  // Show tutorial for new level
  const levelCfg = getLevelConfig(level);
  if (levelCfg.intro) {
    showingTutorial = true;
    tutorialText = levelCfg.intro;
    paused = true;
  }
  // Wait for any new images, then init
  function waitAndInit() {
    if (imagesLoaded >= totalImages) {
      initGrid();
    } else {
      setTimeout(waitAndInit, 50);
    }
  }
  waitAndInit();
}

function handleToolbarClick(cx, cy) {
  // Check page arrows
  if (getUnlockedTools().length > TOOLBAR_SLOTS) {
    const arrowSize = toolSlotSize * 0.3;
    const arrowY = toolbarY + toolbarH / 2;
    const maxPage = Math.ceil(getUnlockedTools().length / TOOLBAR_SLOTS) - 1;

    // Left arrow
    if (cx < 14 + arrowSize + 10 && cy > toolbarY && cy < toolbarY + toolbarH && toolbarPage > 0) {
      toolbarPage--;
      activeTool = null;
      return true;
    }
    // Right arrow
    if (cx > W - 14 - arrowSize - 10 && cy > toolbarY && cy < toolbarY + toolbarH && toolbarPage < maxPage) {
      toolbarPage++;
      activeTool = null;
      return true;
    }
  }

  // Check tool slots
  const slots = getToolbarSlots();
  for (let i = 0; i < slots.length; i++) {
    const r = getToolSlotRect(i);
    if (cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) {
      const tool = slots[i];
      const count = toolInventory[tool.tool] || 0;
      if (count <= 0) return true; // no stock, ignore

      if (tool.tool === 11) {
        // Love Letter: activate immediately (no board target needed)
        toolInventory[11] = (toolInventory[11] || 0) - 1;
        activeTool = null;
        activateLoveLetter();
      } else if (tool.tool === 5) {
        // Stopwatch: activate immediately — adds time
        toolInventory[5] = (toolInventory[5] || 0) - 1;
        activeTool = null;
        useStopwatch();
      } else if (activeTool !== null && activeTool !== tool.tool) {
        // Two different tools selected — check for combo
        const combo = getCombo(activeTool, tool.tool);
        if (combo) {
          toolInventory[activeTool]--;
          toolInventory[tool.tool]--;
          activeTool = null;
          combo();
        } else {
          activeTool = tool.tool; // no combo, just switch selection
        }
      } else if (activeTool === tool.tool) {
        // Same tool tapped twice — check for same-tool combo
        if ((tool.tool === 1 || tool.tool === 2 || tool.tool === 3) && count >= 2) {
          const combo = getCombo(tool.tool, tool.tool);
          if (combo) {
            toolInventory[tool.tool] -= 2;
            activeTool = null;
            combo();
          } else {
            activeTool = null;
          }
        } else {
          activeTool = null; // deselect
        }
      } else {
        activeTool = tool.tool; // select
      }
      return true;
    }
  }
  return false;
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  const pos = getCanvasPos(e);

  // Reset hint on any interaction
  hintTimer = 0;
  hintCells = null;

  // Spouse panel intercepts all clicks when open
  if (showSpousePanel) { handleSpousePanelClick(pos.x, pos.y); return; }

  // Check spouse button click (bottom-right of HUD area)
  const sbSize = tileSize * 0.4;
  const sbX = W - sbSize - 12, sbY = hudH - sbSize - tileSize * 0.4;
  if (pos.x >= sbX && pos.x <= sbX + sbSize && pos.y >= sbY && pos.y <= sbY + sbSize) {
    toggleSpousePanel();
    return;
  }

  // Always check toolbar
  if (handleToolbarClick(pos.x, pos.y)) return;

  if (locked || paused || gameOver) {
    if (gameOver) handleRestartClick(pos.x, pos.y);
    else if (showingTutorial) {
      // Dismiss tutorial and start the level
      showingTutorial = false;
      paused = false;
    }
    else handlePauseClick(pos.x, pos.y);
    return;
  }
  if (handlePauseClick(pos.x, pos.y)) return;

  const cell = canvasToGrid(pos.x, pos.y);
  if (!cell) return;
  pointerDown = { x: pos.x, y: pos.y, row: cell.row, col: cell.col };
});

canvas.addEventListener('pointermove', (e) => {
  e.preventDefault();
  if (!pointerDown || locked) return;
  const pos = getCanvasPos(e);
  const dx = pos.x - pointerDown.x;
  const dy = pos.y - pointerDown.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist > tileSize * 0.3) {
    // Swipe detected
    let dr = 0, dc = 0;
    if (Math.abs(dx) > Math.abs(dy)) {
      dc = dx > 0 ? 1 : -1;
    } else {
      dr = dy > 0 ? 1 : -1;
    }
    const tr = pointerDown.row + dr;
    const tc = pointerDown.col + dc;
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS &&
        boardMask[tr] && boardMask[tr][tc]) {
      doSwap(pointerDown.row, pointerDown.col, tr, tc);
    }
    pointerDown = null;
    selected = null;
  }
});

canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  if (!pointerDown || locked) { pointerDown = null; return; }

  const pos = getCanvasPos(e);
  const dx = pos.x - pointerDown.x;
  const dy = pos.y - pointerDown.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < tileSize * 0.3) {
    // Tap
    const cell = canvasToGrid(pos.x, pos.y);
    if (!cell) { pointerDown = null; return; }

    // If a tool is active, fly it to target then activate
    if (activeTool !== null) {
      const toolNum = activeTool;
      activeTool = null;
      locked = true;
      animateToolFlyTo(toolNum, cell.row, cell.col, () => {
        useTool(toolNum, cell.row, cell.col);
      });
      pointerDown = null;
      return;
    }

    if (selected) {
      if (selected.row === cell.row && selected.col === cell.col) {
        selected = null; // Deselect
      } else if (isAdjacent(selected.row, selected.col, cell.row, cell.col)) {
        doSwap(selected.row, selected.col, cell.row, cell.col);
      } else {
        selected = cell; // Select new tile
      }
    } else {
      selected = cell;
    }
  }

  pointerDown = null;
});

canvas.addEventListener('pointercancel', () => { pointerDown = null; });

// ── Rendering ──
function drawRoundedRect(x, y, w, h, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + w - radius, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
  ctx.lineTo(x + w, y + h - radius);
  ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
  ctx.lineTo(x + radius, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

function drawTile(row, col, type, overrides) {
  if (type < 0) return;
  const info = TILE_TYPES[type];
  const pad = 2;
  const radius = tileSize * 0.15;

  let x = boardX + col * tileSize + pad;
  let y = boardY + row * tileSize + pad;
  let w = tileSize - pad * 2;
  let h = tileSize - pad * 2;
  let alpha = 1;
  let scale = 1;

  if (overrides) {
    if (overrides.x !== undefined) x = overrides.x + pad;
    if (overrides.y !== undefined) y = overrides.y + pad;
    if (overrides.alpha !== undefined) alpha = overrides.alpha;
    if (overrides.scale !== undefined) scale = overrides.scale;
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  if (scale !== 1) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
  }

  // Icon image (no background - just the gem)
  const cachedImg = imageCache[info.file];
  if (cachedImg) {
    const imgPad = w * 0.05;
    ctx.drawImage(cachedImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
  } else {
    // Fallback: draw first letter
    ctx.fillStyle = '#c2185b';
    ctx.font = 'bold ' + (w * 0.4) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(info.name[0], x + w / 2, y + h / 2);
  }

  ctx.restore();
}

function drawSpecialTile(row, col, type, overrides) {
  const sp = special[row] && special[row][col];
  if (!sp || sp <= 0) return;
  const toolDef = TOOLS.find(t => t.tool === sp);
  if (!toolDef) return;

  const pad = 2;
  let x = boardX + col * tileSize + pad;
  let y = boardY + row * tileSize + pad;
  let w = tileSize - pad * 2;
  let h = tileSize - pad * 2;
  let alpha = 1;
  let scale = 1;

  if (overrides) {
    if (overrides.x !== undefined) x = overrides.x + pad;
    if (overrides.y !== undefined) y = overrides.y + pad;
    if (overrides.alpha !== undefined) alpha = overrides.alpha;
    if (overrides.scale !== undefined) scale = overrides.scale;
  }

  ctx.save();
  ctx.globalAlpha = alpha;

  if (scale !== 1) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    ctx.translate(cx, cy);
    ctx.scale(scale, scale);
    ctx.translate(-cx, -cy);
  }

  // Subtle pulsing white back-glow (no solid background)
  const pulse = 0.3 + 0.15 * Math.sin(performance.now() / 400);
  ctx.shadowColor = 'rgba(255, 255, 255, ' + pulse + ')';
  ctx.shadowBlur = 8 + 4 * Math.sin(performance.now() / 400);
  ctx.beginPath();
  ctx.arc(x + w / 2, y + h / 2, w * 0.35, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255, 255, 255, ' + (pulse * 0.5) + ')';
  ctx.fill();
  ctx.shadowBlur = 0;

  // Tool icon — full size, floating on top of glow
  const toolImg = imageCache[toolDef.file];
  if (toolImg) {
    const imgPad = w * 0.05;
    ctx.drawImage(toolImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
  }

  ctx.restore();
}

function drawObstacle(row, col, obs) {
  const x = boardX + col * tileSize + 2;
  const y = boardY + row * tileSize + 2;
  const w = tileSize - 4;
  const h = tileSize - 4;
  const radius = tileSize * 0.15;
  const damage = 1 - obs.hp / obs.maxHp; // 0 = full hp, 1 = almost dead

  ctx.save();

  if (obs.type === 'lockedHeart') {
    // Golden lock overlay — gets cracked as HP drops
    ctx.globalAlpha = 0.6 - damage * 0.2;
    drawRoundedRect(x, y, w, h, radius);
    ctx.fillStyle = `rgba(255, 215, 0, ${0.4 - damage * 0.2})`;
    ctx.fill();
    // Chain pattern
    ctx.strokeStyle = `rgba(184, 134, 11, ${0.7 - damage * 0.3})`;
    ctx.lineWidth = 2.5 - damage;
    // Horizontal chain
    ctx.beginPath();
    ctx.moveTo(x + 4, y + h / 2);
    ctx.lineTo(x + w - 4, y + h / 2);
    ctx.stroke();
    // Vertical chain
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y + 4);
    ctx.lineTo(x + w / 2, y + h - 4);
    ctx.stroke();
    // Lock icon
    ctx.fillStyle = '#b8860b';
    ctx.font = 'bold ' + (w * 0.35) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(damage > 0.4 ? '\uD83D\uDD13' : '\uD83D\uDD12', x + w / 2, y + h / 2);
    // Cracks
    if (damage > 0) {
      ctx.strokeStyle = 'rgba(100,50,0,0.5)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x + w * 0.3, y + h * 0.2);
      ctx.lineTo(x + w * 0.5, y + h * 0.5);
      ctx.lineTo(x + w * 0.7, y + h * 0.3);
      ctx.stroke();
    }
  } else if (obs.type === 'roseVine') {
    // Green vines wrapping the tile — thin out with damage
    const alpha = 0.6 - damage * 0.25;
    ctx.globalAlpha = alpha;
    const vineColor = damage > 0.5 ? '#8b4513' : '#228b22';
    ctx.strokeStyle = vineColor;
    ctx.lineWidth = 3 - damage * 2;
    // Vine tendrils
    const vines = Math.max(1, Math.floor((1 - damage) * 4));
    for (let v = 0; v < vines; v++) {
      ctx.beginPath();
      const startX = x + (v % 2 === 0 ? 0 : w);
      const startY = y + (v / vines) * h;
      ctx.moveTo(startX, startY);
      ctx.quadraticCurveTo(x + w / 2, y + h * (0.3 + v * 0.15), x + (v % 2 === 0 ? w : 0), y + h * 0.8);
      ctx.stroke();
    }
    // Thorns
    ctx.fillStyle = vineColor;
    ctx.globalAlpha = alpha * 0.8;
    for (let i = 0; i < 3 - Math.floor(damage * 2); i++) {
      const tx = x + w * (0.2 + i * 0.3);
      const ty = y + h * (0.3 + (i % 2) * 0.4);
      ctx.beginPath();
      ctx.arc(tx, ty, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (obs.type === 'yarnTangle') {
    // Pink yarn strands — single hit
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#ff69b4';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 4);
    ctx.bezierCurveTo(x + w * 0.7, y + h * 0.2, x + w * 0.3, y + h * 0.8, x + w - 4, y + h - 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w - 4, y + 4);
    ctx.bezierCurveTo(x + w * 0.3, y + h * 0.3, x + w * 0.7, y + h * 0.7, x + 4, y + h - 4);
    ctx.stroke();
  }

  ctx.restore();
}

function drawPinkHeart(row, col) {
  const pad = 2;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;
  const heartImg = imageCache[PINK_HEART_FILE];
  if (heartImg) {
    const imgPad = w * 0.05;
    // Subtle pulsing glow
    ctx.save();
    ctx.shadowColor = '#ff4081';
    ctx.shadowBlur = 8;
    ctx.drawImage(heartImg, x + imgPad, y + imgPad, w - imgPad * 2, h - imgPad * 2);
    ctx.restore();
  } else {
    ctx.fillStyle = '#ff4081';
    ctx.font = 'bold ' + (w * 0.6) + 'px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2764', x + w / 2, y + h / 2);
  }
}

function drawSelectedHighlight(row, col, time) {
  const pad = 1;
  const x = boardX + col * tileSize + pad;
  const y = boardY + row * tileSize + pad;
  const w = tileSize - pad * 2;
  const h = tileSize - pad * 2;
  const radius = tileSize * 0.15;

  const pulse = 0.5 + 0.5 * Math.sin(time * 5);
  ctx.save();
  ctx.strokeStyle = `rgba(255, 255, 255, ${0.6 + pulse * 0.4})`;
  ctx.lineWidth = 3 + pulse;
  drawRoundedRect(x, y, w, h, radius);
  ctx.stroke();
  ctx.restore();
}

function drawBoard() {
  // Board shadow/border
  const bx = boardX - 4;
  const by = boardY - 4;
  const bw = tileSize * COLS + 8;
  const bh = tileSize * ROWS + 8;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.12)';
  ctx.shadowBlur = 15;
  ctx.shadowOffsetY = 4;
  drawRoundedRect(bx, by, bw, bh, 12);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fill();
  ctx.restore();

  // Draw individual cell backgrounds
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = boardX + c * tileSize;
      const y = boardY + r * tileSize;
      if (boardMask[r] && boardMask[r][c]) {
        // Active cell - subtle checkerboard
        const shade = (r + c) % 2 === 0 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.15)';
        ctx.fillStyle = shade;
        ctx.fillRect(x, y, tileSize, tileSize);
      } else {
        // Voided cell - darker, no tile here
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(x, y, tileSize, tileSize);
      }
    }
  }
}

function drawHUD() {
  const cx = W / 2;

  // Level
  ctx.save();
  ctx.fillStyle = '#c2185b';
  ctx.font = 'bold ' + (tileSize * 0.32) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Level ' + level, cx, 8);

  // Score with target
  const lvlCfg = getLevelConfig(level);
  ctx.font = 'bold ' + (tileSize * 0.45) + 'px sans-serif';
  ctx.fillStyle = score >= lvlCfg.target ? '#4caf50' : '#880e4f';
  ctx.fillText(score.toLocaleString() + ' / ' + lvlCfg.target.toLocaleString(), cx, 8 + tileSize * 0.35);

  // Timer
  const mins = Math.floor(Math.max(0, timeLeft) / 60);
  const secs = Math.floor(Math.max(0, timeLeft) % 60);
  const timerStr = mins + ':' + (secs < 10 ? '0' : '') + secs;
  ctx.font = 'bold ' + (tileSize * 0.3) + 'px sans-serif';
  // Flash red when low time
  if (timeLeft <= 10 && !gameOver) {
    const flash = Math.sin(performance.now() / 200) > 0;
    ctx.fillStyle = flash ? '#ff1744' : '#ad1457';
  } else {
    ctx.fillStyle = '#ad1457';
  }
  ctx.textAlign = 'left';
  ctx.fillText('⏱ ' + timerStr, 12, 15);

  // Pause button
  const btnSize = tileSize * 0.55;
  const btnX = W - btnSize - 12;
  const btnY = 12;

  drawRoundedRect(btnX, btnY, btnSize, btnSize, 6);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
  ctx.strokeStyle = '#c2185b';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Pause icon (two bars)
  ctx.fillStyle = '#c2185b';
  if (paused) {
    // Play triangle
    ctx.beginPath();
    ctx.moveTo(btnX + btnSize * 0.35, btnY + btnSize * 0.2);
    ctx.lineTo(btnX + btnSize * 0.8, btnY + btnSize * 0.5);
    ctx.lineTo(btnX + btnSize * 0.35, btnY + btnSize * 0.8);
    ctx.closePath();
    ctx.fill();
  } else {
    const barW = btnSize * 0.18;
    ctx.fillRect(btnX + btnSize * 0.28, btnY + btnSize * 0.22, barW, btnSize * 0.56);
    ctx.fillRect(btnX + btnSize * 0.54, btnY + btnSize * 0.22, barW, btnSize * 0.56);
  }

  // Star progress bar
  const barY = hudH - tileSize * 0.3;
  const barH = tileSize * 0.16;
  const barW = W - 24;
  const barX = 12;

  // Bar background
  drawRoundedRect(barX, barY, barW, barH, barH / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fill();

  // Bar fill — based on level target (3 stars = 2x target)
  const lvlTarget = getLevelConfig(level).target;
  const maxScore = lvlTarget * 2; // 3 stars at 2x target
  const starThresholds = [lvlTarget * 0.5, lvlTarget, lvlTarget * 2]; // 1, 2, 3 stars
  const fillW = Math.min(score / maxScore, 1) * barW;
  if (fillW > 0) {
    ctx.save();
    ctx.beginPath();
    drawRoundedRect(barX, barY, barW, barH, barH / 2);
    ctx.clip();
    const barGrad = ctx.createLinearGradient(barX, barY, barX + fillW, barY);
    barGrad.addColorStop(0, '#ff6b8a');
    barGrad.addColorStop(1, score >= lvlTarget ? '#4caf50' : '#ff4081');
    ctx.fillStyle = barGrad;
    ctx.fillRect(barX, barY, fillW, barH);
    ctx.restore();
  }

  // Star markers at 50%, 100%, 200% of target
  const starChar = '\u2605';
  ctx.font = (tileSize * 0.25) + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 3; i++) {
    const sx = barX + (starThresholds[i] / maxScore) * barW;
    ctx.fillStyle = score >= starThresholds[i] ? '#ffd700' : 'rgba(255,255,255,0.6)';
    ctx.fillText(starChar, sx, barY + barH / 2);
  }

  ctx.restore();
}

function drawScorePopups(dt) {
  ctx.save();
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const p = scorePopups[i];
    p.dy -= dt * 60;
    p.alpha -= dt * 1.5;
    if (p.alpha <= 0) {
      scorePopups.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#c2185b';
    ctx.lineWidth = 2;
    ctx.font = 'bold ' + (tileSize * 0.35) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeText(p.text, p.x, p.y + p.dy);
    ctx.fillText(p.text, p.x, p.y + p.dy);
  }
  ctx.restore();
}

function drawGameOver() {
  // Overlay
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, W, H);

  // Determine if this is a level 20 victory (special celebration)
  const isFinale = levelComplete && level === 20;

  // Panel
  const panelW = W * 0.8;
  const panelH = isFinale ? tileSize * 4.2 : tileSize * 3.5;
  const panelX = (W - panelW) / 2;
  const panelY = H / 2 - panelH / 2 - 10;

  drawRoundedRect(panelX, panelY, panelW, panelH, 16);
  ctx.fillStyle = '#fff';
  ctx.fill();

  let yOff = panelY + tileSize * 0.15;

  // Title text
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (isFinale) {
    ctx.fillStyle = '#e91e63';
    ctx.font = 'bold ' + (tileSize * 0.42) + 'px sans-serif';
    yOff += tileSize * 0.35;
    ctx.fillText('Congratulations!', W / 2, yOff);
    ctx.fillStyle = '#880e4f';
    ctx.font = (tileSize * 0.24) + 'px sans-serif';
    yOff += tileSize * 0.4;
    ctx.fillText('You completed all 20 levels!', W / 2, yOff);
    yOff += tileSize * 0.35;
  } else if (levelComplete) {
    ctx.fillStyle = '#4caf50';
    ctx.font = 'bold ' + (tileSize * 0.36) + 'px sans-serif';
    yOff += tileSize * 0.32;
    ctx.fillText('Level Complete!', W / 2, yOff);
    yOff += tileSize * 0.4;
  } else {
    ctx.fillStyle = '#880e4f';
    ctx.font = 'bold ' + (tileSize * 0.36) + 'px sans-serif';
    yOff += tileSize * 0.32;
    ctx.fillText('Time\'s Up!', W / 2, yOff);
    yOff += tileSize * 0.4;
  }

  // Stars based on level target
  const cfg = getLevelConfig(level);
  const t = cfg.target;
  const stars = score >= t * 2 ? 3 : score >= t ? 2 : score >= t * 0.5 ? 1 : 0;
  ctx.font = (tileSize * 0.6) + 'px serif';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < stars ? '#ffd700' : '#ddd';
    ctx.fillText('\u2605', panelX + panelW * (0.3 + i * 0.2), yOff);
  }
  yOff += tileSize * 0.55;

  // Score
  ctx.fillStyle = '#880e4f';
  ctx.font = 'bold ' + (tileSize * 0.4) + 'px sans-serif';
  ctx.fillText('Score: ' + score.toLocaleString(), W / 2, yOff);
  yOff += tileSize * 0.6;

  // Restart button
  const btnW = 180, btnH = 46;
  const btnX = W / 2 - btnW / 2;
  const btnY = yOff;

  drawRoundedRect(btnX, btnY, btnW, btnH, 23);
  const btnGrad = ctx.createLinearGradient(btnX, btnY, btnX, btnY + btnH);
  btnGrad.addColorStop(0, '#ff6b8a');
  btnGrad.addColorStop(1, '#e91e63');
  ctx.fillStyle = btnGrad;
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + (tileSize * 0.3) + 'px sans-serif';
  const btnLabel = isFinale ? 'Keep Playing!' : (levelComplete ? 'Next Level' : 'Try Again');
  ctx.fillText(btnLabel, W / 2, btnY + btnH / 2);

  ctx.restore();
}

function drawPauseOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);

  if (showingTutorial) {
    // Tutorial overlay — level intro card
    const panelW = W * 0.85;
    const panelH = tileSize * 3.5;
    const panelX = (W - panelW) / 2;
    const panelY = H / 2 - panelH / 2;

    drawRoundedRect(panelX, panelY, panelW, panelH, 16);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Level number
    ctx.fillStyle = '#c2185b';
    ctx.font = 'bold ' + (tileSize * 0.5) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Level ' + level, W / 2, panelY + tileSize * 0.7);

    // Intro text (word wrap)
    ctx.fillStyle = '#555';
    ctx.font = (tileSize * 0.28) + 'px sans-serif';
    const maxTextW = panelW - 30;
    const words = tutorialText.split(' ');
    let lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxTextW) {
        lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine);
    const lineH = tileSize * 0.35;
    const textStartY = panelY + tileSize * 1.3;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], W / 2, textStartY + i * lineH);
    }

    // Tap to start
    const pulse = 0.5 + 0.3 * Math.sin(performance.now() / 500);
    ctx.fillStyle = `rgba(233, 30, 99, ${pulse})`;
    ctx.font = (tileSize * 0.24) + 'px sans-serif';
    ctx.fillText('Tap to start!', W / 2, panelY + panelH - tileSize * 0.5);
  } else {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold ' + (tileSize * 0.6) + 'px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Paused', W / 2, H / 2);
  }
  ctx.restore();
}

// ── Main Loop ──
let lastTime = 0;

function frame(now) {
  requestAnimationFrame(frame);

  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.1) : 0.016;
  lastTime = now;

  if (paused) {
    // Still draw but don't update
    render(now / 1000, dt);
    if (!showSpousePanel) drawPauseOverlay();
    drawSpousePanel();
    return;
  }

  // Countdown timer (stop counting during level complete)
  if (!gameOver && !locked && !levelComplete && timeLeft > 0) {
    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      gameOver = true;
      sfxGameOver();
    }
  }

  // Hint timer — show hint after inactivity
  if (!gameOver && !locked && !levelComplete && !paused) {
    hintTimer += dt;
    if (hintTimer >= HINT_DELAY && !hintCells) {
      hintCells = findHintMove();
    }
  }

  // Level complete — activate board tools one by one
  if (levelComplete && !locked && levelCompleteToolQueue.length > 0) {
    levelCompleteDelay -= dt;
    if (levelCompleteDelay <= 0) {
      const next = levelCompleteToolQueue.shift();
      // Activate this tool on the board
      if (special[next.row] && special[next.row][next.col] > 0) {
        const toolNum = special[next.row][next.col];
        special[next.row][next.col] = 0;
        activateSpecialOnBoard(toolNum, next.row, next.col);
      }
      levelCompleteDelay = 0.6; // delay between each activation
    }
  } else if (levelComplete && !locked && levelCompleteToolQueue.length === 0) {
    // All tools activated, show game over after brief delay
    levelCompleteDelay -= dt;
    if (levelCompleteDelay <= 0) {
      gameOver = true;
    }
  }

  // Update Love Letter animation
  if (loveLetterPhase > 0) {
    loveLetterTimer += dt;
    const TRANSFORM_DURATION = 1.2; // total time for all tiles to become hearts
    const HOLD_DURATION = 0.3;      // brief pause with all hearts showing
    const EXPLODE_STAGGER = 0.6;    // stagger explosions

    if (loveLetterPhase === 1) {
      // Phase 1: Transform tiles to pink hearts from center out
      const progress = Math.min(loveLetterTimer / TRANSFORM_DURATION, 1);
      const transformedCount = Math.floor(progress * loveLetterTransformOrder.length);

      // Mark tiles as transformed (store in a set for rendering)
      if (!loveLetterTransformed) loveLetterTransformed = new Set();
      for (let i = 0; i < transformedCount; i++) {
        const cell = loveLetterTransformOrder[i];
        loveLetterTransformed.add(cell.r + ',' + cell.c);
      }

      if (progress >= 1) {
        loveLetterPhase = 2;
        loveLetterTimer = 0;
      }
    } else if (loveLetterPhase === 2) {
      // Phase 2: Hold briefly then explode all tiles into heart particles
      if (loveLetterTimer >= HOLD_DURATION) {
        const explodeProgress = (loveLetterTimer - HOLD_DURATION) / EXPLODE_STAGGER;

        if (!loveLetterExploded) loveLetterExploded = new Set();

        const explodedCount = Math.floor(Math.min(explodeProgress, 1) * loveLetterTransformOrder.length);
        for (let i = 0; i < explodedCount; i++) {
          const cell = loveLetterTransformOrder[i];
          const key = cell.r + ',' + cell.c;
          if (!loveLetterExploded.has(key)) {
            loveLetterExploded.add(key);
            // Spawn heart particles at this cell
            const px = boardX + cell.c * tileSize + tileSize / 2;
            const py = boardY + cell.r * tileSize + tileSize / 2;
            spawnHeartBurst(px, py, 4);
          }
        }

        if (explodeProgress >= 1 && loveLetterTimer >= HOLD_DURATION + EXPLODE_STAGGER + 0.3) {
          // All done — clear the board, add score, refill
          const totalCells = ROWS * COLS;
          score += totalCells * 30;
          scorePopups.push({
            x: W / 2, y: H / 2,
            text: '+' + (totalCells * 30),
            alpha: 1, dy: 0,
          });

          // Reset grid and fill with new tiles
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = -1;
            }
          }
          loveLetterPhase = 0;
          loveLetterTransformed = null;
          loveLetterExploded = null;
          // Clear all obstacles (Love Letter destroys everything!)
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              obstacles[r][c] = null;
              special[r][c] = 0;
            }
          }
          // Refill from top (gravity animation)
          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = randomType();
            }
          }
          // Animate tiles falling in from top
          for (let c = 0; c < COLS; c++) {
            for (let r = 0; r < ROWS; r++) {
              const fromY = boardY + (r - ROWS) * tileSize;
              const toY = boardY + r * tileSize;
              setOverride(r, c, { y: fromY, targetY: toY });
            }
          }
          animations.push(new Animation(FALL_DUR * 2, (t) => {
            const et = easeOutBounce(t);
            for (let c = 0; c < COLS; c++) {
              for (let r = 0; r < ROWS; r++) {
                const fromY = boardY + (r - ROWS) * tileSize;
                const toY = boardY + r * tileSize;
                setOverride(r, c, { y: fromY + (toY - fromY) * et });
              }
            }
          }, () => {
            for (let r = 0; r < ROWS; r++) {
              for (let c = 0; c < COLS; c++) {
                clearOverride(r, c);
              }
            }
            // Check for any accidental matches
            processMatches();
          }));
        }
      }
    }
  }

  // Update animations
  for (let i = animations.length - 1; i >= 0; i--) {
    animations[i].tick(dt * 1000);
    if (animations[i].done) {
      animations.splice(i, 1);
    }
  }

  render(now / 1000, dt);

  if (gameOver) drawGameOver();
  drawSpousePanel();
}

function getUnlockedTools() {
  return TOOLS.filter(t => {
    const unlockLvl = TOOL_UNLOCK_LEVEL[t.tool] || 1;
    return level >= unlockLvl;
  });
}

function getToolbarSlots() {
  const unlocked = getUnlockedTools();
  const start = toolbarPage * TOOLBAR_SLOTS;
  return unlocked.slice(start, start + TOOLBAR_SLOTS);
}

function getToolSlotRect(index) {
  const slots = getToolbarSlots();
  const totalW = slots.length * toolSlotSize + (slots.length - 1) * 6;
  const startX = (W - totalW) / 2;
  return {
    x: startX + index * (toolSlotSize + 6),
    y: toolbarY + (toolbarH - toolSlotSize) / 2,
    w: toolSlotSize,
    h: toolSlotSize
  };
}

function drawToolbar() {
  // Background bar
  drawRoundedRect(6, toolbarY, W - 12, toolbarH, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fill();

  const slots = getToolbarSlots();
  for (let i = 0; i < slots.length; i++) {
    const tool = slots[i];
    const r = getToolSlotRect(i);
    const count = toolInventory[tool.tool] || 0;
    const isActive = activeTool === tool.tool;

    // Slot background
    drawRoundedRect(r.x, r.y, r.w, r.h, 8);
    if (isActive) {
      ctx.fillStyle = 'rgba(255, 152, 0, 0.5)';
      ctx.fill();
      ctx.strokeStyle = '#ff9800';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    } else if (count > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fill();
    }

    // Tool icon
    const img = imageCache[tool.file];
    if (img) {
      ctx.save();
      if (count === 0) ctx.globalAlpha = 0.35;
      const iconPad = r.w * 0.12;
      ctx.drawImage(img, r.x + iconPad, r.y + iconPad, r.w - iconPad * 2, r.h - iconPad * 2);
      ctx.restore();
    }

    // Count badge
    if (count > 0) {
      const badgeR = toolSlotSize * 0.18;
      const bx = r.x + r.w - badgeR - 1;
      const by = r.y + r.h - badgeR - 1;
      ctx.beginPath();
      ctx.arc(bx, by, badgeR, 0, Math.PI * 2);
      ctx.fillStyle = '#e91e63';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + (badgeR * 1.2) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(count, bx, by);
    }

    // "NEW" badge for freshly unlocked tool (pulsing glow)
    if (tool.tool === newlyUnlockedTool && count > 0) {
      const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 300);
      ctx.save();
      ctx.globalAlpha = pulse;
      const newBadgeW = r.w * 0.55;
      const newBadgeH = r.h * 0.22;
      const nbx = r.x + (r.w - newBadgeW) / 2;
      const nby = r.y - newBadgeH * 0.4;
      drawRoundedRect(nbx, nby, newBadgeW, newBadgeH, newBadgeH / 2);
      ctx.fillStyle = '#ff9800';
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + (newBadgeH * 0.7) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('NEW', nbx + newBadgeW / 2, nby + newBadgeH / 2);
      ctx.restore();
    }
  }

  // Page arrows if more than 5 tools
  if (getUnlockedTools().length > TOOLBAR_SLOTS) {
    const arrowSize = toolSlotSize * 0.3;
    const arrowY = toolbarY + toolbarH / 2;

    // Left arrow
    ctx.fillStyle = toolbarPage > 0 ? '#c2185b' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(14, arrowY);
    ctx.lineTo(14 + arrowSize, arrowY - arrowSize * 0.6);
    ctx.lineTo(14 + arrowSize, arrowY + arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();

    // Right arrow
    const maxPage = Math.ceil(getUnlockedTools().length / TOOLBAR_SLOTS) - 1;
    ctx.fillStyle = toolbarPage < maxPage ? '#c2185b' : 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(W - 14, arrowY);
    ctx.lineTo(W - 14 - arrowSize, arrowY - arrowSize * 0.6);
    ctx.lineTo(W - 14 - arrowSize, arrowY + arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function render(time, dt) {
  // Update screen shake
  if (screenShake.intensity > 0.3) {
    screenShake.x = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.y = (Math.random() - 0.5) * screenShake.intensity * 2;
    screenShake.intensity *= screenShake.decay;
  } else {
    screenShake.x = 0; screenShake.y = 0; screenShake.intensity = 0;
  }

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#ffe0ec');
  bgGrad.addColorStop(0.5, '#ffc2d4');
  bgGrad.addColorStop(1, '#ffb3c6');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Apply screen shake to board area
  ctx.save();
  ctx.translate(screenShake.x, screenShake.y);

  // HUD
  drawHUD();

  // Board
  drawBoard();

  // Tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = tileKey(r, c);
      // Love Letter: hide exploded tiles
      if (loveLetterExploded && loveLetterExploded.has(key)) continue;

      if (removingTiles.has(key)) {
        const ov = getOverride(r, c);
        drawTile(r, c, grid[r][c], ov);
        continue;
      }
      if (grid[r][c] < 0) continue;

      // Love Letter: draw pink heart instead of normal gem
      if (loveLetterTransformed && loveLetterTransformed.has(key)) {
        drawPinkHeart(r, c);
        continue;
      }

      const ov = getOverride(r, c);

      // Special tile: draw tool as main icon with glowing bg
      if (special[r] && special[r][c] > 0) {
        drawSpecialTile(r, c, grid[r][c], ov);
        continue;
      }

      drawTile(r, c, grid[r][c], ov);
    }
  }

  // Selected highlight
  if (selected && !locked) {
    drawSelectedHighlight(selected.row, selected.col, time);
  }

  // Hint highlight — gentle pulsing glow on hinted cells
  if (hintCells && !locked && !selected) {
    const pulse = 0.3 + 0.3 * Math.sin(time * 4);
    ctx.save();
    for (const cell of hintCells) {
      const hx = boardX + cell.col * tileSize + 2;
      const hy = boardY + cell.row * tileSize + 2;
      const hw = tileSize - 4;
      const hh = tileSize - 4;
      ctx.strokeStyle = `rgba(255, 215, 0, ${pulse})`;
      ctx.lineWidth = 3;
      drawRoundedRect(hx, hy, hw, hh, tileSize * 0.15);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Draw obstacles on top of tiles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const obs = obstacles[r] && obstacles[r][c];
      if (obs) drawObstacle(r, c, obs);
    }
  }

  // Flash overlay on board
  if (flashAlpha > 0.01) {
    ctx.save();
    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
    ctx.fillRect(boardX - 4, boardY - 4, tileSize * COLS + 8, tileSize * ROWS + 8);
    ctx.restore();
    flashAlpha *= 0.82;
  }

  // Score popups
  drawScorePopups(dt);

  // Sparkle particles
  updateAndDrawSparkles(dt);

  // Heart particles (Love Letter effect)
  updateAndDrawHeartParticles(dt);

  // Flying tool animation
  if (flyingTool) {
    const img = imageCache[flyingTool.file];
    if (img) {
      ctx.save();
      ctx.globalAlpha = flyingTool.alpha;
      const s = tileSize * flyingTool.scale;
      ctx.drawImage(img, flyingTool.x - s / 2, flyingTool.y - s / 2, s, s);
      ctx.restore();
    }
  }

  // End screen shake transform
  ctx.restore();

  // Toolbar (drawn outside shake so it stays stable)
  drawToolbar();
}

// ── Splash Screen ──
let splashDismissed = false;

function initSplash() {
  const splash = document.getElementById('splash');
  if (!splash) return;

  // Show current level
  const lvlBadge = document.getElementById('splash-level');
  if (lvlBadge) {
    lvlBadge.textContent = level === 1 ? 'New Game' : 'Level ' + level;
  }

  // Spawn floating hearts
  const hearts = ['💖', '💕', '🐱', '💗', '✨', '🌸', '💝', '🎀', '💘'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'splash-heart';
    el.textContent = hearts[i % hearts.length];
    el.style.left = (Math.random() * 100) + '%';
    el.style.fontSize = (14 + Math.random() * 20) + 'px';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = (Math.random() * 6) + 's';
    splash.appendChild(el);
  }

  // Spawn sparkle dots
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'splash-sparkle';
    el.style.left = (Math.random() * 100) + '%';
    el.style.top = (Math.random() * 100) + '%';
    el.style.width = el.style.height = (2 + Math.random() * 4) + 'px';
    el.style.animationDelay = (Math.random() * 3) + 's';
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    splash.appendChild(el);
  }

  // Dismiss on tap/click
  function dismissSplash() {
    if (splashDismissed) return;
    splashDismissed = true;
    splash.classList.add('hide');
    // Initialize audio context on user gesture
    getAudio();
    sfxSwap();
    setTimeout(() => {
      splash.remove();
    }, 900);
  }
  splash.addEventListener('pointerdown', dismissSplash);
  splash.addEventListener('click', dismissSplash);
}

// ── Init ──
function init() {
  setupLevel(level);
  resize();
  // Set initial time from level config
  const cfg = getLevelConfig(level);
  timeLeft = cfg.time;
  // Show tutorial for level 1
  if (cfg.intro) {
    showingTutorial = true;
    tutorialText = cfg.intro;
    paused = true;
  }
  // Wait for images to load before starting
  function waitForImages() {
    if (imagesLoaded >= totalImages) {
      initGrid();
      initSplash();
      requestAnimationFrame(frame);
    } else {
      setTimeout(waitForImages, 50);
    }
  }
  waitForImages();
}

init();

// ── Gist Sync Engine (inline for single-file game) ──
const GIST_API = 'https://api.github.com/gists';
const SYNC_PREFIX = 'lovematch_gist_';

const gistSync = {
  token: localStorage.getItem(SYNC_PREFIX + 'token'),
  gistId: localStorage.getItem(SYNC_PREFIX + 'gist_id'),
  role: localStorage.getItem(SYNC_PREFIX + 'role'),
  spouseName: localStorage.getItem(SYNC_PREFIX + 'spouse_name') || '',
  pollTimer: null,
  _lastSpouseData: null,
  onSpouseUpdate: null,

  isConfigured() { return !!(this.token && this.gistId && this.role); },

  _headers() {
    const h = { 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' };
    if (this.token) h['Authorization'] = 'token ' + this.token;
    return h;
  },

  _save() {
    try {
      localStorage.setItem(SYNC_PREFIX + 'token', this.token || '');
      localStorage.setItem(SYNC_PREFIX + 'gist_id', this.gistId || '');
      localStorage.setItem(SYNC_PREFIX + 'role', this.role || '');
    } catch(e) {}
  },

  async createChannel(token, role, name) {
    this.token = token; this.role = role;
    const myData = this._defaultData(role, name);
    const files = { 'channel.json': { content: JSON.stringify({ app: 'love-match', createdBy: role, createdAt: new Date().toISOString() }, null, 2) } };
    files[role + '.json'] = { content: JSON.stringify(myData, null, 2) };
    const res = await fetch(GIST_API, { method: 'POST', headers: this._headers(), body: JSON.stringify({ description: 'Love Match Sync', public: false, files }) });
    if (!res.ok) throw new Error('Failed to create channel');
    const gist = await res.json();
    this.gistId = gist.id;
    this._save();
    return this.gistId;
  },

  async joinChannel(token, code, role, name) {
    this.token = token; this.gistId = code; this.role = role;
    const gist = await this._fetchGist();
    if (!gist.files['channel.json']) throw new Error('Invalid channel code');
    const myData = this._defaultData(role, name);
    await this._updateGist({ [role + '.json']: { content: JSON.stringify(myData, null, 2) } });
    this._save();
  },

  async _fetchGist() {
    const res = await fetch(GIST_API + '/' + this.gistId, { headers: this._headers() });
    if (!res.ok) throw new Error('Gist fetch failed: ' + res.status);
    return res.json();
  },

  async _updateGist(files) {
    const res = await fetch(GIST_API + '/' + this.gistId, { method: 'PATCH', headers: this._headers(), body: JSON.stringify({ files }) });
    if (!res.ok) throw new Error('Gist update failed');
    return res.json();
  },

  async _readMyData() {
    const gist = await this._fetchGist();
    const file = gist.files[this.role + '.json'];
    if (!file) return this._defaultData(this.role, '');
    try {
      let c = file.content;
      if (file.truncated && file.raw_url) { const r = await fetch(file.raw_url); c = await r.text(); }
      return JSON.parse(c);
    } catch { return this._defaultData(this.role, ''); }
  },

  async pushData(data) {
    data.updatedAt = new Date().toISOString();
    data.role = this.role;
    await this._updateGist({ [this.role + '.json']: { content: JSON.stringify(data, null, 2) } });
  },

  async pullSpouseData() {
    if (!this.isConfigured()) return null;
    const spouseRole = this.role === 'husband' ? 'wife' : 'husband';
    const gist = await this._fetchGist();
    const file = gist.files[spouseRole + '.json'];
    if (!file) return null;
    try {
      let c = file.content;
      if (file.truncated && file.raw_url) { const r = await fetch(file.raw_url); c = await r.text(); }
      const data = JSON.parse(c);
      if (data.name) { this.spouseName = data.name; localStorage.setItem(SYNC_PREFIX + 'spouse_name', data.name); }
      return data;
    } catch { return null; }
  },

  async sendLoveNote(message) {
    const d = await this._readMyData();
    d.loveNotes = d.loveNotes || [];
    d.loveNotes.push({ id: Date.now().toString(36), from: this.role, message, sentAt: new Date().toISOString(), read: false });
    await this.pushData(d);
  },

  async sendGift(toolName) {
    const d = await this._readMyData();
    d.gifts = d.gifts || [];
    d.gifts.push({ id: Date.now().toString(36), from: this.role, tool: toolName, sentAt: new Date().toISOString(), claimed: false });
    await this.pushData(d);
  },

  async sendMessage(text) {
    const d = await this._readMyData();
    d.messages = d.messages || [];
    d.messages.push({ id: Date.now().toString(36), from: this.role, text, sentAt: new Date().toISOString() });
    if (d.messages.length > 100) d.messages = d.messages.slice(-100);
    await this.pushData(d);
  },

  async syncGameProgress() {
    if (!this.isConfigured()) return;
    const d = await this._readMyData();
    d.gameProgress = { level, score, highLevel: parseInt(localStorage.getItem('lovematch_highLevel') || '1') };
    await this.pushData(d);
  },

  async getMessages() {
    const [my, sp] = await Promise.all([this._readMyData(), this.pullSpouseData()]);
    const all = [...(my?.messages || []), ...(sp?.messages || [])];
    all.sort((a, b) => new Date(a.sentAt) - new Date(b.sentAt));
    return all;
  },

  startPolling(onData) {
    this.onSpouseUpdate = onData;
    const poll = async () => {
      try {
        const data = await this.pullSpouseData();
        if (data) {
          const json = JSON.stringify(data);
          if (json !== JSON.stringify(this._lastSpouseData)) {
            this._lastSpouseData = data;
            if (this.onSpouseUpdate) this.onSpouseUpdate(data);
          }
        }
      } catch(e) { /* silent */ }
      this.pollTimer = setTimeout(poll, 30000);
    };
    if (this.isConfigured()) poll();
  },

  stopPolling() { if (this.pollTimer) { clearTimeout(this.pollTimer); this.pollTimer = null; } },

  _defaultData(role, name) {
    return { type: 'lovematch_sync', version: 1, role, name: name || '', profile: { gender: role }, loveNotes: [], gifts: [], helpRequests: [], messages: [], bibleProgress: {}, gameProgress: { level: 1, score: 0 }, claimedGifts: [], readNotes: [], updatedAt: new Date().toISOString() };
  },

  disconnect() {
    this.stopPolling();
    this.token = this.gistId = this.role = null;
    [SYNC_PREFIX+'token', SYNC_PREFIX+'gist_id', SYNC_PREFIX+'role', SYNC_PREFIX+'spouse_name'].forEach(k => localStorage.removeItem(k));
  }
};

// ── Spouse Panel UI ──
let showSpousePanel = false;
let spouseNotifications = []; // [{text, time, type}]

function toggleSpousePanel() {
  showSpousePanel = !showSpousePanel;
  if (showSpousePanel) paused = true;
  else paused = false;
}

function drawSpousePanel() {
  if (!showSpousePanel) return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  const pw = W * 0.9, ph = H * 0.85;
  const px = (W - pw) / 2, py = (H - ph) / 2;
  drawRoundedRect(px, py, pw, ph, 16);
  ctx.fillStyle = '#fff';
  ctx.fill();

  ctx.fillStyle = '#c2185b';
  ctx.font = 'bold ' + (tileSize * 0.4) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  if (!gistSync.isConfigured()) {
    // Setup screen
    ctx.fillText('Connect with Spouse', W / 2, py + 20);
    ctx.fillStyle = '#666';
    ctx.font = (tileSize * 0.22) + 'px sans-serif';
    ctx.fillText('Tap the buttons below to set up', W / 2, py + 55);
    ctx.fillText('spouse sync via GitHub Gist', W / 2, py + 75);

    // Create Channel button
    const btnY1 = py + 110;
    drawRoundedRect(px + 20, btnY1, pw - 40, 44, 22);
    const g1 = ctx.createLinearGradient(px+20, btnY1, px+20, btnY1+44);
    g1.addColorStop(0, '#ff6b8a'); g1.addColorStop(1, '#e91e63');
    ctx.fillStyle = g1; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (tileSize * 0.26) + 'px sans-serif';
    ctx.fillText('Create Channel (Spouse 1)', W / 2, btnY1 + 22);

    // Join Channel button
    const btnY2 = btnY1 + 60;
    drawRoundedRect(px + 20, btnY2, pw - 40, 44, 22);
    const g2 = ctx.createLinearGradient(px+20, btnY2, px+20, btnY2+44);
    g2.addColorStop(0, '#7c4dff'); g2.addColorStop(1, '#651fff');
    ctx.fillStyle = g2; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('Join Channel (Spouse 2)', W / 2, btnY2 + 22);

    // Close
    const closeY = py + ph - 50;
    ctx.fillStyle = '#999'; ctx.font = (tileSize * 0.24) + 'px sans-serif';
    ctx.fillText('Tap outside to close', W / 2, closeY);
  } else {
    // Connected screen
    const spName = gistSync.spouseName || (gistSync.role === 'husband' ? 'Wife' : 'Husband');
    ctx.fillText('Connected: ' + spName, W / 2, py + 20);

    ctx.fillStyle = '#4caf50';
    ctx.font = (tileSize * 0.22) + 'px sans-serif';
    ctx.fillText('Channel: ' + (gistSync.gistId || '').slice(0, 8) + '...', W / 2, py + 55);
    ctx.fillText('You are: ' + gistSync.role, W / 2, py + 75);

    // Send Love Note button
    const btnY1 = py + 110;
    drawRoundedRect(px + 20, btnY1, pw - 40, 44, 22);
    const g1 = ctx.createLinearGradient(px+20, btnY1, px+20, btnY1+44);
    g1.addColorStop(0, '#ff6b8a'); g1.addColorStop(1, '#e91e63');
    ctx.fillStyle = g1; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold ' + (tileSize * 0.26) + 'px sans-serif';
    ctx.fillText('Send Love Note', W / 2, btnY1 + 22);

    // Send Tool Gift button
    const btnY2 = btnY1 + 56;
    drawRoundedRect(px + 20, btnY2, pw - 40, 44, 22);
    const g2 = ctx.createLinearGradient(px+20, btnY2, px+20, btnY2+44);
    g2.addColorStop(0, '#ff9800'); g2.addColorStop(1, '#f57c00');
    ctx.fillStyle = g2; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('Send Tool to ' + spName, W / 2, btnY2 + 22);

    // Chat button
    const btnY3 = btnY2 + 56;
    drawRoundedRect(px + 20, btnY3, pw - 40, 44, 22);
    const g3 = ctx.createLinearGradient(px+20, btnY3, px+20, btnY3+44);
    g3.addColorStop(0, '#7c4dff'); g3.addColorStop(1, '#651fff');
    ctx.fillStyle = g3; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('Open Chat', W / 2, btnY3 + 22);

    // Spouse progress
    const spData = gistSync._lastSpouseData;
    if (spData && spData.gameProgress) {
      ctx.fillStyle = '#880e4f'; ctx.font = (tileSize * 0.24) + 'px sans-serif';
      ctx.fillText(spName + ' is on Level ' + (spData.gameProgress.level || 1), W / 2, btnY3 + 70);
      ctx.fillText('Score: ' + (spData.gameProgress.score || 0).toLocaleString(), W / 2, btnY3 + 95);
    }

    // Disconnect button
    const discY = py + ph - 55;
    ctx.fillStyle = '#999'; ctx.font = (tileSize * 0.2) + 'px sans-serif';
    ctx.fillText('Tap here to disconnect', W / 2, discY);
  }

  ctx.restore();
}

// Handle spouse panel clicks
function handleSpousePanelClick(cx, cy) {
  if (!showSpousePanel) return false;

  const pw = W * 0.9, ph = H * 0.85;
  const px = (W - pw) / 2, py = (H - ph) / 2;

  // Outside panel = close
  if (cx < px || cx > px + pw || cy < py || cy > py + ph) {
    showSpousePanel = false;
    paused = false;
    return true;
  }

  if (!gistSync.isConfigured()) {
    // Create Channel
    const btnY1 = py + 110;
    if (cy >= btnY1 && cy <= btnY1 + 44) {
      const token = prompt('Enter your GitHub Personal Access Token\n(needs "gist" scope):');
      if (!token) return true;
      const role = prompt('Are you the Husband or Wife?\n(type: husband or wife)');
      if (role !== 'husband' && role !== 'wife') { alert('Please enter "husband" or "wife"'); return true; }
      const name = prompt('Your name:') || role;
      gistSync.createChannel(token, role, name).then(code => {
        alert('Channel created! Share this code with your spouse:\n\n' + code);
        gistSync.startPolling(onSpouseData);
      }).catch(e => alert('Error: ' + e.message));
      return true;
    }
    // Join Channel
    const btnY2 = btnY1 + 60;
    if (cy >= btnY2 && cy <= btnY2 + 44) {
      const token = prompt('Enter your GitHub Personal Access Token\n(needs "gist" scope):');
      if (!token) return true;
      const code = prompt('Enter the Channel Code from your spouse:');
      if (!code) return true;
      const role = prompt('Are you the Husband or Wife?\n(type: husband or wife)');
      if (role !== 'husband' && role !== 'wife') { alert('Please enter "husband" or "wife"'); return true; }
      const name = prompt('Your name:') || role;
      gistSync.joinChannel(token, code, role, name).then(() => {
        alert('Connected! You and your spouse are now synced.');
        gistSync.startPolling(onSpouseData);
      }).catch(e => alert('Error: ' + e.message));
      return true;
    }
  } else {
    // Connected panel buttons
    const btnY1 = py + 110;
    // Send Love Note
    if (cy >= btnY1 && cy <= btnY1 + 44) {
      const msg = prompt('Write a love note to your spouse:');
      if (msg) gistSync.sendLoveNote(msg).then(() => {
        scorePopups.push({ x: W/2, y: H/3, text: 'Note sent!', alpha: 1, dy: 0 });
      }).catch(e => alert('Error: ' + e.message));
      return true;
    }
    // Send Tool
    const btnY2 = btnY1 + 56;
    if (cy >= btnY2 && cy <= btnY2 + 44) {
      const tools = getUnlockedTools();
      if (tools.length === 0) { alert('No tools unlocked yet!'); return true; }
      const toolNames = tools.map((t,i) => (i+1) + '. ' + t.name).join('\n');
      const pick = prompt('Pick a tool to send:\n' + toolNames);
      const idx = parseInt(pick) - 1;
      if (idx >= 0 && idx < tools.length) {
        gistSync.sendGift(tools[idx].name).then(() => {
          scorePopups.push({ x: W/2, y: H/3, text: tools[idx].name + ' sent!', alpha: 1, dy: 0 });
        }).catch(e => alert('Error: ' + e.message));
      }
      return true;
    }
    // Chat
    const btnY3 = btnY2 + 56;
    if (cy >= btnY3 && cy <= btnY3 + 44) {
      const msg = prompt('Send a message:');
      if (msg) gistSync.sendMessage(msg).then(() => {
        scorePopups.push({ x: W/2, y: H/3, text: 'Message sent!', alpha: 1, dy: 0 });
      });
      return true;
    }
    // Disconnect
    const discY = py + ph - 55;
    if (cy >= discY - 10 && cy <= discY + 20) {
      if (confirm('Disconnect from spouse sync?')) {
        gistSync.disconnect();
      }
      return true;
    }
  }
  return true;
}

// Spouse data callback
function onSpouseData(data) {
  // Check for new unread love notes
  const notes = (data.loveNotes || []).filter(n => n.from !== gistSync.role);
  const myRead = gistSync._lastSpouseData?.readNotes || [];
  const unread = notes.filter(n => !myRead.includes(n.id));
  if (unread.length > 0) {
    const latest = unread[unread.length - 1];
    const from = gistSync.spouseName || 'Spouse';
    scorePopups.push({ x: W/2, y: H/4, text: from + ': ' + latest.message.slice(0, 30), alpha: 1, dy: 0 });
    sfxSpecial();
  }

  // Check for new gifts
  const gifts = (data.gifts || []).filter(g => g.from !== gistSync.role && !g.claimed);
  if (gifts.length > 0) {
    const g = gifts[gifts.length - 1];
    scorePopups.push({ x: W/2, y: H/3, text: (gistSync.spouseName || 'Spouse') + ' sent you ' + g.tool + '!', alpha: 1, dy: 0 });
    sfxLevelComplete();
  }
}

// Add spouse button to HUD (heart icon in top-left area)
const _origDrawHUD = drawHUD;
drawHUD = function() {
  _origDrawHUD();
  // Spouse sync button (small heart icon)
  ctx.save();
  const sbSize = tileSize * 0.4;
  const sbX = W - sbSize - 12;
  const sbY = hudH - sbSize - tileSize * 0.4;
  ctx.font = (sbSize * 0.9) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(gistSync.isConfigured() ? '💑' : '💌', sbX + sbSize/2, sbY + sbSize/2);
  if (gistSync.isConfigured()) {
    // Green dot
    ctx.beginPath();
    ctx.arc(sbX + sbSize - 2, sbY + 4, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#4caf50';
    ctx.fill();
  }
  ctx.restore();
};

// Sync progress after level complete
const _origRestartGame = restartGame;
restartGame = function() {
  _origRestartGame();
  if (gistSync.isConfigured()) {
    gistSync.syncGameProgress().catch(() => {});
  }
};

// Start polling if configured
if (gistSync.isConfigured()) {
  gistSync.startPolling(onSpouseData);
}
