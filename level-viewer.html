<html lang="en">
<head>
<meta charset="UTF-8">

<title>Level Viewer — Love Match</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; }

  .controls {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, #16213e, #0f3460);

  }
  .controls label { font-size: 13px; color: #aaa; }
  .controls input[type="number"] {

    background: #1a1a2e; color: #fff; font-size: 14px; text-align: center;
  }
  .controls button {
    padding: 8px 16px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-nav { background: #e94560; color: #fff; }
  .btn-nav:hover { background: #ff6b81; }
  .btn-nav:disabled { background: #444; cursor: not-allowed; }
  .btn-go { background: #0f3460; color: #fff; border: 1px solid #e94560; }

  .btn-range { background: #533483; color: #fff; }

  .level-display .gen { color: #e94560; font-size: 11px; display: block; }

    font-size: 13px; color: #ccc; line-height: 1.6;

  .tag-generated { background: #9b59b6; color: #fff; }

  .board-container {
    display: flex; justify-content: center; align-items: flex-start;
    padding: 20px; gap: 20px; flex-wrap: wrap;
  }

  .board-wrap {
    display: flex; flex-direction: column; align-items: center;
  }

  canvas#board {
    border-radius: 12px; background: #0d1b2a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  .stats-panel {
    background: #16213e; border-radius: 12px; padding: 16px 20px;
    min-width: 220px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .stats-panel h3 { margin-bottom: 10px; color: #e94560; font-size: 15px; }
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #222; }
  .stat-row:last-child { border: none; }
  .stat-label { color: #888; }
  .stat-value { font-weight: 600; }

  .intro-text {
    margin-top: 12px; padding: 10px; background: #0d1b2a; border-radius: 8px;
    font-size: 12px; color: #aaa; font-style: italic; max-width: 300px; text-align: center;
  }

  .diff-chart {
    margin: 16px auto; max-width: 700px; padding: 0 16px;
  }
  .diff-chart h3 { color: #e94560; font-size: 14px; margin-bottom: 8px; text-align: center; }
  .diff-chart canvas { width: 100%; border-radius: 8px; background: #0d1b2a; }

  .range-view {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    padding: 16px;
  }
  .range-card {
    background: #16213e; border-radius: 10px; padding: 8px; text-align: center;
    cursor: pointer; transition: all 0.15s; border: 2px solid transparent;
    width: 130px;

  .range-card:hover { border-color: #e94560; transform: scale(1.03); }
  .range-card.boss { border-color: #ffd700; background: #2a1a00; }
  .range-card canvas { border-radius: 6px; }
  .range-card .card-label { font-size: 11px; margin-top: 4px; color: #aaa; }
  .range-card .card-level { font-weight: 700; font-size: 14px; }
</style>

// ── Exact copy of generateLevelConfig from match.html ──
function generateLevelConfig(lvl) {
  function seededRand(seed) {
    let s = seed;
    return function() {
      s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
      return (s >>> 0) / 0xFFFFFFFF;
    };
  }
  const rand = seededRand(lvl * 2654435761);
  const posInCycle = (lvl - 1) % 20;
  const cycleNum = Math.floor((lvl - 1) / 20);
  const isBoss = posInCycle === 19;

  let waveDiff;
  if (isBoss) {
    waveDiff = 1.0;
  } else {
    const t = posInCycle / 18;
    waveDiff = 0.3 + 0.35 * Math.sin(t * Math.PI) + 0.35 * Math.sin(t * 2 * Math.PI - Math.PI * 0.3);
    waveDiff = Math.max(0.1, Math.min(waveDiff, 0.95));
  }

  const globalRamp = Math.min(1.0, cycleNum / 5);
  const diff = waveDiff * (0.5 + 0.5 * globalRamp);

  const boardPresets = [
    { cols: 5, rows: 5 }, { cols: 6, rows: 6 }, { cols: 5, rows: 7 },
    { cols: 7, rows: 7 }, { cols: 6, rows: 8 }, { cols: 8, rows: 8 },
    { cols: 7, rows: 9 }, { cols: 8, rows: 10 }, { cols: 8, rows: 12 },
    { cols: 8, rows: 13 },
  ];
  let boardIdx;
  if (isBoss) {
    boardIdx = Math.min(boardPresets.length - 1, 7 + Math.min(cycleNum, 2));
  } else {
    const minIdx = Math.floor(diff * 3);
    const maxIdx = Math.min(minIdx + 4, boardPresets.length - 3);
    boardIdx = minIdx + Math.floor(rand() * (maxIdx - minIdx + 1));
  }
  const board = boardPresets[Math.min(boardIdx, boardPresets.length - 1)];

  const minGems = 3;
  const maxGems = Math.min(7, 3 + Math.floor(globalRamp * 4));
  let gems = minGems + Math.floor(diff * (maxGems - minGems + 1));
  gems = Math.max(3, Math.min(gems, ALL_GEMS.length));
  if (isBoss) gems = Math.min(ALL_GEMS.length, maxGems + 1);

  const shapedChance = isBoss ? 0.6 : (0.15 + diff * 0.25);
  const boardPct = rand() < shapedChance ? (0.7 + rand() * 0.2) : 1.0;

  const allObsTypes = ['ice', 'crate', 'giftbox', 'parcel'];
  let obstacleCount = 0;
  let obstacleTypes = [];
  if (diff > 0.2 || isBoss) {
    const maxObs = Math.floor(board.cols * board.rows * 0.25);
    obstacleCount = Math.max(2, Math.round(diff * maxObs));
    if (isBoss) obstacleCount = Math.min(maxObs, obstacleCount + 4);
    const numTypes = Math.min(allObsTypes.length, 1 + Math.floor(diff * 3) + (isBoss ? 1 : 0));
    const shuffled = [...allObsTypes];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    obstacleTypes = shuffled.slice(0, numTypes);
  }

  const cellCount = board.cols * board.rows;
  const baseTime = 60 + cellCount * 1.5;
  const baseMoves = 20 + Math.floor(cellCount * 0.5);
  const timeMult = isBoss ? 0.85 : (1.2 - diff * 0.4);
  const movesMult = isBoss ? 0.85 : (1.2 - diff * 0.4);
  const time = Math.round(baseTime * timeMult);
  const moves = Math.round(baseMoves * movesMult);

  const baseTarget = cellCount * 40;
  const targetMult = 0.6 + diff * 0.8 + (isBoss ? 0.5 : 0);
  const target = Math.round(baseTarget * targetMult / 100) * 100;

  let intro;
  if (isBoss) {
    const bossNum = cycleNum + 1;
    const bossTitles = ['Guardian', 'Champion', 'Overlord', 'Titan', 'Legend'];
    const title = bossTitles[Math.min(bossNum - 1, bossTitles.length - 1)];
    intro = `BOSS LEVEL ${lvl}! The ${title} awaits — ${board.cols}×${board.rows} board, ${gems} gem types!`;
  } else if (diff < 0.3) {
    const easy = ['Breather round!', 'Take it easy!', 'A lighter challenge.', 'Catch your breath!', 'Warm-up time!'];
    intro = easy[Math.floor(rand() * easy.length)] + ` ${board.cols}×${board.rows} board.`;
  } else if (diff > 0.7) {
    const hard = ['Things are heating up!', 'Can you handle this?', 'Brace yourself!', 'No mercy!', 'Full throttle!'];
    intro = hard[Math.floor(rand() * hard.length)] + ` ${board.cols}×${board.rows} board.`;
  } else {
    const mid = ['Keep going!', 'Stay sharp!', 'Nice and steady.', 'You got this!', 'Level up!'];
    intro = mid[Math.floor(rand() * mid.length)] + ` ${board.cols}×${board.rows} board.`;
  }

  const startPattern = generateStartPattern(lvl, board.rows, board.cols, gems, rand);

  return {
    gems, cols: board.cols, rows: board.rows, boardPct,
    time, moves, target,
    obstacleCount: obstacleCount || undefined,
    obstacleTypes: obstacleTypes.length ? obstacleTypes : undefined,
    intro, generated: true, isBoss, startPattern,
    _diff: diff, _waveDiff: waveDiff, _globalRamp: globalRamp,
    _cycleNum: cycleNum, _posInCycle: posInCycle,
  };
}

// ── Start Pattern Generator (same as match.html) ──
function generateStartPattern(lvl, rows, cols, numGems, rand) {
  const patterns = [
    'hStripes', 'vStripes', 'checkerboard', 'diamond', 'rings',
    'gradient', 'spiral', 'zigzag', 'waves', 'quadrants',
    'diagonalStripes', 'heart', 'border', 'dots', 'columns',
  ];
  const patIdx = Math.floor(rand() * patterns.length);
  const patType = patterns[patIdx];
  const grid = [];

  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      grid[r][c] = getPatternGem(patType, r, c, rows, cols, numGems, rand);
    }
  }

  for (let pass = 0; pass < 3; pass++) {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (hasMatch3(grid, r, c, rows, cols)) {
          grid[r][c] = (grid[r][c] + 1) % numGems;
          if (hasMatch3(grid, r, c, rows, cols)) {
            grid[r][c] = (grid[r][c] + 1) % numGems;
          }
        }
      }
    }
  }

  grid._patternName = patType;
  return grid;
}

function hasMatch3(grid, r, c, rows, cols) {
  const t = grid[r][c];
  if (c >= 2 && grid[r][c-1] === t && grid[r][c-2] === t) return true;
  if (c >= 1 && c < cols-1 && grid[r][c-1] === t && grid[r][c+1] === t) return true;
  if (c < cols-2 && grid[r][c+1] === t && grid[r][c+2] === t) return true;
  if (r >= 2 && grid[r-1][c] === t && grid[r-2][c] === t) return true;
  if (r >= 1 && r < rows-1 && grid[r-1][c] === t && grid[r+1][c] === t) return true;
  if (r < rows-2 && grid[r+1][c] === t && grid[r+2][c] === t) return true;
  return false;
}

function getPatternGem(pat, r, c, rows, cols, n, rand) {
  const cr = (rows - 1) / 2, cc = (cols - 1) / 2;
  switch (pat) {
    case 'hStripes': return r % n;
    case 'vStripes': return c % n;
    case 'checkerboard': return (r + c) % Math.min(n, 3);
    case 'diamond': { const dist = Math.abs(r - cr) + Math.abs(c - cc); return Math.floor(dist) % n; }
    case 'rings': { const dist = Math.max(Math.abs(r - cr), Math.abs(c - cc)); return Math.floor(dist) % n; }
    case 'gradient': return Math.floor((r / rows) * n) % n;
    case 'spiral': { const angle = Math.atan2(r - cr, c - cc); const dist = Math.sqrt((r-cr)**2 + (c-cc)**2); return Math.floor((angle / Math.PI + dist * 0.5) * n / 3) % n; }
    case 'zigzag': return (r + (r % 2 === 0 ? c : cols - 1 - c)) % n;
    case 'waves': return Math.floor(r + Math.sin(c * 1.2) * 2 + n) % n;
    case 'quadrants': { const qr = r < rows / 2 ? 0 : 1; const qc = c < cols / 2 ? 0 : 1; return (qr * 2 + qc) % n; }
    case 'diagonalStripes': return (r + c) % n;
    case 'heart': { const nr = (r - cr) / (rows/2), nc = (c - cc) / (cols/2); const h = (nr*nr + nc*nc - 1)**3 - nr*nr * nc*nc*nc; return h < 0 ? 0 : (r + c) % Math.max(2, n - 1) + 1; }
    case 'border': { const isBorder = r === 0 || r === rows-1 || c === 0 || c === cols-1; const isInner = r === 1 || r === rows-2 || c === 1 || c === cols-2; return isBorder ? 0 : isInner ? 1 % n : (r + c) % Math.max(1, n - 2) + 2; }
    case 'dots': return (r % 3 === 1 && c % 3 === 1) ? 0 : ((r + c) % (n - 1)) + 1;
    case 'columns': return (c % 2 === 0) ? Math.floor(r / 2) % n : (Math.floor(r / 2) + 1) % n;
    default: return Math.floor(rand() * n);
  }
}

function getLevelConfig(lvl) {
  let cfg;
  if (lvl <= LEVEL_PROGRESSION.length) {
    cfg = { ...LEVEL_PROGRESSION[lvl - 1] };
    cfg.generated = false;
  } else {
    cfg = generateLevelConfig(lvl);
  }
  if (!cfg.mode) {
    cfg.mode = (lvl % 2 === 1) ? 'timer' : 'moves';
  }
  if (lvl <= LEVEL_PROGRESSION.length) {
    const src = LEVEL_PROGRESSION[lvl - 1];
    let tierTime, tierMoves;
    if (lvl <= 5) { tierTime = 90; tierMoves = 30; }
    else if (lvl <= 10) { tierTime = 120; tierMoves = 35; }
    else if (lvl <= 15) { tierTime = 150; tierMoves = 40; }
    else if (lvl <= 20) { tierTime = 180; tierMoves = 45; }
    else if (lvl <= 30) { tierTime = 210; tierMoves = 50; }
    else if (lvl <= 40) { tierTime = 240; tierMoves = 55; }
    else { tierTime = 270; tierMoves = 60; }
    cfg.time = (src.time !== undefined && lvl > 20) ? src.time : tierTime;
    cfg.moves = (src.moves !== undefined && lvl > 20) ? src.moves : tierMoves;
  }
  return cfg;
}

// ── Board mask generator (same logic as match.html) ──
function generateBoardMask(lvl, rows, cols, pct) {
  const mask = [];
  if (pct >= 1.0) {
    for (let r = 0; r < rows; r++) { mask[r] = []; for (let c = 0; c < cols; c++) mask[r][c] = true; }
    return mask;
  }
  const cr = (rows - 1) / 2, cc = (cols - 1) / 2;
  const shapeType = lvl % 3;
  const totalCells = rows * cols;
  const targetActive = Math.round(totalCells * pct);
  for (let r = 0; r < rows; r++) { mask[r] = []; for (let c = 0; c < cols; c++) mask[r][c] = false; }

  if (shapeType === 0) {
    let bestRadius = 1;
    for (let rad = 1; rad <= rows + cols; rad += 0.5) {
      let count = 0;
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
        if (Math.abs(r - cr) + Math.abs(c - cc) <= rad) count++;
      if (count <= targetActive) bestRadius = rad; else break;
    }
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      mask[r][c] = Math.abs(r - cr) + Math.abs(c - cc) <= bestRadius;
  } else if (shapeType === 1) {
    let bestCut = 0;
    for (let cut = 0.5; cut <= Math.max(rows, cols); cut += 0.5) {
      let count = 0;
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
        if (Math.abs(r - cr) + Math.abs(c - cc) <= (cr + cc) - cut + 0.5) count++;
      if (count >= targetActive) { bestCut = cut; break; }
    }
    const maxDist = (cr + cc) - bestCut + 0.5;
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      mask[r][c] = Math.abs(r - cr) + Math.abs(c - cc) <= maxDist;
  } else {
    const armW = Math.max(2, Math.round(cols * 0.4));
    const armH = Math.max(2, Math.round(rows * 0.4));
    const hPad = Math.floor((cols - armW) / 2);
    const vPad = Math.floor((rows - armH) / 2);
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      mask[r][c] = (c >= hPad && c < cols - hPad) || (r >= vPad && r < rows - vPad);
  }
  return mask;
}

// ── Obstacle colors ──
const OBS_COLORS = {
  ice: { bg: '#87ceeb', border: '#4fc3f7', icon: '❄' },
  crate: { bg: '#a1887f', border: '#8d6e63', icon: '📦' },
  giftbox: { bg: '#f8bbd0', border: '#f06292', icon: '🎁' },
  parcel: { bg: '#ffe0b2', border: '#ffab91', icon: '💌' },
};

// ── Gem colors for visual representation ──
const GEM_COLORS = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
  '#9b59b6', '#e91e63', '#00bcd4', '#ffd700',
];

// ── Drawing ──
function drawLevel(canvas, lvl, tileSize) {
  const cfg = getLevelConfig(lvl);
  const { cols, rows, boardPct } = cfg;
  tileSize = tileSize || Math.min(48, Math.floor(360 / Math.max(cols, rows)));
  const pad = 8;
  canvas.width = cols * tileSize + pad * 2;
  canvas.height = rows * tileSize + pad * 2;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const mask = generateBoardMask(lvl, rows, cols, boardPct);

  // Seeded random for obstacle placement
  function seededRand(seed) {
    let s = seed;
    return function() { s = (s * 1664525 + 1013904223) & 0xFFFFFFFF; return (s >>> 0) / 0xFFFFFFFF; };
  }
  const rand = seededRand(lvl * 9973);

  // Place obstacles randomly on valid cells
  const obsGrid = {};
  const obsCount = cfg.obstacleCount || 0;
  const obsTypes = cfg.obstacleTypes || [];
  if (obsCount > 0 && obsTypes.length > 0) {
    const validCells = [];
    for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++)
      if (mask[r][c]) validCells.push(`${r},${c}`);
    // Shuffle and pick
    for (let i = validCells.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [validCells[i], validCells[j]] = [validCells[j], validCells[i]];
    }
    for (let i = 0; i < Math.min(obsCount, validCells.length); i++) {
      const type = obsTypes[i % obsTypes.length];
      obsGrid[validCells[i]] = type;
    }
  }

  // Draw cells
  const gap = 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = pad + c * tileSize + gap;
      const y = pad + r * tileSize + gap;
      const s = tileSize - gap * 2;

      if (!mask[r][c]) {
        // Void cell
        ctx.fillStyle = '#0a0a1a';
        ctx.fillRect(x, y, s, s);
        continue;
      }

      const key = `${r},${c}`;
      if (obsGrid[key]) {
        // Obstacle cell
        const obs = OBS_COLORS[obsGrid[key]];
        ctx.fillStyle = obs.bg;
        roundRect(ctx, x, y, s, s, 4);
        ctx.fill();
        ctx.strokeStyle = obs.border;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Icon
        ctx.font = `${s * 0.5}px serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(obs.icon, x + s/2, y + s/2 + 1);
      } else {
        // Normal gem cell — use start pattern if available, else random
        const gemIdx = (cfg.startPattern && cfg.startPattern[r])
          ? cfg.startPattern[r][c] % cfg.gems
          : Math.floor(rand() * cfg.gems);
        ctx.fillStyle = GEM_COLORS[gemIdx % GEM_COLORS.length];
        roundRect(ctx, x, y, s, s, 6);
        ctx.fill();
        // Subtle shine
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        roundRect(ctx, x + 2, y + 2, s - 4, s * 0.4, 4);
        ctx.fill();
      }
    }
  }

  // Boss glow
  if (cfg.isBoss) {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    roundRect(ctx, 2, 2, canvas.width - 4, canvas.height - 4, 10);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  return cfg;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── UI State ──
let currentLevel = 1;

function renderLevel(lvl) {
  currentLevel = lvl;
  document.getElementById('rangeView').style.display = 'none';
  document.getElementById('diffChartWrap').style.display = 'none';
  document.getElementById('singleView').style.display = 'flex';

  const canvas = document.getElementById('board');
  const cfg = drawLevel(canvas, lvl, 48);

  // Level label
  const label = document.getElementById('levelLabel');
  label.innerHTML = `Level ${lvl}` +
    (cfg.isBoss ? '<span class="boss"> BOSS</span>' : '') +
    (cfg.generated ? '<span class="gen">GENERATED</span>' : '<span class="gen">HARDCODED</span>');

  // Info bar
  const infoBar = document.getElementById('infoBar');
  const diffTag = cfg._diff !== undefined
    ? (cfg._diff > 0.7 ? '<span class="tag tag-hard">Hard</span>' :
       cfg._diff > 0.4 ? '<span class="tag tag-medium">Medium</span>' :
       '<span class="tag tag-easy">Easy</span>')
    : '';
  const bossTag = cfg.isBoss ? '<span class="tag tag-boss">BOSS</span>' : '';
  const srcTag = cfg.generated
    ? '<span class="tag tag-generated">Procedural</span>'
    : '<span class="tag tag-hardcoded">Hardcoded</span>';

  infoBar.innerHTML = `${srcTag} ${bossTag} ${diffTag}
    &nbsp;|&nbsp; <b>${cfg.cols}×${cfg.rows}</b> grid
    &nbsp;|&nbsp; ${cfg.gems} gems
    &nbsp;|&nbsp; ${cfg.obstacleCount || 0} obstacles
    ${cfg.boardPct < 1 ? '&nbsp;|&nbsp; Shaped board (' + Math.round(cfg.boardPct*100) + '%)' : ''}
    ${cfg.startPattern ? '&nbsp;|&nbsp; Pattern: <b>' + cfg.startPattern._patternName + '</b>' : ''}
    ${cfg._diff !== undefined ? '&nbsp;|&nbsp; Diff: ' + cfg._diff.toFixed(2) : ''}
    ${cfg._cycleNum !== undefined ? '&nbsp;|&nbsp; Cycle ' + (cfg._cycleNum+1) + ' pos ' + cfg._posInCycle : ''}`;

  // Stats panel
  const panel = document.getElementById('statsPanel');
  panel.innerHTML = `<h3>Level ${lvl} Stats</h3>
    <div class="stat-row"><span class="stat-label">Grid</span><span class="stat-value">${cfg.cols} × ${cfg.rows}</span></div>
    <div class="stat-row"><span class="stat-label">Cells</span><span class="stat-value">${cfg.cols * cfg.rows}${cfg.boardPct < 1 ? ' (~'+Math.round(cfg.cols*cfg.rows*cfg.boardPct)+' active)' : ''}</span></div>
    <div class="stat-row"><span class="stat-label">Gem Types</span><span class="stat-value">${cfg.gems}</span></div>
    <div class="stat-row"><span class="stat-label">Mode</span><span class="stat-value">${cfg.mode}</span></div>
    <div class="stat-row"><span class="stat-label">Time</span><span class="stat-value">${cfg.time}s</span></div>
    <div class="stat-row"><span class="stat-label">Moves</span><span class="stat-value">${cfg.moves}</span></div>
    <div class="stat-row"><span class="stat-label">Target</span><span class="stat-value">${cfg.target.toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-label">Obstacles</span><span class="stat-value">${cfg.obstacleCount || 0}</span></div>
    <div class="stat-row"><span class="stat-label">Obstacle Types</span><span class="stat-value">${(cfg.obstacleTypes || []).join(', ') || 'none'}</span></div>
    <div class="stat-row"><span class="stat-label">Board Shape</span><span class="stat-value">${cfg.boardPct >= 1 ? 'Full' : Math.round(cfg.boardPct*100)+'%'}</span></div>
    <div class="stat-row"><span class="stat-label">Start Pattern</span><span class="stat-value">${cfg.startPattern?._patternName || 'random'}</span></div>
    ${cfg._diff !== undefined ? `
    <div class="stat-row"><span class="stat-label">Difficulty</span><span class="stat-value">${(cfg._diff * 100).toFixed(0)}%</span></div>
    <div class="stat-row"><span class="stat-label">Wave Diff</span><span class="stat-value">${(cfg._waveDiff * 100).toFixed(0)}%</span></div>
    <div class="stat-row"><span class="stat-label">Global Ramp</span><span class="stat-value">${(cfg._globalRamp * 100).toFixed(0)}%</span></div>
    <div class="stat-row"><span class="stat-label">Cycle</span><span class="stat-value">${cfg._cycleNum + 1} (pos ${cfg._posInCycle}/19)</span></div>
    ` : ''}`;

  // Intro text
  document.getElementById('introText').textContent = cfg.intro || '';

  // Update jump input
  document.getElementById('jumpInput').value = lvl;
  document.getElementById('prevBtn').disabled = lvl <= 1;
}

function go(delta) {
  renderLevel(Math.max(1, currentLevel + delta));
}

function jumpTo() {
  const val = parseInt(document.getElementById('jumpInput').value);
  if (val >= 1) renderLevel(val);
}

function showRange() {
  const start = parseInt(document.getElementById('rangeStart').value) || 55;
  const end = parseInt(document.getElementById('rangeEnd').value) || 100;
  document.getElementById('singleView').style.display = 'none';
  document.getElementById('diffChartWrap').style.display = 'none';
  const rv = document.getElementById('rangeView');
  rv.style.display = 'flex';
  rv.innerHTML = '';

  for (let lvl = start; lvl <= end; lvl++) {
    const card = document.createElement('div');
    card.className = 'range-card';
    const cfg = getLevelConfig(lvl);
    if (cfg.isBoss) card.classList.add('boss');

    const cvs = document.createElement('canvas');
    drawLevel(cvs, lvl, 14);
    card.appendChild(cvs);

    const lbl = document.createElement('div');
    lbl.className = 'card-level';
    lbl.textContent = `Level ${lvl}`;
    card.appendChild(lbl);

    const info = document.createElement('div');
    info.className = 'card-label';
    info.innerHTML = `${cfg.cols}×${cfg.rows} | ${cfg.gems}g | ${cfg.obstacleCount||0}obs` +
      (cfg.isBoss ? ' <b style="color:#ffd700">BOSS</b>' : '') +
      (cfg._diff !== undefined ? ` | ${(cfg._diff*100).toFixed(0)}%` : '');
    card.appendChild(info);

    card.onclick = () => renderLevel(lvl);
    rv.appendChild(card);
  }
}

function showDiffChart() {
  document.getElementById('singleView').style.display = 'none';
  document.getElementById('rangeView').style.display = 'none';
  const wrap = document.getElementById('diffChartWrap');
  wrap.style.display = 'block';

  const canvas = document.getElementById('diffChart');
  const ctx = canvas.getContext('2d');
  canvas.width = 700;
  canvas.height = 250;
  ctx.fillStyle = '#0d1b2a';
  ctx.fillRect(0, 0, 700, 250);

  const startLvl = 55, endLvl = 200;
  const count = endLvl - startLvl + 1;
  const barW = 700 / count;
  const chartH = 210;
  const topPad = 20;

  // Draw axis
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, topPad + chartH); ctx.lineTo(700, topPad + chartH); ctx.stroke();

  for (let i = 0; i < count; i++) {
    const lvl = startLvl + i;
    const cfg = getLevelConfig(lvl);
    const diff = cfg._diff || 0;
    const h = diff * chartH;
    const x = i * barW;

    // Color by difficulty
    let color;
    if (cfg.isBoss) color = '#ffd700';
    else if (diff > 0.7) color = '#e74c3c';
    else if (diff > 0.4) color = '#f39c12';
    else color = '#2ecc71';

    ctx.fillStyle = color;
    ctx.fillRect(x, topPad + chartH - h, barW - 0.5, h);

    // Level labels every 10
    if (lvl % 10 === 0) {
      ctx.fillStyle = '#888';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(lvl, x + barW/2, topPad + chartH + 14);
    }

    // Boss label
    if (cfg.isBoss) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('B', x + barW/2, topPad + chartH - h - 4);
    }
  }

  // Legend
  ctx.font = '11px sans-serif';
  const legend = [
    { color: '#2ecc71', label: 'Easy (<40%)' },
    { color: '#f39c12', label: 'Medium (40-70%)' },
    { color: '#e74c3c', label: 'Hard (>70%)' },
    { color: '#ffd700', label: 'Boss' },
  ];
  let lx = 10;
  for (const l of legend) {
    ctx.fillStyle = l.color;
    ctx.fillRect(lx, 4, 10, 10);
    ctx.fillStyle = '#aaa';
    ctx.fillText(l.label, lx + 14, 13);
    lx += ctx.measureText(l.label).width + 28;
  }

  wrap.querySelector('h3').textContent = `Difficulty Curve (levels ${startLvl}–${endLvl})`;
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft' || e.key === 'a') go(-1);
  if (e.key === 'ArrowRight' || e.key === 'd') go(1);
  if (e.key === 'ArrowUp') go(-10);
  if (e.key === 'ArrowDown') go(10);
});

// Init
renderLevel(55);
</script>
</body>
