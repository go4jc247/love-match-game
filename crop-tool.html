<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Obstacle Sprite Cropper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
  overflow-x: hidden;
}
h1 { text-align: center; color: #f8bbd0; margin-bottom: 4px; font-size: 24px; }
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 14px; }

.tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.tab-btn {
  padding: 8px 18px; border-radius: 10px; border: 2px solid #333;
  background: #16213e; color: #aaa; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.15s;
}
.tab-btn:hover { border-color: #555; color: #fff; }
.tab-btn.active { border-color: #f06292; color: #f8bbd0; background: #1a1035; }
.tab-btn .check { color: #4caf50; margin-left: 4px; }

.workspace { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

.image-panel {
  background: #0d1117; border-radius: 12px; padding: 12px;
  display: flex; flex-direction: column; align-items: center;
}

.canvas-area {
  position: relative;
  background-image:
    linear-gradient(45deg, #1e1e2e 25%, transparent 25%),
    linear-gradient(-45deg, #1e1e2e 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #1e1e2e 75%),
    linear-gradient(-45deg, transparent 75%, #1e1e2e 75%);
  background-size: 16px 16px;
  background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
  background-color: #151520;
  border-radius: 8px;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
.canvas-area canvas { display: block; pointer-events: none; }

/* The crop box */
.crop-box {
  position: absolute; border: 2.5px solid #f06292;
  cursor: move; touch-action: none;
  box-shadow: 0 0 0 3000px rgba(0,0,0,0.45);
  transition: box-shadow 0.2s;
}
.crop-box::after {
  content: ''; position: absolute; inset: 0;
  border: 1px dashed rgba(255,255,255,0.3);
}
/* Resize handle — bottom-right corner */
.crop-handle {
  position: absolute; bottom: -6px; right: -6px;
  width: 18px; height: 18px;
  background: #f06292; border-radius: 3px;
  cursor: nwse-resize; touch-action: none;
  border: 2px solid #fff;
}
/* Size label */
.crop-size {
  position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #f8bbd0; white-space: nowrap;
  background: rgba(0,0,0,0.7); padding: 1px 6px; border-radius: 4px;
  pointer-events: none;
}

.side-panel {
  display: flex; flex-direction: column; gap: 10px; min-width: 220px; max-width: 280px;
}

.commit-section {
  background: #0d1117; border-radius: 12px; padding: 14px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.commit-section h3 { color: #f8bbd0; font-size: 15px; }
.commit-section .preview-img {
  width: 100px; height: 100px; border-radius: 8px;
  background-image:
    linear-gradient(45deg, #222 25%, transparent 25%),
    linear-gradient(-45deg, #222 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #222 75%),
    linear-gradient(-45deg, transparent 75%, #222 75%);
  background-size: 10px 10px;
  background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
  background-color: #111;
  overflow: hidden; border: 2px solid #333;
}
.commit-section .preview-img canvas { width: 100px; height: 100px; }
.commit-buttons { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.commit-btn {
  padding: 8px 14px; border-radius: 8px; border: 2px solid;
  font-size: 13px; font-weight: 700; cursor: pointer;
  background: rgba(0,0,0,0.3); transition: all 0.15s;
}
.commit-btn:hover { filter: brightness(1.3); }
.commit-btn.s3 { border-color: #4caf50; color: #4caf50; }
.commit-btn.s2 { border-color: #ff9800; color: #ff9800; }
.commit-btn.s1 { border-color: #f44336; color: #f44336; }

/* Saved stages */
.stages-section {
  background: #0d1117; border-radius: 12px; padding: 14px;
}
.stages-section h3 { color: #f8bbd0; font-size: 15px; text-align: center; margin-bottom: 10px; }
.stage-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  padding: 6px; border-radius: 8px; border: 1.5px solid #222;
}
.stage-row.filled { border-style: solid; }
.stage-row.s3 { border-color: #4caf5066; }
.stage-row.s2 { border-color: #ff980066; }
.stage-row.s1 { border-color: #f4433666; }
.stage-row.s3.filled { border-color: #4caf50; }
.stage-row.s2.filled { border-color: #ff9800; }
.stage-row.s1.filled { border-color: #f44336; }
.stage-tag {
  font-size: 11px; font-weight: 800; min-width: 18px; text-align: center;
}
.s3 .stage-tag { color: #4caf50; }
.s2 .stage-tag { color: #ff9800; }
.s1 .stage-tag { color: #f44336; }
.stage-thumb {
  width: 48px; height: 48px; border-radius: 6px; flex-shrink: 0;
  background: #111; overflow: hidden;
}
.stage-thumb canvas { width: 48px; height: 48px; }
.stage-name { font-size: 11px; color: #777; flex: 1; }
.stage-x {
  background: none; border: none; color: #555; font-size: 16px; cursor: pointer;
  padding: 2px 6px;
}
.stage-x:hover { color: #f44336; }

.bottom-bar {
  display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap;
}
.bottom-bar button {
  padding: 10px 24px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s;
}
.bottom-bar button:hover { transform: scale(1.03); }
.btn-copy { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; }
.btn-clear { background: #333; color: #aaa; }

#status { text-align: center; margin-top: 10px; font-size: 13px; min-height: 20px; }
</style>
</head>
<body>

<h1>Obstacle Sprite Cropper</h1>
<p class="sub">Move &amp; resize the pink box over what you want. Then click a stage button to save it.</p>

<div class="tabs" id="tabs"></div>

<div class="workspace">
  <div class="image-panel">
    <div class="canvas-area" id="canvas-area">
      <canvas id="main-canvas"></canvas>
      <div class="crop-box" id="crop-box">
        <div class="crop-handle" id="crop-handle"></div>
        <div class="crop-size" id="crop-size">128×128</div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div class="commit-section">
      <h3>Current Crop</h3>
      <div class="preview-img" id="live-preview"></div>
      <div class="commit-buttons">
        <button class="commit-btn s3" onclick="commitStage(3)">→ HP 3 Intact</button>
        <button class="commit-btn s2" onclick="commitStage(2)">→ HP 2 Mid</button>
        <button class="commit-btn s1" onclick="commitStage(1)">→ HP 1 Broken</button>
      </div>
    </div>

    <div class="stages-section">
      <h3>Saved Stages</h3>
      <div id="stage-3-row" class="stage-row s3">
        <div class="stage-tag">3</div>
        <div class="stage-thumb" id="thumb-3"></div>
        <div class="stage-name" id="name-3">—</div>
        <button class="stage-x" onclick="clearStage(3)">✕</button>
      </div>
      <div id="stage-2-row" class="stage-row s2">
        <div class="stage-tag">2</div>
        <div class="stage-thumb" id="thumb-2"></div>
        <div class="stage-name" id="name-2">—</div>
        <button class="stage-x" onclick="clearStage(2)">✕</button>
      </div>
      <div id="stage-1-row" class="stage-row s1">
        <div class="stage-tag">1</div>
        <div class="stage-thumb" id="thumb-1"></div>
        <div class="stage-name" id="name-1">—</div>
        <button class="stage-x" onclick="clearStage(1)">✕</button>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-copy" onclick="copyAll()">Copy All for Claude</button>
  <button class="btn-clear" onclick="clearGrid()">Clear This Grid</button>
</div>
<div id="status"></div>

<script>
const GRIDS = [
  { id: 'ice',     label: '🧊 Ice Block',           src: 'temp-grids/ice.png' },
  { id: 'giftbox', label: '🎁 Heart Gift Box',      src: 'temp-grids/giftbox.png' },
  { id: 'parcel',  label: '💌 Love Letter Parcel',   src: 'temp-grids/parcel.png' },
  { id: 'crate',   label: '📦 Wooden Crate',         src: 'temp-grids/crate.png' },
];

const canvas = document.getElementById('main-canvas');
const cctx = canvas.getContext('2d');
const area = document.getElementById('canvas-area');
const cropBox = document.getElementById('crop-box');
const cropHandle = document.getElementById('crop-handle');
const cropSizeLabel = document.getElementById('crop-size');

const MAX_DISPLAY = 520;
let currentGrid = 0;
let sourceImg = null;
let displayScale = 1;

// Crop box state (in display pixels relative to canvas-area)
let cropX = 20, cropY = 20, cropSize = 128;

// Drag state
let dragMode = null; // 'move' or 'resize'
let dragStartX = 0, dragStartY = 0;
let dragOrigX = 0, dragOrigY = 0, dragOrigSize = 0;

// Saved crops: { gridId: { 3: {x,y,w,h}, ... } } — in NATURAL coords
let allCrops = {};
for (const g of GRIDS) allCrops[g.id] = {};
try { const s = JSON.parse(localStorage.getItem('crop-v3')); if (s) allCrops = s; } catch(e) {}
function persist() { localStorage.setItem('crop-v3', JSON.stringify(allCrops)); }

// ─── Tabs ───
function buildTabs() {
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  GRIDS.forEach((g, i) => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (i === currentGrid ? ' active' : '');
    const crops = allCrops[g.id];
    const done = Object.keys(crops).length;
    b.innerHTML = g.label + (done ? ` <span class="check">✓${done}</span>` : '');
    b.onclick = () => { currentGrid = i; loadImage(); buildTabs(); };
    c.appendChild(b);
  });
}

// ─── Load Image ───
function loadImage() {
  const g = GRIDS[currentGrid];
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    sourceImg = img;
    displayScale = Math.min(MAX_DISPLAY / img.naturalWidth, MAX_DISPLAY / img.naturalHeight, 1);
    canvas.width = Math.round(img.naturalWidth * displayScale);
    canvas.height = Math.round(img.naturalHeight * displayScale);
    area.style.width = canvas.width + 'px';
    area.style.height = canvas.height + 'px';
    cctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    // Reset crop box to center, reasonable size
    cropSize = Math.round(Math.min(canvas.width, canvas.height) * 0.28);
    cropX = Math.round((canvas.width - cropSize) / 2);
    cropY = Math.round((canvas.height - cropSize) / 2);
    updateCropBox();
    refreshStages();
  };
  img.src = g.src;
}

// ─── Crop Box UI ───
function updateCropBox() {
  // Clamp
  cropX = Math.max(0, Math.min(cropX, canvas.width - cropSize));
  cropY = Math.max(0, Math.min(cropY, canvas.height - cropSize));
  cropSize = Math.max(32, Math.min(cropSize, canvas.width - cropX, canvas.height - cropY));

  cropBox.style.left = cropX + 'px';
  cropBox.style.top = cropY + 'px';
  cropBox.style.width = cropSize + 'px';
  cropBox.style.height = cropSize + 'px';

  // Size label (in natural pixels)
  const natW = Math.round(cropSize / displayScale);
  cropSizeLabel.textContent = `${natW}×${natW}`;

  updateLivePreview();
}

function updateLivePreview() {
  if (!sourceImg) return;
  const container = document.getElementById('live-preview');
  container.innerHTML = '';
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const cx = c.getContext('2d');
  cx.clearRect(0, 0, 128, 128);
  // Convert display coords to natural
  const nx = cropX / displayScale;
  const ny = cropY / displayScale;
  const nw = cropSize / displayScale;
  cx.drawImage(sourceImg, nx, ny, nw, nw, 0, 0, 128, 128);
  container.appendChild(c);
}

// ─── Drag: Move ───
function onPointerDown(e) {
  // Check if it's on the handle
  if (e.target === cropHandle || e.target.id === 'crop-handle') {
    dragMode = 'resize';
  } else {
    dragMode = 'move';
  }
  const pos = getPointerPos(e);
  dragStartX = pos.x;
  dragStartY = pos.y;
  dragOrigX = cropX;
  dragOrigY = cropY;
  dragOrigSize = cropSize;

  e.preventDefault();
  e.stopPropagation();
}

function onPointerMove(e) {
  if (!dragMode) return;
  const pos = getPointerPos(e);
  const dx = pos.x - dragStartX;
  const dy = pos.y - dragStartY;

  if (dragMode === 'move') {
    cropX = dragOrigX + dx;
    cropY = dragOrigY + dy;
  } else if (dragMode === 'resize') {
    // Resize keeping square — use the larger delta
    const delta = Math.max(dx, dy);
    cropSize = Math.max(32, dragOrigSize + delta);
  }
  updateCropBox();
  e.preventDefault();
}

function onPointerUp(e) {
  dragMode = null;
}

function getPointerPos(e) {
  if (e.touches && e.touches.length) {
    const r = area.getBoundingClientRect();
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  const r = area.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// Attach to crop box (move) and handle (resize)
cropBox.addEventListener('mousedown', onPointerDown);
cropBox.addEventListener('touchstart', onPointerDown, { passive: false });
document.addEventListener('mousemove', onPointerMove);
document.addEventListener('touchmove', onPointerMove, { passive: false });
document.addEventListener('mouseup', onPointerUp);
document.addEventListener('touchend', onPointerUp);

// ─── Commit to stage ───
function commitStage(stage) {
  if (!sourceImg) return;
  const gid = GRIDS[currentGrid].id;
  // Save in natural coords
  allCrops[gid][stage] = {
    x: Math.round(cropX / displayScale),
    y: Math.round(cropY / displayScale),
    w: Math.round(cropSize / displayScale),
    h: Math.round(cropSize / displayScale),
  };
  persist();
  refreshStages();
  buildTabs();
  document.getElementById('status').textContent = `Saved as Stage ${stage}!`;
  document.getElementById('status').style.color = '#4caf50';
}

function clearStage(stage) {
  const gid = GRIDS[currentGrid].id;
  delete allCrops[gid][stage];
  persist();
  refreshStages();
  buildTabs();
}

function clearGrid() {
  allCrops[GRIDS[currentGrid].id] = {};
  persist();
  refreshStages();
  buildTabs();
}

function refreshStages() {
  const gid = GRIDS[currentGrid].id;
  const crops = allCrops[gid];

  for (let s = 1; s <= 3; s++) {
    const row = document.getElementById(`stage-${s}-row`);
    const thumb = document.getElementById(`thumb-${s}`);
    const name = document.getElementById(`name-${s}`);
    thumb.innerHTML = '';

    if (crops[s]) {
      row.classList.add('filled');
      const r = crops[s];
      name.textContent = `${r.w}×${r.h}`;
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const cx = c.getContext('2d');
      cx.clearRect(0, 0, 128, 128);
      cx.drawImage(sourceImg, r.x, r.y, r.w, r.h, 0, 0, 128, 128);
      thumb.appendChild(c);
    } else {
      row.classList.remove('filled');
      name.textContent = '—';
    }
  }
}

// ─── Copy for Claude ───
function copyAll() {
  const lines = [];
  for (const g of GRIDS) {
    const crops = allCrops[g.id];
    for (let s = 3; s >= 1; s--) {
      if (!crops[s]) continue;
      const r = crops[s];
      lines.push(`${g.id} stage${s}: x=${r.x} y=${r.y} w=${r.w} h=${r.h}`);
    }
  }
  if (!lines.length) {
    document.getElementById('status').textContent = 'No crops saved yet!';
    document.getElementById('status').style.color = '#ff9800';
    return;
  }
  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('status').textContent = 'Copied! Paste to Claude.';
    document.getElementById('status').style.color = '#4caf50';
  }).catch(() => {
    prompt('Copy this:', text);
  });
}

// ─── Init ───
buildTabs();
loadImage();
</script>
</body>
</html>
