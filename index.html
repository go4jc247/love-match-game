<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e84393">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Love Match">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="A match-3 puzzle game for two hearts - inspired by love and faith">

  <!-- Open Graph -->
  <meta property="og:title" content="Love Match - A Game for Two Hearts">
  <meta property="og:description" content="A beautiful match-3 puzzle game inspired by love, romance, and faith.">
  <meta property="og:type" content="website">

  <title>Love Match - A Game for Two Hearts</title>

  <!-- Favicon: Heart SVG data URI -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- App Root -->
  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div id="ui-container"></div>
    <div id="toast-container"></div>
  </div>

  <!-- Loading Screen (pure HTML/CSS, no JS required) -->
  <div id="loading-screen" style="
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #fd79a8 0%, #e84393 30%, #a855f7 70%, #c4b5fd 100%);
    font-family: 'Playfair Display', 'Georgia', serif;
    transition: opacity 0.6s ease, visibility 0.6s ease;
    overflow: hidden;
  ">

    <!-- Ambient floating hearts -->
    <style>
      @keyframes floatUp {
        0%   { transform: translateY(0) scale(1); opacity: 0.5; }
        100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
      }
      @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        15%      { transform: scale(1.25); }
        30%      { transform: scale(1); }
        45%      { transform: scale(1.15); }
        60%      { transform: scale(1); }
      }
      @keyframes shimmer {
        0%   { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes dotPulse {
        0%, 20%  { opacity: 0; }
        40%      { opacity: 1; }
        100%     { opacity: 0; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes softGlow {
        0%, 100% { text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 2px 10px rgba(0,0,0,0.2); }
        50%      { text-shadow: 0 0 40px rgba(255,255,255,0.6), 0 2px 10px rgba(0,0,0,0.2); }
      }

      .floating-heart {
        position: absolute;
        bottom: -40px;
        font-size: 24px;
        animation: floatUp linear infinite;
        pointer-events: none;
        user-select: none;
      }
      .floating-heart:nth-child(1) { left: 10%; animation-duration: 8s; animation-delay: 0s; font-size: 18px; }
      .floating-heart:nth-child(2) { left: 25%; animation-duration: 12s; animation-delay: 2s; font-size: 14px; }
      .floating-heart:nth-child(3) { left: 50%; animation-duration: 10s; animation-delay: 1s; font-size: 22px; }
      .floating-heart:nth-child(4) { left: 70%; animation-duration: 9s; animation-delay: 3s; font-size: 16px; }
      .floating-heart:nth-child(5) { left: 85%; animation-duration: 11s; animation-delay: 0.5s; font-size: 20px; }
      .floating-heart:nth-child(6) { left: 40%; animation-duration: 14s; animation-delay: 4s; font-size: 12px; }

      #loading-screen.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>

    <!-- Floating background hearts -->
    <div class="floating-heart">&#x1F497;</div>
    <div class="floating-heart">&#x2764;&#xFE0F;</div>
    <div class="floating-heart">&#x1F49E;</div>
    <div class="floating-heart">&#x1F493;</div>
    <div class="floating-heart">&#x2764;&#xFE0F;</div>
    <div class="floating-heart">&#x1F497;</div>

    <!-- Title -->
    <h1 style="
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: #fff;
      margin: 0 0 8px 0;
      letter-spacing: 2px;
      animation: fadeInUp 0.8s ease both, softGlow 3s ease-in-out infinite;
      text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 2px 10px rgba(0,0,0,0.2);
    ">Love Match</h1>

    <!-- Subtitle -->
    <p style="
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.85rem, 3vw, 1.1rem);
      color: rgba(255,255,255,0.85);
      margin: 0 0 40px 0;
      letter-spacing: 1px;
      animation: fadeInUp 0.8s ease 0.2s both;
    ">A Game for Two Hearts</p>

    <!-- CSS Heart -->
    <div style="
      position: relative;
      width: 80px;
      height: 72px;
      animation: heartbeat 1.2s ease-in-out infinite, fadeInUp 0.8s ease 0.4s both;
      margin-bottom: 48px;
    ">
      <div style="
        position: absolute;
        top: 0; left: 40px;
        width: 40px; height: 64px;
        background: #fff;
        border-radius: 40px 40px 0 0;
        transform: rotate(-45deg);
        transform-origin: 0 100%;
        box-shadow: 0 0 20px rgba(255,255,255,0.4);
      "></div>
      <div style="
        position: absolute;
        top: 0; left: 0;
        width: 40px; height: 64px;
        background: #fff;
        border-radius: 40px 40px 0 0;
        transform: rotate(45deg);
        transform-origin: 100% 100%;
        box-shadow: 0 0 20px rgba(255,255,255,0.4);
      "></div>
    </div>

    <!-- Loading text with animated dots -->
    <p style="
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.9rem, 3vw, 1rem);
      color: rgba(255,255,255,0.8);
      margin: 0;
      animation: fadeInUp 0.8s ease 0.6s both;
    ">
      Loading your love story<span style="
        display: inline-flex; width: 24px; text-align: left;
      "><span style="animation: dotPulse 1.4s ease-in-out infinite;">.</span><span style="animation: dotPulse 1.4s ease-in-out 0.2s infinite;">.</span><span style="animation: dotPulse 1.4s ease-in-out 0.4s infinite;">.</span></span>
    </p>

  </div>

  <!-- App Entry Point -->
  <script type="module" src="src/app.js"></script>

</body>
</html>
